<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Акции – биржа</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto; margin: 0; padding: 16px; background: #f0f2f5; }
        .card { background: white; border-radius: 20px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .error { color: red; background: #ffe0e0; padding: 12px; border-radius: 12px; }
        button { background: #0088cc; color: white; border: none; padding: 12px 16px; border-radius: 40px; font-size: 16px; font-weight: 600; width: 100%; margin-top: 8px; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.97); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 40px; font-size: 16px; background: #fafafa; }
        .buy-btn { background: #2ecc71; width: auto; padding: 6px 16px; margin: 0; }
        .order-item { border-bottom: 1px solid #eee; padding: 8px 0; display: flex; justify-content: space-between; align-items: center; }
        .status { font-size: 12px; color: gray; margin-top: 8px; }
        #price-chart { width: 100%; height: 300px; margin-top: 8px; background: white; border-radius: 12px; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        /* Вкладки */
        .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
        .tab { flex: 1; text-align: center; padding: 10px; background: #e0e0e0; border-radius: 30px; cursor: pointer; transition: 0.2s; font-weight: 500; }
        .tab.active { background: #0088cc; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .history-item { border-bottom: 1px solid #eee; padding: 8px 0; font-size: 14px; }
    </style>
</head>
<body>
    <div id="app">Загрузка...</div>
    <script>
        (async () => {
            // ---------- Telegram ----------
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            let userId = tg.initDataUnsafe?.user?.id;
            const username = tg.initDataUnsafe?.user?.username || "player";
            if (!userId) userId = 123456;

            // ---------- Supabase ----------
            const SUPABASE_URL = "https://gsutnhhklidxmewdkcvk.supabase.co";
            const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzdXRuaGhrbGlkeG1ld2RrY3ZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NzA2MTEsImV4cCI6MjA5NjE0NjYxMX0.XEtyJVT0BfmEgAAsGagPHRdHhmCgrtWEbtzov0c3EXc";
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            let currentUser = null;

            // ---------- Пользователь ----------
            async function getOrCreateUser() {
                const { data, error } = await supabase.from('users').select('*').eq('id', userId).maybeSingle();
                if (error) throw error;
                if (!data) {
                    const { data: newUser, error: insertError } = await supabase.from('users').insert([{ id: userId, username, shares: 100, stars_balance: 50 }]).select().single();
                    if (insertError) throw insertError;
                    return newUser;
                }
                return data;
            }

            // ---------- Данные ----------
            async function getActiveOrders() {
                const { data, error } = await supabase.from('orders').select('*').eq('status', 'active').order('price_per_share', { ascending: true });
                if (error) throw error;
                return data || [];
            }

            async function getPriceHistory() {
                const { data, error } = await supabase.from('price_history').select('price, created_at').order('created_at', { ascending: true }).limit(100);
                if (error) throw error;
                return data || [];
            }

            async function getUserTrades() {
                const { data, error } = await supabase
                    .from('orders')
                    .select('*, seller:users!seller_id(username), buyer:users!seller_id(username)')
                    .or(`seller_id.eq.${userId},buyer_id.eq.${userId}`)
                    .eq('status', 'completed')
                    .order('created_at', { ascending: false })
                    .limit(50);
                if (error) throw error;
                return data || [];
            }

            // ---------- RPC операции ----------
            async function createOrder(amount, price) {
                const { data, error } = await supabase.rpc('create_sell_order', { p_user_id: userId, p_amount: amount, p_price: price });
                if (error) throw new Error(error.message);
                if (!data.success) throw new Error(data.error);
                currentUser.shares -= amount;
                return true;
            }

            async function executeTrade(order) {
                const { data, error } = await supabase.rpc('execute_trade', { p_order_id: order.id, p_buyer_id: userId });
                if (error) throw new Error(error.message);
                if (!data.success) throw new Error(data.error);
                const totalStars = order.amount * order.price_per_share;
                currentUser.stars_balance -= totalStars;
                currentUser.shares += order.amount;
                return true;
            }

            // ---------- График (Canvas) ----------
            function drawCanvasChart(history) {
                const container = document.getElementById('price-chart');
                if (!container) return;
                container.innerHTML = '';
                if (!history || history.length === 0) {
                    container.innerHTML = '<p style="text-align:center; padding:20px;">Нет данных</p>';
                    return;
                }
                const canvas = document.createElement('canvas');
                const width = container.clientWidth;
                const height = 300;
                canvas.width = width;
                canvas.height = height;
                canvas.style.width = '100%';
                canvas.style.height = 'auto';
                container.appendChild(canvas);
                const ctx = canvas.getContext('2d');
                const values = history.map(h => h.price);
                const max = Math.max(...values);
                const min = Math.min(...values);
                const range = max - min;
                const padding = { top: 20, bottom: 30, left: 40, right: 20 };
                const graphWidth = width - padding.left - padding.right;
                const graphHeight = height - padding.top - padding.bottom;
                const stepX = graphWidth / (values.length - 1);
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, width, height);
                ctx.beginPath();
                ctx.strokeStyle = '#ccc';
                ctx.lineWidth = 1;
                ctx.moveTo(padding.left, padding.top);
                ctx.lineTo(padding.left, height - padding.bottom);
                ctx.lineTo(width - padding.right, height - padding.bottom);
                ctx.stroke();
                ctx.beginPath();
                ctx.strokeStyle = '#0088cc';
                ctx.lineWidth = 2;
                for (let i = 0; i < values.length; i++) {
                    const x = padding.left + i * stepX;
                    let y;
                    if (range === 0) y = padding.top + graphHeight / 2;
                    else y = padding.top + graphHeight - ((values[i] - min) / range) * graphHeight;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
                ctx.fillStyle = '#333';
                ctx.font = '11px sans-serif';
                ctx.fillText(max.toFixed(1), padding.left - 30, padding.top + 10);
                ctx.fillText(min.toFixed(1), padding.left - 30, height - padding.bottom - 5);
                if (history.length > 0) {
                    const firstDate = new Date(history[0].created_at).toLocaleDateString();
                    const lastDate = new Date(history[history.length-1].created_at).toLocaleDateString();
                    ctx.fillText(firstDate, padding.left, height - padding.bottom + 15);
                    ctx.fillText(lastDate, width - padding.right - 30, height - padding.bottom + 15);
                }
            }

            // ---------- Рендер вкладок ----------
            function renderUI(orders, priceHistory, tradesHistory) {
                const html = `
                    <div class="card">
                        <h2>💰 Мой баланс</h2>
                        <p>📊 Акций: <strong id="sharesDisplay">${currentUser.shares}</strong></p>
                        <p>⭐ Stars: <strong id="starsDisplay">${currentUser.stars_balance}</strong></p>
                        <p class="status">ID: ${userId}</p>
                    </div>
                    <div class="tabs">
                        <div class="tab active" data-tab="trade">Торги</div>
                        <div class="tab" data-tab="orders">Мои ордера</div>
                        <div class="tab" data-tab="history">История</div>
                        <div class="tab" data-tab="chart">График</div>
                    </div>
                    <div id="tab-trade" class="tab-content active">
                        <div class="card">
                            <h3>📈 Продать акции</h3>
                            <input type="number" id="sellAmount" placeholder="Количество" min="1">
                            <input type="number" id="sellPrice" placeholder="Цена за 1 акцию (Stars)" min="1">
                            <button id="sellBtn">➕ Выставить на продажу</button>
                        </div>
                        <div class="card">
                            <h3>📋 Активные ордера на продажу</h3>
                            <div id="ordersList"></div>
                        </div>
                    </div>
                    <div id="tab-orders" class="tab-content">
                        <div class="card">
                            <h3>Мои активные ордера</h3>
                            <div id="myOrdersList">Загрузка...</div>
                        </div>
                    </div>
                    <div id="tab-history" class="tab-content">
                        <div class="card">
                            <h3>История сделок</h3>
                            <div id="historyList">Загрузка...</div>
                        </div>
                    </div>
                    <div id="tab-chart" class="tab-content">
                        <div class="card">
                            <h3>График цены акции</h3>
                            <div id="price-chart"></div>
                        </div>
                    </div>
                `;
                document.getElementById('app').innerHTML = html;

                // Переключение вкладок
                document.querySelectorAll('.tab').forEach(tab => {
                    tab.addEventListener('click', () => {
                        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                        tab.classList.add('active');
                        const tabId = tab.getAttribute('data-tab');
                        document.getElementById(`tab-${tabId}`).classList.add('active');
                    });
                });

                // Заполнение активных ордеров (продажа)
                const ordersDiv = document.getElementById('ordersList');
                if (orders.length === 0) {
                    ordersDiv.innerHTML = '<p>Нет активных ордеров</p>';
                } else {
                    orders.forEach(order => {
                        const div = document.createElement('div');
                        div.className = 'order-item';
                        div.innerHTML = `
                            <div>${order.amount} шт. по ${order.price_per_share} ⭐ (всего ${order.amount * order.price_per_share})</div>
                            <button class="buy-btn" data-order='${JSON.stringify(order)}'>Купить</button>
                        `;
                        ordersDiv.appendChild(div);
                    });
                    document.querySelectorAll('.buy-btn').forEach(btn => {
                        btn.addEventListener('click', async () => {
                            const order = JSON.parse(btn.dataset.order);
                            try {
                                await executeTrade(order);
                                alert('Сделка успешно завершена!');
                                loadPage();
                            } catch (err) {
                                alert(err.message);
                            }
                        });
                    });
                }

                // Мои ордера
                const myOrders = orders.filter(o => o.seller_id === userId);
                const myOrdersDiv = document.getElementById('myOrdersList');
                if (myOrders.length === 0) {
                    myOrdersDiv.innerHTML = '<p>У вас нет активных ордеров</p>';
                } else {
                    myOrdersDiv.innerHTML = myOrders.map(o => `<div class="order-item">${o.amount} шт. по ${o.price_per_share} ⭐</div>`).join('');
                }

                // История сделок
                const historyDiv = document.getElementById('historyList');
                if (tradesHistory.length === 0) {
                    historyDiv.innerHTML = '<p>История пуста</p>';
                } else {
                    historyDiv.innerHTML = tradesHistory.map(t => {
                        const isBuyer = t.buyer_id === userId;
                        return `<div class="history-item">
                            ${isBuyer ? 'Купили' : 'Продали'} ${t.amount} шт. по ${t.price_per_share} ⭐ 
                            (${new Date(t.created_at).toLocaleString()})
                        </div>`;
                    }).join('');
                }

                // График
                drawCanvasChart(priceHistory);

                // Обработчик продажи
                document.getElementById('sellBtn').addEventListener('click', async () => {
                    const amount = parseInt(document.getElementById('sellAmount').value);
                    const price = parseInt(document.getElementById('sellPrice').value);
                    if (isNaN(amount) || isNaN(price) || amount <= 0 || price <= 0) {
                        alert('Введите корректные количество и цену');
                        return;
                    }
                    try {
                        await createOrder(amount, price);
                        alert('Ордер создан');
                        loadPage();
                    } catch (err) {
                        alert(err.message);
                    }
                });
            }

            async function loadPage() {
                try {
                    currentUser = await getOrCreateUser();
                    const orders = await getActiveOrders();
                    const priceHistory = await getPriceHistory();
                    const tradesHistory = await getUserTrades();
                    renderUI(orders, priceHistory, tradesHistory);
                } catch (err) {
                    console.error(err);
                    document.getElementById('app').innerHTML = `<div class="card error">Ошибка: ${err.message}</div>`;
                }
            }

            loadPage();
        })();
    </script>
</body>
</html>
