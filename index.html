<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Акции – биржа | VoxAction</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/tabs.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/stocks.css">
    <link rel="stylesheet" href="css/referral.css">
    <link rel="stylesheet" href="css/rating.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="app-header">
    <div class="header-logo">VoxAction</div>
    <div class="header-icons">
        <div class="header-icon" id="headerNotificationBell">🔔<span class="notification-badge" id="headerNotificationBadge" style="display:none;">0</span></div>
        <div class="header-icon" id="headerSettingsGear">⚙️</div>
    </div>
</div>
<div id="app">Загрузка...</div>
<div class="tabs-wrapper">
    <div class="tabs" id="tabs">
        <div class="tab" data-tab="profile"><div class="tab-icon">👤</div><div class="tab-label">Профиль</div></div>
        <div class="tab active" data-tab="stocks"><div class="tab-icon">📈</div><div class="tab-label">Акции</div></div>
        <div class="tab" data-tab="analytics"><div class="tab-icon">📊</div><div class="tab-label">Аналитика</div></div>
        <div class="tab" data-tab="rating"><div class="tab-icon">🏆</div><div class="tab-label">Рейтинг</div></div>
        <div class="tab" data-tab="wallet"><div class="tab-icon">💳</div><div class="tab-label">Кошелёк</div></div>
        <div class="tab" data-tab="referral"><div class="tab-icon">🔗</div><div class="tab-label">Рефералка</div></div>
        <div class="tab" data-tab="games"><div class="tab-icon">🎮</div><div class="tab-label">Игры</div></div>
        <div class="tab admin-tab" data-tab="admin" style="display: none;"><div class="tab-icon">👑</div><div class="tab-label">Админ</div></div>
    </div>
</div>
<div id="topupModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" id="closeTopupModal">&times;</span>
        <h3>💸 Пополнение Stars</h3>
        <div class="topup-amounts">
            <div class="amount-btn" data-amount="200">200 ⭐</div>
            <div class="amount-btn" data-amount="500">500 ⭐</div>
            <div class="amount-btn" data-amount="1000">1000 ⭐</div>
        </div>
        <div class="custom-amount"><input type="number" id="customTopupAmount" placeholder="Своя сумма (1-10000)" min="1" step="1"></div>
        <div id="topupFeeInfo" style="background: rgba(0,0,0,0.3); padding: 12px; border-radius: 20px; text-align: center; margin-bottom: 16px;"></div>
        <button id="confirmTopupBtn">Пополнить</button>
    </div>
</div>

<script src="api.js"></script>
<script src="notifications.js"></script>
<script src="topup.js"></script>
<script src="profile.js"></script>
<script src="stocks.js"></script>
<script src="analytics.js"></script>
<script src="rating.js"></script>
<script src="wallet.js"></script>
<script src="referral.js"></script>
<script src="games.js"></script>
<script src="admin.js"></script>

<script>
    (async () => {
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]);
        }
        
        window.showCustomModal = function(title, message) {
            const existingModal = document.getElementById('customMessageModal');
            if (existingModal) existingModal.remove();
            const modalHtml = `
                <div class="modal" id="customMessageModal" style="display:flex;">
                    <div class="modal-content">
                        <span class="close-modal" id="closeCustomModal">&times;</span>
                        <h3>${escapeHtml(title)}</h3>
                        <p style="margin:20px 0; text-align:center; white-space:pre-wrap;">${escapeHtml(message)}</p>
                        <button id="customModalOkBtn">OK</button>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            const modal = document.getElementById('customMessageModal');
            const closeModal = () => modal.remove();
            document.getElementById('closeCustomModal').onclick = closeModal;
            document.getElementById('customModalOkBtn').onclick = closeModal;
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeModal();
            });
        };
        
        window.showToast = function(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        };
        
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        window.tg = tg;
        window.userId = tg.initDataUnsafe?.user?.id;
        window.username = tg.initDataUnsafe?.user?.username || `user_${window.userId}`;
        if (!window.userId) { 
            document.getElementById('app').innerHTML = '<div class="card" style="text-align:center;">Ошибка: запустите через Telegram</div>'; 
            return; 
        }
        if (window.userId === 6048486427) document.querySelector('.admin-tab').style.display = 'inline-flex';
        
        const SUPABASE_URL = "https://gsutnhhklidxmewdkcvk.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzdXRuaGhrbGlkeG1ld2RrY3ZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NzA2MTEsImV4cCI6MjA5NjE0NjYxMX0.XEtyJVT0BfmEgAAsGagPHRdHhmCgrtWEbtzov0c3EXc";
        window.supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        window.currentUser = null;
        window.BACKEND_URL = 'https://voxaction-bot-main.onrender.com';
        
        async function renderSettingsTab() {
            const hideRating = window.currentUser.hide_rating || false;
            const customColor = localStorage.getItem('custom_color') || '#2b6e9e';
            const notifyTrades = window.currentUser.notify_trades ?? true;
            const notifyTopup = window.currentUser.notify_topup ?? true;
            const notifyReferral = window.currentUser.notify_referral ?? true;
            const username = window.currentUser.username || '';
            const useSliders = window.getUseSliders ? window.getUseSliders() : true;
            
            const html = `
                <div class="card">
                    <h2>⚙️ Настройки</h2>
                    <div style="margin: 16px 0;">
                        <div class="small-text" style="margin-bottom: 4px;">Текущий никнейм</div>
                        <div style="font-size: 18px; font-weight: bold;">${escapeHtml(username)}</div>
                    </div>
                    <div>
                        <div class="small-text" style="margin-bottom: 4px;">Новый никнейм</div>
                        <input type="text" id="newUsernameInput" placeholder="Новый никнейм" maxlength="20">
                        <button id="changeUsernameBtn" style="margin-top: 8px;">Изменить никнейм</button>
                    </div>
                    <hr style="margin: 20px 0; border-color: rgba(255,255,255,0.1);">
                    <label><input type="checkbox" id="hideRatingCheckbox" ${hideRating?'checked':''}> Скрыть из рейтинга</label><br><br>
                    <label><input type="checkbox" id="useSlidersCheckbox" ${useSliders ? 'checked' : ''}> Использовать слайдеры в формах продажи/покупки</label><br><br>
                    <div><strong>Уведомления от бота:</strong></div>
                    <label><input type="checkbox" id="notifyTradesCheckbox" ${notifyTrades?'checked':''}> О сделках</label><br>
                    <label><input type="checkbox" id="notifyTopupCheckbox" ${notifyTopup?'checked':''}> О пополнении</label><br>
                    <label><input type="checkbox" id="notifyReferralCheckbox" ${notifyReferral?'checked':''}> О рефералах</label><br><br>
                    <div><strong>Цвет акцента:</strong></div>
                    <input type="color" id="colorPicker" value="${customColor}" style="width:60px; padding:0;"><br>
                    <button id="saveSettings" style="margin-top: 12px;">Сохранить</button>
                </div>
            `;
            document.getElementById('app').innerHTML = html;
            
            document.getElementById('colorPicker').addEventListener('input', (e) => document.documentElement.style.setProperty('--accent', e.target.value));
            document.getElementById('saveSettings').onclick = async () => {
                const newHide = document.getElementById('hideRatingCheckbox').checked;
                const newColor = document.getElementById('colorPicker').value;
                const newUseSliders = document.getElementById('useSlidersCheckbox').checked;
                localStorage.setItem('custom_color', newColor);
                document.documentElement.style.setProperty('--accent', newColor);
                if (window.setUseSliders) window.setUseSliders(newUseSliders);
                await window.supabase.from('users').update({ 
                    hide_rating: newHide, 
                    notify_trades: document.getElementById('notifyTradesCheckbox').checked, 
                    notify_topup: document.getElementById('notifyTopupCheckbox').checked, 
                    notify_referral: document.getElementById('notifyReferralCheckbox').checked 
                }).eq('id', window.userId);
                window.currentUser.hide_rating = newHide;
                window.showCustomModal('Успех', 'Настройки сохранены');
                if (document.querySelector('.tab.active').dataset.tab === 'stocks' && window.renderStocksTab) {
                    await window.renderStocksTab(window.currentUser);
                }
            };
            
            document.getElementById('changeUsernameBtn')?.addEventListener('click', async () => {
                const newUsername = document.getElementById('newUsernameInput').value.trim();
                if (!newUsername) {
                    window.showCustomModal('Ошибка', 'Введите новый никнейм');
                    return;
                }
                try {
                    const result = await window.updateUsername(newUsername);
                    window.showCustomModal('Успех', result.message);
                    if (result.success && window.currentUser.username !== newUsername) {
                        window.currentUser.username = newUsername;
                        await renderSettingsTab();
                        if (document.querySelector('.tab.active').dataset.tab === 'stocks' && window.renderStocksTab) {
                            await window.renderStocksTab(window.currentUser);
                        }
                    }
                } catch(err) {
                    window.showCustomModal('Ошибка', err.message);
                }
            });
        }
        
        try {
            const { user, isNew } = await window.getOrCreateUser();
            window.currentUser = user;
            const savedColor = localStorage.getItem('custom_color') || '#2b6e9e';
            document.documentElement.style.setProperty('--accent', savedColor);
            await window.renderStocksTab(window.currentUser);
            if (isNew) setTimeout(() => window.renderProfileTab(
                window.currentUser, window.supabase, window.userId, window.fromCents, window.showCustomModal,
                window.getUserStats, window.getUserRank, window.getEarnedAchievements, window.getAllAchievements,
                window.updateBellBadge, window.showNotificationsModal
            ), 500);
            if (typeof setupRealtimeNotifications === 'function') setupRealtimeNotifications();
            if (typeof window.updateBellBadge === 'function') await window.updateBellBadge();
            if (typeof initTopupModal === 'function') initTopupModal();
            
            window.supabase
                .channel('global-updates')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'users' }, () => {
                    if (document.querySelector('.tab.active').dataset.tab === 'rating') window.refreshActiveTab();
                })
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'trades' }, () => {
                    if (document.querySelector('.tab.active').dataset.tab === 'rating') window.refreshActiveTab();
                })
                .subscribe();
        } catch(err) {
            document.getElementById('app').innerHTML = `<div class="card error" style="color:red; text-align:center;">Ошибка загрузки: ${err.message}<br><br>Попробуйте перезагрузить страницу или напишите в поддержку.</div>`;
            console.error('Ошибка при инициализации:', err);
            return;
        }
        
        document.getElementById('headerNotificationBell')?.addEventListener('click', () => { if (window.showNotificationsModal) window.showNotificationsModal(); });
        document.getElementById('headerSettingsGear')?.addEventListener('click', () => renderSettingsTab());
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', async () => {
                const tabName = tab.dataset.tab;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                if(tabName === 'profile') await window.renderProfileTab(
                    window.currentUser, window.supabase, window.userId, window.fromCents, window.showCustomModal,
                    window.getUserStats, window.getUserRank, window.getEarnedAchievements, window.getAllAchievements,
                    window.updateBellBadge, window.showNotificationsModal
                );
                else if(tabName === 'stocks') await window.renderStocksTab(window.currentUser);
                else if(tabName === 'analytics') await window.renderAnalyticsTab();
                else if(tabName === 'rating') await window.renderRatingTab();
                else if(tabName === 'wallet') await window.renderWalletTab();
                else if(tabName === 'referral') await window.renderReferralTab();
                else if(tabName === 'games') await window.renderGamesTab();
                else if(tabName === 'admin') await window.renderAdminTab();
            });
        });
        
        // Drag to scroll для табов (мышь + тач)
        (function() {
            const wrapper = document.querySelector('.tabs-wrapper');
            if (!wrapper) return;
            let isDown = false;
            let startX;
            let scrollLeft;
            function onStart(x) {
                isDown = true;
                startX = x - wrapper.offsetLeft;
                scrollLeft = wrapper.scrollLeft;
                wrapper.style.cursor = 'grabbing';
            }
            function onMove(x) {
                if (!isDown) return;
                const walk = (x - wrapper.offsetLeft - startX) * 1.5;
                wrapper.scrollLeft = scrollLeft - walk;
            }
            function onEnd() {
                isDown = false;
                wrapper.style.cursor = 'grab';
            }
            wrapper.addEventListener('mousedown', (e) => onStart(e.pageX));
            window.addEventListener('mousemove', (e) => onMove(e.pageX));
            window.addEventListener('mouseup', onEnd);
            wrapper.addEventListener('touchstart', (e) => onStart(e.touches[0].pageX));
            window.addEventListener('touchmove', (e) => onMove(e.touches[0].pageX));
            window.addEventListener('touchend', onEnd);
        })();
    })();
</script>
</body>
</html>
