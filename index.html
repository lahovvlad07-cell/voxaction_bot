<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Акции – биржа | VoxAction</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/tabs.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/stocks.css">
    <link rel="stylesheet" href="css/referral.css">
    <link rel="stylesheet" href="css/rating.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="app-header">
    <div class="header-logo">VoxAction</div>
    <div class="header-icons">
        <div class="header-icon" id="headerNotificationBell">🔔<span class="notification-badge" id="headerNotificationBadge" style="display:none;">0</span></div>
        <div class="header-icon" id="headerSettingsGear">⚙️</div>
    </div>
</div>
<div id="app">Загрузка...</div>
<div class="tabs-wrapper">
    <div class="tabs" id="tabs">
        <div class="tab" data-tab="profile"><div class="tab-icon">👤</div><div class="tab-label">Профиль</div></div>
        <div class="tab active" data-tab="stocks"><div class="tab-icon">📈</div><div class="tab-label">Акции</div></div>
        <div class="tab" data-tab="analytics"><div class="tab-icon">📊</div><div class="tab-label">Аналитика</div></div>
        <div class="tab" data-tab="rating"><div class="tab-icon">🏆</div><div class="tab-label">Рейтинг</div></div>
        <div class="tab" data-tab="wallet"><div class="tab-icon">💳</div><div class="tab-label">Кошелёк</div></div>
        <div class="tab" data-tab="referral"><div class="tab-icon">🔗</div><div class="tab-label">Рефералка</div></div>
        <div class="tab" data-tab="games"><div class="tab-icon">🎮</div><div class="tab-label">Игры</div></div>
        <div class="tab admin-tab" data-tab="admin" style="display: none;"><div class="tab-icon">👑</div><div class="tab-label">Админ</div></div>
    </div>
</div>
<div id="topupModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" id="closeTopupModal">&times;</span>
        <h3>💸 Пополнение Stars</h3>
        <div class="topup-amounts">
            <div class="amount-btn" data-amount="200">200 ⭐</div>
            <div class="amount-btn" data-amount="500">500 ⭐</div>
            <div class="amount-btn" data-amount="1000">1000 ⭐</div>
        </div>
        <div class="custom-amount"><input type="number" id="customTopupAmount" placeholder="Своя сумма (1-10000)" min="1" step="1"></div>
        <div id="topupFeeInfo" style="background: rgba(0,0,0,0.3); padding: 12px; border-radius: 20px; text-align: center; margin-bottom: 16px;"></div>
        <button id="confirmTopupBtn">Пополнить</button>
    </div>
</div>

<script src="api.js"></script>
<script src="notifications.js"></script>
<script src="topup.js"></script>
<script src="profile.js"></script>
<script src="stocks.js"></script>
<script src="analytics.js"></script>
<script src="rating.js"></script>
<script src="wallet.js"></script>
<script src="referral.js"></script>
<script src="games.js"></script>
<script src="admin.js"></script>

<script>
    (async () => {
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]);
        }
        
        window.showCustomModal = function(title, message) {
            const existingModal = document.getElementById('customMessageModal');
            if (existingModal) existingModal.remove();
            const modalHtml = `
                <div class="modal" id="customMessageModal" style="display:flex;">
                    <div class="modal-content">
                        <span class="close-modal" id="closeCustomModal">&times;</span>
                        <h3>${escapeHtml(title)}</h3>
                        <p style="margin:20px 0; text-align:center; white-space:pre-wrap;">${escapeHtml(message)}</p>
                        <button id="customModalOkBtn">OK</button>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            const modal = document.getElementById('customMessageModal');
            const closeModal = () => modal.remove();
            document.getElementById('closeCustomModal').onclick = closeModal;
            document.getElementById('customModalOkBtn').onclick = closeModal;
            modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
        };
        
        window.showToast = function(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        };
        
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        window.tg = tg;
        window.userId = tg.initDataUnsafe?.user?.id;
        window.username = tg.initDataUnsafe?.user?.username || `user_${window.userId}`;
        if (!window.userId) { 
            document.getElementById('app').innerHTML = '<div class="card">Ошибка: запустите через Telegram</div>'; 
            return; 
        }
        if (window.userId === 6048486427) document.querySelector('.admin-tab').style.display = 'inline-flex';
        
        const SUPABASE_URL = "https://gsutnhhklidxmewdkcvk.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzdXRuaGhrbGlkeG1ld2RrY3ZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NzA2MTEsImV4cCI6MjA5NjE0NjYxMX0.XEtyJVT0BfmEgAAsGagPHRdHhmCgrtWEbtzov0c3EXc";
        window.supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        window.currentUser = null;
        window.BACKEND_URL = 'https://voxaction-bot-main.onrender.com';
        
        // ========== НАСТРОЙКИ (ЛИМИТЫ ДЛЯ ИГР) ==========
        async function loadGameLimits() {
            const { data, error } = await window.supabase
                .from('user_game_limits')
                .select('game_limits')
                .eq('user_id', window.userId)
                .single();
            if (error || !data) return {};
            return data.game_limits || {};
        }
        
        async function updateGameLimit(game, newValue) {
            const limits = await loadGameLimits();
            if (newValue > (limits[game] || 100)) {
                throw new Error('Нельзя повысить лимит, только понизить');
            }
            const newLimits = { ...limits, [game]: newValue };
            await window.supabase
                .from('user_game_limits')
                .upsert({ user_id: window.userId, game_limits: newLimits });
        }
        
        async function renderSettingsTab() {
            const limits = await loadGameLimits();
            const games = [
                { id: 'reaction', name: '⚡ Нажми быстрее', default: 100 },
                { id: 'tower', name: '🏗️ Башня', default: 100 },
                { id: 'closest', name: '🎯 Ближе к цели', default: 100 },
                { id: 'typerace', name: '⌨️ Скоростной набор', default: 100 },
                { id: 'maze', name: '🧩 Лабиринт', default: 100 },
                { id: 'memory', name: '🧠 Memory Match', default: 100 },
                { id: 'ttt', name: '❌⭕ Крестики-нолики', default: 100 }
            ];
            
            let html = `
                <div class="card">
                    <h2>⚙️ Настройки</h2>
                    <div style="margin-bottom: 20px;">
                        <div class="small-text">Часовые лимиты чистого выигрыша/проигрыша (⭐). Можно только понижать.</div>
                        ${games.map(game => {
                            const current = limits[game.id] !== undefined ? limits[game.id] : game.default;
                            return `
                                <div style="margin: 12px 0;">
                                    <div class="small-text" style="margin-bottom: 4px;">${game.name}</div>
                                    <input type="range" id="limit_${game.id}" min="10" max="100" step="5" value="${current}" style="width: 100%;">
                                    <span id="val_${game.id}" class="small-text">${current} ⭐</span>
                                    <button id="save_${game.id}" class="secondary" style="margin-top: 6px; padding: 4px 12px; width: auto;">Сохранить</button>
                                </div>
                            `;
                        }).join('')}
                    </div>
                    <hr>
                    <div>
                        <div class="small-text">Общие настройки</div>
                        <label><input type="checkbox" id="hideRatingCheckbox" ${window.currentUser.hide_rating ? 'checked' : ''}> Скрыть из рейтинга</label><br>
                        <label><input type="checkbox" id="useSlidersCheckbox" ${window.getUseSliders ? (window.getUseSliders() ? 'checked' : '') : 'checked'}> Использовать слайдеры в формах продажи/покупки</label><br><br>
                        <div><strong>Уведомления:</strong></div>
                        <label><input type="checkbox" id="notifyTradesCheckbox" ${window.currentUser.notify_trades ? 'checked' : ''}> О сделках</label><br>
                        <label><input type="checkbox" id="notifyTopupCheckbox" ${window.currentUser.notify_topup ? 'checked' : ''}> О пополнении</label><br>
                        <label><input type="checkbox" id="notifyReferralCheckbox" ${window.currentUser.notify_referral ? 'checked' : ''}> О рефералах</label><br>
                    </div>
                    <button id="saveCommonSettings" style="margin-top: 20px;">Сохранить общие настройки</button>
                </div>
            `;
            document.getElementById('app').innerHTML = html;
            
            // Обновление отображения значений слайдеров
            games.forEach(game => {
                const slider = document.getElementById(`limit_${game.id}`);
                const span = document.getElementById(`val_${game.id}`);
                if (slider && span) {
                    slider.oninput = () => { span.innerText = slider.value + ' ⭐'; };
                    const btn = document.getElementById(`save_${game.id}`);
                    if (btn) {
                        btn.onclick = async () => {
                            const newVal = parseInt(slider.value);
                            const oldVal = limits[game.id] !== undefined ? limits[game.id] : game.default;
                            if (newVal > oldVal) {
                                window.showCustomModal('Ошибка', 'Нельзя повысить лимит, только понизить');
                                return;
                            }
                            try {
                                await updateGameLimit(game.id, newVal);
                                window.showCustomModal('Успех', `Лимит для "${game.name}" установлен на ${newVal} ⭐`);
                                await renderSettingsTab(); // обновить интерфейс
                            } catch(e) {
                                window.showCustomModal('Ошибка', e.message);
                            }
                        };
                    }
                }
            });
            
            document.getElementById('saveCommonSettings').onclick = async () => {
                const hideRating = document.getElementById('hideRatingCheckbox').checked;
                const useSliders = document.getElementById('useSlidersCheckbox').checked;
                const notifyTrades = document.getElementById('notifyTradesCheckbox').checked;
                const notifyTopup = document.getElementById('notifyTopupCheckbox').checked;
                const notifyReferral = document.getElementById('notifyReferralCheckbox').checked;
                if (window.setUseSliders) window.setUseSliders(useSliders);
                await window.supabase.from('users').update({
                    hide_rating: hideRating,
                    notify_trades: notifyTrades,
                    notify_topup: notifyTopup,
                    notify_referral: notifyReferral
                }).eq('id', window.userId);
                window.currentUser.hide_rating = hideRating;
                window.currentUser.notify_trades = notifyTrades;
                window.currentUser.notify_topup = notifyTopup;
                window.currentUser.notify_referral = notifyReferral;
                window.showCustomModal('Успех', 'Общие настройки сохранены');
            };
        }
        
        try {
            const { user, isNew } = await window.getOrCreateUser();
            window.currentUser = user;
            await window.renderStocksTab(window.currentUser);
            if (isNew) setTimeout(() => window.renderProfileTab(
                window.currentUser, window.supabase, window.userId, window.fromCents, window.showCustomModal,
                window.getUserStats, window.getUserRank, window.getEarnedAchievements, window.getAllAchievements,
                window.updateBellBadge, window.showNotificationsModal
            ), 500);
            if (typeof setupRealtimeNotifications === 'function') setupRealtimeNotifications();
            if (typeof window.updateBellBadge === 'function') await window.updateBellBadge();
            if (typeof initTopupModal === 'function') initTopupModal();
            
            window.supabase.channel('global-updates')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'users' }, () => { if (document.querySelector('.tab.active')?.dataset.tab === 'rating') window.refreshActiveTab(); })
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'trades' }, () => { if (document.querySelector('.tab.active')?.dataset.tab === 'rating') window.refreshActiveTab(); })
                .subscribe();
        } catch(err) {
            document.getElementById('app').innerHTML = `<div class="card error">Ошибка: ${err.message}</div>`;
            console.error(err);
            return;
        }
        
        document.getElementById('headerNotificationBell')?.addEventListener('click', () => { if (window.showNotificationsModal) window.showNotificationsModal(); });
        document.getElementById('headerSettingsGear')?.addEventListener('click', () => renderSettingsTab());
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', async () => {
                const tabName = tab.dataset.tab;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                switch(tabName) {
                    case 'profile': await window.renderProfileTab(window.currentUser, window.supabase, window.userId, window.fromCents, window.showCustomModal, window.getUserStats, window.getUserRank, window.getEarnedAchievements, window.getAllAchievements, window.updateBellBadge, window.showNotificationsModal); break;
                    case 'stocks': await window.renderStocksTab(window.currentUser); break;
                    case 'analytics': await window.renderAnalyticsTab(); break;
                    case 'rating': await window.renderRatingTab(); break;
                    case 'wallet': await window.renderWalletTab(); break;
                    case 'referral': await window.renderReferralTab(); break;
                    case 'games': await window.renderGamesTab(); break;
                    case 'admin': await window.renderAdminTab(); break;
                }
            });
        });
        
        // Простой скролл табов (нативный)
        (function() {
            const wrapper = document.querySelector('.tabs-wrapper');
            if (!wrapper) return;
            let isDown = false, startX, scrollLeft;
            wrapper.addEventListener('mousedown', (e) => { isDown = true; startX = e.pageX - wrapper.offsetLeft; scrollLeft = wrapper.scrollLeft; wrapper.style.cursor = 'grabbing'; });
            window.addEventListener('mouseup', () => { isDown = false; wrapper.style.cursor = 'grab'; });
            window.addEventListener('mousemove', (e) => { if (!isDown) return; e.preventDefault(); const x = e.pageX - wrapper.offsetLeft; const walk = (x - startX) * 1.5; wrapper.scrollLeft = scrollLeft - walk; });
            wrapper.addEventListener('dragstart', (e) => e.preventDefault());
        })();
    })();
</script>
</body>
</html>
