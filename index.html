<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Акции – биржа</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="app">Загрузка...</div>
    <script>
        // ---------- ДЛЯ ОТЛАДКИ (показываем в консоли) ----------
        console.log("Скрипт запущен");

        const tg = window.Telegram.WebApp;
        tg.ready();
        console.log("tg объект получен");

        let userId = tg.initDataUnsafe?.user?.id;
        let username = tg.initDataUnsafe?.user?.username || "guest";

        console.log("initDataUnsafe:", tg.initDataUnsafe);
        console.log("userId из Telegram:", userId);

        // Если userId не определён (например, при открытии в браузере), используем тестовый ID
        if (!userId) {
            console.warn("userId не найден, используем тестовый 123456");
            userId = 123456;
            username = "test_user";
        }

        // ---------- НАСТРОЙКИ SUPABASE (замените на свои) ----------
        const SUPABASE_URL = "https://gsutnhhklidxmewdkcvk.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzdXRuaGhrbGlkeG1ld2RrY3ZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NzA2MTEsImV4cCI6MjA5NjE0NjYxMX0.XEtyJVT0BfmEgAAsGagPHRdHhmCgrtWEbtzov0c3EXc";
        // ---------------------------------------------------------

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        console.log("Supabase клиент создан");

        let currentUser = null;

        async function initUser() {
            console.log("initUser запущен, userId =", userId);
            try {
                // Проверяем, существует ли пользователь в таблице users
                let { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('id', userId)
                    .single();

                if (error && error.code === 'PGRST116') {
                    console.log("Пользователь не найден, создаём нового");
                    // Создаём нового пользователя
                    const { data: newUser, error: insertError } = await supabase
                        .from('users')
                        .insert([{ id: userId, username: username, shares: 100, stars_balance: 50 }])
                        .select()
                        .single();
                    if (insertError) {
                        console.error("Ошибка при вставке:", insertError);
                        document.getElementById('app').innerHTML = `<p>Ошибка базы данных: ${insertError.message}</p>`;
                        return;
                    }
                    currentUser = newUser;
                } else if (error) {
                    console.error("Ошибка запроса:", error);
                    document.getElementById('app').innerHTML = `<p>Ошибка запроса: ${error.message}</p>`;
                    return;
                } else {
                    currentUser = data;
                }

                console.log("Пользователь загружен:", currentUser);
                renderUI();
            } catch (err) {
                console.error("Исключение в initUser:", err);
                document.getElementById('app').innerHTML = `<p>Критическая ошибка: ${err.message}</p>`;
            }
        }

        async function renderUI() {
            if (!currentUser) {
                document.getElementById('app').innerHTML = '<p>Нет данных пользователя</p>';
                return;
            }

            // Получаем активные ордера (если таблица orders есть, иначе показываем только баланс)
            let ordersHtml = '<p>Нет активных ордеров</p>';
            try {
                const { data: orders, error } = await supabase
                    .from('orders')
                    .select('*')
                    .eq('status', 'active')
                    .order('price_per_share', { ascending: true });
                if (!error && orders && orders.length > 0) {
                    ordersHtml = orders.map(order => `
                        <div style="border-bottom:1px solid #ccc; padding:8px 0;">
                            ${order.amount} акций по ${order.price_per_share} Stars
                            <button onclick="buyOrder(${order.id}, ${order.price_per_share}, ${order.amount}, ${order.seller_id})">Купить</button>
                        </div>
                    `).join('');
                } else if (error) {
                    console.warn("Ошибка загрузки ордеров:", error);
                    // Не показываем ошибку пользователю, просто оставляем "Нет ордеров"
                }
            } catch(e) {
                console.warn("Ошибка при получении ордеров:", e);
            }

            const html = `
                <div style="padding: 16px;">
                    <h1>Биржа акций</h1>
                    <p><strong>ID:</strong> ${currentUser.id}</p>
                    <p><strong>Акций:</strong> ${currentUser.shares}</p>
                    <p><strong>Stars:</strong> ${currentUser.stars_balance}</p>
                    <hr>
                    <h3>Продать акции</h3>
                    <input type="number" id="sellAmount" placeholder="Количество" style="width:100%; padding:8px; margin:8px 0;">
                    <input type="number" id="sellPrice" placeholder="Цена за 1 акцию (Stars)" style="width:100%; padding:8px; margin:8px 0;">
                    <button id="sellBtn" style="width:100%; padding:10px; background:#0088cc; color:white; border:none; border-radius:8px;">Продать</button>
                    <hr>
                    <h3>Активные ордера на продажу</h3>
                    <div id="ordersList">${ordersHtml}</div>
                </div>
            `;
            document.getElementById('app').innerHTML = html;

            // Обработчик продажи
            document.getElementById('sellBtn').addEventListener('click', async () => {
                const amount = parseInt(document.getElementById('sellAmount').value);
                const price = parseInt(document.getElementById('sellPrice').value);
                if (isNaN(amount) || isNaN(price) || amount <= 0 || price <= 0) {
                    alert('Введите корректные количество и цену');
                    return;
                }
                if (currentUser.shares < amount) {
                    alert(`Недостаточно акций. У вас ${currentUser.shares}`);
                    return;
                }
                // Создаём ордер
                const { error } = await supabase
                    .from('orders')
                    .insert([{
                        seller_id: userId,
                        amount: amount,
                        price_per_share: price,
                        status: 'active'
                    }]);
                if (error) {
                    alert('Ошибка создания ордера: ' + error.message);
                } else {
                    // Уменьшаем акции продавца
                    const newShares = currentUser.shares - amount;
                    await supabase.from('users').update({ shares: newShares }).eq('id', userId);
                    currentUser.shares = newShares;
                    renderUI(); // обновляем
                }
            });
        }

        // Глобальная функция для кнопок "Купить" (чтобы была доступна из onclick)
        window.buyOrder = async function(orderId, price, amount, sellerId) {
            const totalStars = price * amount;
            if (currentUser.stars_balance < totalStars) {
                alert(`Недостаточно Stars. Нужно ${totalStars}, у вас ${currentUser.stars_balance}`);
                return;
            }
            try {
                // Начинаем транзакцию (упрощённо, без RPC)
                // 1. Списываем Stars у покупателя
                await supabase.from('users').update({ stars_balance: currentUser.stars_balance - totalStars }).eq('id', userId);
                // 2. Добавляем акции покупателю
                await supabase.from('users').update({ shares: currentUser.shares + amount }).eq('id', userId);
                // 3. Получаем баланс продавца и добавляем Stars
                const { data: sellerData } = await supabase.from('users').select('stars_balance').eq('id', sellerId).single();
                await supabase.from('users').update({ stars_balance: sellerData.stars_balance + totalStars }).eq('id', sellerId);
                // 4. Закрываем ордер
                await supabase.from('orders').update({ status: 'completed' }).eq('id', orderId);
                // Обновляем локального пользователя
                currentUser.stars_balance -= totalStars;
                currentUser.shares += amount;
                renderUI();
                alert('Сделка успешно завершена!');
            } catch(err) {
                alert('Ошибка при покупке: ' + err.message);
                console.error(err);
            }
        };

        // Запуск
        initUser();
    </script>
</body>
</html>
