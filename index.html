<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Акции – биржа</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto; margin: 0; padding: 16px; background: #f0f2f5; }
        .card { background: white; border-radius: 20px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .error { color: red; background: #ffe0e0; padding: 12px; border-radius: 12px; }
        button { background: #0088cc; color: white; border: none; padding: 12px 16px; border-radius: 40px; font-size: 16px; font-weight: 600; width: 100%; margin-top: 8px; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.97); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 40px; font-size: 16px; background: #fafafa; }
        .buy-btn { background: #2ecc71; width: auto; padding: 6px 16px; margin: 0; }
        .order-item { border-bottom: 1px solid #eee; padding: 8px 0; display: flex; justify-content: space-between; align-items: center; }
        .status { font-size: 12px; color: gray; margin-top: 8px; }
        #price-chart { width: 100%; height: 300px; margin-top: 8px; background: white; border-radius: 12px; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="app">Загрузка...</div>
    <script>
        (async () => {
            // ----------------------------- 1. Telegram -----------------------------
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            let userId = tg.initDataUnsafe?.user?.id;
            const username = tg.initDataUnsafe?.user?.username || "player";
            if (!userId) {
                console.warn("⚠️ Не удалось получить ID из Telegram, используем тестовый 123456");
                userId = 123456;
            }

            // ----------------------------- 2. Supabase -----------------------------
            const SUPABASE_URL = "https://gsutnhhklidxmewdkcvk.supabase.co";
            const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzdXRuaGhrbGlkeG1ld2RrY3ZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NzA2MTEsImV4cCI6MjA5NjE0NjYxMX0.XEtyJVT0BfmEgAAsGagPHRdHhmCgrtWEbtzov0c3EXc";
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            let currentUser = null;

            // ----------------------------- 3. Пользователь -----------------------------
            async function getOrCreateUser() {
                const { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('id', userId)
                    .maybeSingle();
                if (error) throw new Error(`Ошибка запроса: ${error.message}`);
                if (!data) {
                    const { data: newUser, error: insertError } = await supabase
                        .from('users')
                        .insert([{ id: userId, username: username, shares: 100, stars_balance: 50 }])
                        .select()
                        .single();
                    if (insertError) throw new Error(`Ошибка вставки: ${insertError.message}`);
                    return newUser;
                }
                return data;
            }

            // ----------------------------- 4. Ордера -----------------------------
            async function getActiveOrders() {
                const { data, error } = await supabase
                    .from('orders')
                    .select('*')
                    .eq('status', 'active')
                    .order('price_per_share', { ascending: true });
                if (error) throw new Error(`Ошибка загрузки ордеров: ${error.message}`);
                return data || [];
            }

            // ----------------------------- 5. История цен -----------------------------
            async function getPriceHistory() {
                const { data, error } = await supabase
                    .from('price_history')
                    .select('price, created_at')
                    .order('created_at', { ascending: true })
                    .limit(100);
                if (error) throw new Error(`Ошибка загрузки истории цен: ${error.message}`);
                return data || [];
            }

            // ----------------------------- 6. Создание ордера -----------------------------
            async function createOrder(amount, price) {
                if (currentUser.shares < amount) throw new Error(`Недостаточно акций. У вас ${currentUser.shares}`);
                const { error: orderError } = await supabase
                    .from('orders')
                    .insert([{ seller_id: userId, amount, price_per_share: price, status: 'active' }]);
                if (orderError) throw new Error(`Ошибка создания ордера: ${orderError.message}`);
                const newShares = currentUser.shares - amount;
                const { error: updateError } = await supabase
                    .from('users')
                    .update({ shares: newShares })
                    .eq('id', userId);
                if (updateError) throw new Error(`Ошибка списания акций: ${updateError.message}`);
                currentUser.shares = newShares;
                return true;
            }

            // ----------------------------- 7. Покупка -----------------------------
            async function executeTrade(order) {
                const totalStars = order.amount * order.price_per_share;
                if (currentUser.stars_balance < totalStars) throw new Error(`Недостаточно Stars. Нужно ${totalStars}, у вас ${currentUser.stars_balance}`);
                const newBuyerStars = currentUser.stars_balance - totalStars;
                const newBuyerShares = currentUser.shares + order.amount;
                await supabase.from('users').update({ stars_balance: newBuyerStars }).eq('id', userId);
                await supabase.from('users').update({ shares: newBuyerShares }).eq('id', userId);
                const { data: seller } = await supabase.from('users').select('stars_balance').eq('id', order.seller_id).single();
                const newSellerStars = seller.stars_balance + totalStars;
                await supabase.from('users').update({ stars_balance: newSellerStars }).eq('id', order.seller_id);
                await supabase.from('orders').update({ status: 'completed' }).eq('id', order.id);
                currentUser.stars_balance = newBuyerStars;
                currentUser.shares = newBuyerShares;
                return true;
            }

            // ----------------------------- 8. Отрисовка графика (Canvas) -----------------------------
            function drawCanvasChart(history) {
                const container = document.getElementById('price-chart');
                if (!container) return;
                // Удаляем старый canvas, если есть
                container.innerHTML = '';
                if (!history || history.length === 0) {
                    container.innerHTML = '<p style="text-align:center; padding:20px;">Нет данных для графика</p>';
                    return;
                }
                const canvas = document.createElement('canvas');
                const width = container.clientWidth;
                const height = 300;
                canvas.width = width;
                canvas.height = height;
                canvas.style.width = '100%';
                canvas.style.height = 'auto';
                container.appendChild(canvas);
                const ctx = canvas.getContext('2d');
                const values = history.map(h => h.price);
                const max = Math.max(...values);
                const min = Math.min(...values);
                const range = max - min;
                const padding = { top: 20, bottom: 30, left: 40, right: 20 };
                const graphWidth = width - padding.left - padding.right;
                const graphHeight = height - padding.top - padding.bottom;
                const stepX = graphWidth / (values.length - 1);
                // Очистка
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, width, height);
                // Оси
                ctx.beginPath();
                ctx.strokeStyle = '#ccc';
                ctx.lineWidth = 1;
                ctx.moveTo(padding.left, padding.top);
                ctx.lineTo(padding.left, height - padding.bottom);
                ctx.lineTo(width - padding.right, height - padding.bottom);
                ctx.stroke();
                // Линия
                ctx.beginPath();
                ctx.strokeStyle = '#0088cc';
                ctx.lineWidth = 2;
                for (let i = 0; i < values.length; i++) {
                    const x = padding.left + i * stepX;
                    let y;
                    if (range === 0) y = padding.top + graphHeight / 2;
                    else y = padding.top + graphHeight - ((values[i] - min) / range) * graphHeight;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
                // Подписи
                ctx.fillStyle = '#333';
                ctx.font = '11px sans-serif';
                ctx.fillText(max.toFixed(1), padding.left - 30, padding.top + 10);
                ctx.fillText(min.toFixed(1), padding.left - 30, height - padding.bottom - 5);
                // Подписи по оси X (первые и последние)
                if (history.length > 0) {
                    const firstDate = new Date(history[0].created_at).toLocaleDateString();
                    const lastDate = new Date(history[history.length-1].created_at).toLocaleDateString();
                    ctx.fillText(firstDate, padding.left, height - padding.bottom + 15);
                    ctx.fillText(lastDate, width - padding.right - 30, height - padding.bottom + 15);
                }
            }

            // ----------------------------- 9. Отрисовка UI -----------------------------
            function renderUI(orders, priceHistory) {
                const html = `
                    <div class="card">
                        <h2>💰 Мой баланс</h2>
                        <p>📊 Акций: <strong>${currentUser.shares}</strong></p>
                        <p>⭐ Stars: <strong>${currentUser.stars_balance}</strong></p>
                        <p class="status">ID: ${userId}</p>
                    </div>
                    <div class="card">
                        <h3>📈 График цены акции</h3>
                        <div id="price-chart"></div>
                    </div>
                    <div class="card">
                        <h3>📈 Продать акции</h3>
                        <input type="number" id="sellAmount" placeholder="Количество" min="1">
                        <input type="number" id="sellPrice" placeholder="Цена за 1 акцию (Stars)" min="1">
                        <button id="sellBtn">➕ Выставить на продажу</button>
                    </div>
                    <div class="card">
                        <h3>📋 Активные ордера на продажу</h3>
                        <div id="ordersList"></div>
                    </div>
                `;
                document.getElementById('app').innerHTML = html;
                // Отрисовка графика
                drawCanvasChart(priceHistory);
                // Ордера
                const ordersDiv = document.getElementById('ordersList');
                if (orders.length === 0) {
                    ordersDiv.innerHTML = '<p>Нет активных ордеров</p>';
                } else {
                    orders.forEach(order => {
                        const div = document.createElement('div');
                        div.className = 'order-item';
                        div.innerHTML = `
                            <div>${order.amount} шт. по ${order.price_per_share} ⭐ (всего ${order.amount * order.price_per_share})</div>
                            <button class="buy-btn" data-order='${JSON.stringify(order)}'>Купить</button>
                        `;
                        ordersDiv.appendChild(div);
                    });
                    document.querySelectorAll('.buy-btn').forEach(btn => {
                        btn.addEventListener('click', async () => {
                            const order = JSON.parse(btn.dataset.order);
                            try {
                                await executeTrade(order);
                                alert('Сделка успешно завершена!');
                                loadPage();
                            } catch (err) {
                                alert(err.message);
                            }
                        });
                    });
                }
                document.getElementById('sellBtn').addEventListener('click', async () => {
                    const amount = parseInt(document.getElementById('sellAmount').value);
                    const price = parseInt(document.getElementById('sellPrice').value);
                    if (isNaN(amount) || isNaN(price) || amount <= 0 || price <= 0) {
                        alert('Введите корректные количество и цену');
                        return;
                    }
                    try {
                        await createOrder(amount, price);
                        alert('Ордер создан');
                        loadPage();
                    } catch (err) {
                        alert(err.message);
                    }
                });
            }

            async function loadPage() {
                try {
                    currentUser = await getOrCreateUser();
                    const orders = await getActiveOrders();
                    const priceHistory = await getPriceHistory();
                    renderUI(orders, priceHistory);
                } catch (err) {
                    console.error(err);
                    document.getElementById('app').innerHTML = `<div class="card error">Ошибка: ${err.message}</div>`;
                }
            }

            loadPage();
        })();
    </script>
</body>
</html>
