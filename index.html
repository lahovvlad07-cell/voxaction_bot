<!-- –Т–°–Х –§–£–Э–Ъ–¶–Ш–Ш API –Т–°–Ґ–†–Ю–Х–Э–Ђ –Ч–Ф–Х–°–ђ -->
<script>
    // ==================== API.JS (–Т–°–Ґ–†–Ю–Х–Э–Э–Р–ѓ –Т–Х–†–°–Ш–ѓ) ====================
    window.toCents = (v) => Math.round(parseFloat(v) * 100);
    window.fromCents = (c) => (c / 100).toFixed(2);
    
    async function ensureWelcomeAchievement(userId) {
        try {
            const { data: achData } = await window.supabase.from('achievements').select('id').eq('name', 'рЯМЯ –Я–µ—А–≤—Л–є —И–∞–≥').maybeSingle();
            if (!achData) return;
            const { data: existing } = await window.supabase.from('user_achievements').select('achievement_id').eq('user_id', userId).eq('achievement_id', achData.id).maybeSingle();
            if (!existing) {
                await window.supabase.from('user_achievements').insert({ user_id: userId, achievement_id: achData.id, earned_at: new Date().toISOString() });
            }
        } catch(e) { console.error(e); }
    }
    
    function generateReferralCode() {
        return 'REF' + Math.random().toString(36).substring(2, 8).toUpperCase();
    }
    
    window.getOrCreateUser = async function() {
        let { data, error } = await window.supabase.from('users').select('*').eq('id', window.userId).maybeSingle();
        if (error) throw new Error(error.message);
        if (!data) {
            const avatarOptions = ['рЯС§','рЯША','рЯШО','рЯР±','рЯРґ','рЯ¶К','рЯРЉ','в≠Р','рЯОЃ','вЪљ','рЯЪА','рЯТО','рЯМЄ','рЯФ•','вЭ§пЄП','рЯСН','рЯОЙ','рЯМЯ','рЯНХ','рЯПЖ'];
            const randomAvatar = avatarOptions[Math.floor(Math.random() * avatarOptions.length)];
            const bgOptions = ['gradient1','gradient2','gradient3','gradient4','gradient5','gradient6','gradient7','gradient8','gradient9','gradient10','gradient11'];
            const randomBg = bgOptions[Math.floor(Math.random() * bgOptions.length)];
            const borderOptions = ['#ffffff','#ff0000','#00ff00','#0000ff','#ffff00','#ff69b4','#00ffff','#9b30ff'];
            const randomBorder = borderOptions[Math.floor(Math.random() * borderOptions.length)];
            let referralCode = generateReferralCode();
            let existingCode = await window.supabase.from('users').select('referral_code').eq('referral_code', referralCode).maybeSingle();
            while (existingCode.data) {
                referralCode = generateReferralCode();
                existingCode = await window.supabase.from('users').select('referral_code').eq('referral_code', referralCode).maybeSingle();
            }
            let referredById = null;
            const userCheck = await window.supabase.from('users').select('referred_by').eq('id', window.userId).maybeSingle();
            if (userCheck.data && userCheck.data.referred_by) referredById = userCheck.data.referred_by;
            const { data: newUser, error: insertError } = await window.supabase.from('users').insert([{
                id: window.userId,
                username: window.username,
                shares: 0,
                stars_balance: 0,
                selected_achievements: [],
                avatar_url: randomAvatar,
                avatar_bg: randomBg,
                avatar_border: randomBorder,
                referral_code: referralCode,
                custom_ref_code: null,
                referred_by: referredById,
                registered_at: new Date().toISOString(),
                total_earned_shares: 0,
                referral_bonus_claimed: false,
                referral_count: 0,
                hide_rating: false,
                notify_trades: true,
                notify_topup: true,
                notify_referral: true
            }]).select().single();
            if (insertError) throw new Error(insertError.message);
            if (referredById) {
                await window.supabase.from('users').update({ stars_balance: 500 }).eq('id', window.userId);
                await window.supabase.from('referrals').insert({ referrer_id: referredById, referred_id: window.userId, registered_at: new Date().toISOString(), topup_completed: false, bonus_earned: false });
                const referrer = await window.supabase.from('users').select('referral_count').eq('id', referredById).single();
                if (referrer.data) await window.supabase.from('users').update({ referral_count: (referrer.data.referral_count || 0) + 1 }).eq('id', referredById);
                await window.supabase.from('notifications').insert({ user_id: referredById, message: `рЯОЙ –Э–Њ–≤—Л–є —А–µ—Д–µ—А–∞–ї! ${window.username} –Ј–∞—А–µ–≥–Є—Б—В—А–Є—А–Њ–≤–∞–ї—Б—П –њ–Њ –≤–∞—И–µ–є —Б—Б—Л–ї–Ї–µ.`, type: 'notify_referral', is_read: false });
            }
            await ensureWelcomeAchievement(window.userId);
            return { user: newUser, isNew: true };
        }
        await ensureWelcomeAchievement(window.userId);
        let updated = false;
        if (!data.selected_achievements) { data.selected_achievements = []; updated = true; }
        if (!data.avatar_url) { data.avatar_url = 'рЯС§'; updated = true; }
        if (!data.avatar_bg) { data.avatar_bg = 'gradient1'; updated = true; }
        if (!data.avatar_border) { data.avatar_border = '#ffffff'; updated = true; }
        if (!data.registered_at) { data.registered_at = new Date().toISOString(); updated = true; }
        if (!data.referral_code) {
            let newCode = generateReferralCode();
            let existing = await window.supabase.from('users').select('referral_code').eq('referral_code', newCode).maybeSingle();
            while (existing.data) { newCode = generateReferralCode(); existing = await window.supabase.from('users').select('referral_code').eq('referral_code', newCode).maybeSingle(); }
            data.referral_code = newCode; updated = true;
        }
        if (data.custom_ref_code === undefined) { data.custom_ref_code = null; updated = true; }
        if (data.total_earned_shares === undefined) { data.total_earned_shares = 0; updated = true; }
        if (data.referral_count === undefined) { data.referral_count = 0; updated = true; }
        if (data.hide_rating === undefined) { data.hide_rating = false; updated = true; }
        if (data.notify_trades === undefined) { data.notify_trades = true; updated = true; }
        if (data.notify_topup === undefined) { data.notify_topup = true; updated = true; }
        if (data.notify_referral === undefined) { data.notify_referral = true; updated = true; }
        if (updated) {
            await window.supabase.from('users').update({
                selected_achievements: data.selected_achievements,
                avatar_url: data.avatar_url,
                avatar_bg: data.avatar_bg,
                avatar_border: data.avatar_border,
                referral_code: data.referral_code,
                custom_ref_code: data.custom_ref_code,
                registered_at: data.registered_at,
                total_earned_shares: data.total_earned_shares,
                referral_count: data.referral_count,
                hide_rating: data.hide_rating,
                notify_trades: data.notify_trades,
                notify_topup: data.notify_topup,
                notify_referral: data.notify_referral
            }).eq('id', window.userId);
        }
        return { user: data, isNew: false };
    };
    
    // ========== –У–Ы–Р–Т–Э–Р–ѓ –§–£–Э–Ъ–¶–Ш–ѓ –Ф–Ы–ѓ –Ы–Ш–Ь–Ш–Ґ–Э–Ю–Щ –Ч–Р–ѓ–Т–Ъ–Ш ==========
    window.createBuyOrder = async function(amountStars, priceStars) {
        const amountCents = window.toCents(amountStars);
        const priceCents = window.toCents(priceStars);
        if (amountCents < 100) throw new Error('–Ь–Є–љ–Є–Љ—Г–Љ 1 –∞–Ї—Ж–Є—П');
        if (priceCents < 100) throw new Error('–Ь–Є–љ–Є–Љ—Г–Љ 1 Star');
        const { user: freshUser } = await window.getOrCreateUser();
        window.currentUser = freshUser;
        const requiredStars = amountStars * priceStars;
        if (window.currentUser.stars_balance < requiredStars) {
            throw new Error(`вЭМ –Э–µ–і–Њ—Б—В–∞—В–Њ—З–љ–Њ –Ј–≤—С–Ј–і: –љ—Г–ґ–љ–Њ ${requiredStars.toFixed(2)} в≠Р, —Г –≤–∞—Б ${window.currentUser.stars_balance.toFixed(2)} в≠Р`);
        }
        const { data, error } = await window.supabase.rpc('create_buy_order_matched', {
            p_user_id: window.userId,
            p_amount_cents: amountCents,
            p_price_cents: priceCents
        });
        if (error) throw new Error(error.message);
        if (!data.success) throw new Error(data.error);
        const executed = window.fromCents(data.executed_amount || 0);
        const remaining = window.fromCents(data.remaining_amount || 0);
        if (executed > 0 && window.showToast) window.showToast(`вЬЕ –Ъ—Г–њ–ї–µ–љ–Њ ${executed} —И—В. –њ–Њ –ї—Г—З—И–µ–є —Ж–µ–љ–µ`);
        if (remaining > 0 && window.showToast) window.showToast(`рЯУМ –Ю—Б—В–∞—В–Њ–Ї ${remaining} —И—В. –≤—Л—Б—В–∞–≤–ї–µ–љ –≤ —Б—В–∞–Ї–∞–љ`);
        return true;
    };
    
    // ========== –Ю–°–Ґ–Р–Ы–ђ–Э–Ђ–Х –§–£–Э–Ъ–¶–Ш–Ш (–Ч–Р–У–Ы–£–®–Ъ–Ш, —З—В–Њ–±—Л –љ–µ –±—Л–ї–Њ –Њ—И–Є–±–Њ–Ї) ==========
    window.createOrder = async () => { throw new Error('createOrder –љ–µ —А–µ–∞–ї–Є–Ј–Њ–≤–∞–љ–∞'); };
    window.executePartialTrade = async () => { throw new Error('executePartialTrade –љ–µ —А–µ–∞–ї–Є–Ј–Њ–≤–∞–љ–∞'); };
    window.getActiveOrders = async () => [];
    window.getUserOrders = async () => [];
    window.cancelOrder = async () => true;
    window.getRecentTrades = async () => [];
    window.getPriceHistory = async () => [];
    window.getCurrentPrice = async () => 100;
    window.getTotalMarketCap = async () => ({ totalShares: 0, currentPrice: 100, marketCap: 0 });
    window.getLeaderboard = async () => [];
    window.getUserRank = async () => null;
    window.getUserStats = async () => ({ totalTrades: 0, totalVolume: 0 });
    window.getEarnedAchievements = async () => [];
    window.getAllAchievements = async () => [];
    window.getSellerRating = async () => null;
    window.updateUserBorder = async () => true;
    window.renderAvatarHtml = () => '<div>рЯС§</div>';
    window.getReferralsList = async () => [];
    window.getReferralRewardsProgress = async () => null;
    window.adminFetchStats = async () => ({});
    window.adminFetchUsers = async () => ({});
    window.adminCancelOrder = async () => ({});
    window.adminAddShares = async () => ({});
    window.adminAddStars = async () => ({});
    window.createInvoice = async () => ({});
    window.claimReferralBonus = async () => ({});
    window.getEarnedAchievementsForUser = async () => [];
    window.getUserStatsForUser = async () => ({ totalTrades: 0, totalVolume: 0 });
    window.getUserRankForUser = async () => null;
    
    console.log('вЬЕ API –≤—Б—В—А–Њ–µ–љ, createBuyOrder –Њ–њ—А–µ–і–µ–ї–µ–љ–∞');
</script>

<!-- –Ю—Б—В–∞–ї—М–љ—Л–µ —Б–Ї—А–Є–њ—В—Л (–Њ–љ–Є –Љ–Њ–≥—Г—В —А–∞—Б—Б—З–Є—В—Л–≤–∞—В—М –љ–∞ —Д—Г–љ–Ї—Ж–Є–Є –≤—Л—И–µ) -->

<script>
    (async () => {
        // –Я—А–Њ–≤–µ—А–Ї–∞, —З—В–Њ createBuyOrder –Њ–њ—А–µ–і–µ–ї–µ–љ–∞

            document.getElementById('app').innerHTML = '<div class="card error" style="color:red;">–Ю—И–Є–±–Ї–∞: —Д—Г–љ–Ї—Ж–Є—П createBuyOrder –љ–µ –љ–∞–є–і–µ–љ–∞ (–і–∞–ґ–µ –њ–Њ—Б–ї–µ –≤—Б—В—А–∞–Є–≤–∞–љ–Є—П). –Я—А–Њ–≤–µ—А—М—В–µ –Ї–Њ–љ—Б–Њ–ї—М.</div>';
            return;
        }
        
        // Drag tabs
        const tabsWrapper = document.querySelector('.tabs-wrapper');
        let isDown = false, startX, scrollLeft;
        if (tabsWrapper) {
            tabsWrapper.addEventListener('mousedown', (e) => { isDown = true; startX = e.pageX - tabsWrapper.offsetLeft; scrollLeft = tabsWrapper.scrollLeft; tabsWrapper.style.cursor = 'grabbing'; });
            window.addEventListener('mouseup', () => { isDown = false; tabsWrapper.style.cursor = 'grab'; });
            window.addEventListener('mousemove', (e) => { if (!isDown) return; e.preventDefault(); const x = e.pageX - tabsWrapper.offsetLeft; const walk = (x - startX) * 2; tabsWrapper.scrollLeft = scrollLeft - walk; });
        }
        
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        window.tg = tg;
        window.userId = tg.initDataUnsafe?.user?.id;
        window.username = tg.initDataUnsafe?.user?.username || `user_${window.userId}`;
        if (!window.userId) { document.getElementById('app').innerHTML = '<div class="card" style="text-align:center;">–Ю—И–Є–±–Ї–∞: –Ј–∞–њ—Г—Б—В–Є—В–µ —З–µ—А–µ–Ј Telegram</div>'; return; }
        if (window.userId === 6048486427) document.querySelector('.admin-tab').style.display = 'inline-flex';
        
        window.showCustomModal = function(title, message) {
            const modalHtml = `
                <div class="modal" id="customMessageModal" style="display:flex;">

            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            const modal = document.getElementById('customMessageModal');
            document.getElementById('closeCustomModal').onclick = () => modal.remove();
            document.getElementById('customModalOkBtn').onclick = () => modal.remove();
        };
        
        window.showToast = function(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        };
        
        const SUPABASE_URL = "https://gsutnhhklidxmewdkcvk.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzdXRuaGhrbGlkeG1ld2RrY3ZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NzA2MTEsImV4cCI6MjA5NjE0NjYxMX0.XEtyJVT0BfmEgAAsGagPHRdHhmCgrtWEbtzov0c3EXc";
        window.supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        window.currentUser = null;
        window.BACKEND_URL = 'https://voxaction-bot-main.onrender.com';
        
        async function renderSettingsTab() {
            const hideRating = window.currentUser.hide_rating || false;
            const customColor = localStorage.getItem('custom_color') || '#2b6e9e';
            const notifyTrades = window.currentUser.notify_trades ?? true;
            const notifyTopup = window.currentUser.notify_topup ?? true;
            const notifyReferral = window.currentUser.notify_referral ?? true;
            const html = `<div class="card"><h2>вЪЩпЄП –Э–∞—Б—В—А–Њ–є–Ї–Є</h2><label><input type="checkbox" id="hideRatingCheckbox" ${hideRating?'checked':''}> –°–Ї—А—Л—В—М –Є–Ј —А–µ–є—В–Є–љ–≥–∞</label><br><br><div><strong>–£–≤–µ–і–Њ–Љ–ї–µ–љ–Є—П –Њ—В –±–Њ—В–∞:</strong></div><label><input type="checkbox" id="notifyTradesCheckbox" ${notifyTrades?'checked':''}> –Ю —Б–і–µ–ї–Ї–∞—Е</label><br><label><input type="checkbox" id="notifyTopupCheckbox" ${notifyTopup?'checked':''}> –Ю –њ–Њ–њ–Њ–ї–љ–µ–љ–Є–Є</label><br><label><input type="checkbox" id="notifyReferralCheckbox" ${notifyReferral?'checked':''}> –Ю —А–µ—Д–µ—А–∞–ї–∞—Е</label><br><br><div><strong>–¶–≤–µ—В –∞–Ї—Ж–µ–љ—В–∞:</strong></div><input type="color" id="colorPicker" value="${customColor}" style="width:60px; padding:0;"><button id="saveSettings">–°–Њ—Е—А–∞–љ–Є—В—М</button></div>`;
            document.getElementById('app').innerHTML = html;
            document.getElementById('colorPicker').addEventListener('input', (e) => document.documentElement.style.setProperty('--accent', e.target.value));

                localStorage.setItem('custom_color', newColor);

                await window.supabase.from('users').update({ hide_rating: newHide, notify_trades: document.getElementById('notifyTradesCheckbox').checked, notify_topup: document.getElementById('notifyTopupCheckbox').checked, notify_referral: document.getElementById('notifyReferralCheckbox').checked }).eq('id', window.userId);

                window.showCustomModal('–£—Б–њ–µ—Е', '–Э–∞—Б—В—А–Њ–є–Ї–Є —Б–Њ—Е—А–∞–љ–µ–љ—Л');
            };
        }
        
        const { user, isNew } = await window.getOrCreateUser();

        document.querySelectorAll('.tab').forEach(tab => {

                if(tabName === 'profile') await window.renderProfileTab(
                    window.currentUser, window.supabase, window.userId, window.fromCents, window.showCustomModal,
                    window.getUserStats, window.getUserRank, window.getEarnedAchievements, window.getAllAchievements,
                    window.updateBellBadge, window.showNotificationsModal
                );
                else if(tabName === 'stocks') await window.renderStocksTab(window.currentUser);
                else if(tabName === 'analytics') await window.renderAnalyticsTab();
                else if(tabName === 'rating') await window.renderRatingTab();
                else if(tabName === 'wallet') await window.renderWalletTab();
                else if(tabName === 'referral') await window.renderReferralTab();
                else if(tabName === 'admin') await window.renderAdminTab();
            });
        });
    })();
</script>
</body>
</html>
