<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Акции – биржа</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        input, button, textarea { user-select: text; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto;
            background: #f0f2f5;
            padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px));
        }
        .loading-bar { position: fixed; top: 0; left: 0; width: 100%; height: 3px; background: #e0e0e0; z-index: 1000; }
        .loading-progress { width: 0%; height: 100%; background: #0088cc; transition: width 0.2s ease; }
        .card { background: white; border-radius: 24px; padding: 16px; margin: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .tabs-wrapper { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e0e0e0; padding: 4px 0 calc(4px + env(safe-area-inset-bottom, 0px)); z-index: 100; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; scrollbar-width: thin; cursor: grab; }
        .tabs-wrapper:active { cursor: grabbing; }
        .tabs { display: inline-flex; gap: 8px; padding: 0 12px; }
        .tab { display: inline-flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px 12px; border-radius: 40px; background: #e0e0e0; transition: all 0.2s; cursor: pointer; min-width: 70px; }
        .tab.active { background: #0088cc; color: white; }
        .tab-icon { font-size: 22px; margin-bottom: 4px; }
        .tab-label { font-size: 12px; font-weight: 500; }
        h2, h3 { font-size: 18px; margin-bottom: 12px; }
        p { margin: 6px 0; }
        button { background: #0088cc; color: white; border: none; padding: 12px 16px; border-radius: 40px; font-size: 16px; font-weight: 600; width: 100%; margin-top: 8px; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.97); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 40px; font-size: 16px; background: #fafafa; }
        .buy-btn, .cancel-btn { width: auto; padding: 6px 16px; margin: 0; font-size: 14px; }
        .cancel-btn { background: #e67e22; }
        .order-item { border-bottom: 1px solid #eee; padding: 12px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .order-info { flex: 2; }
        .order-actions { display: flex; gap: 8px; align-items: center; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .price { font-size: 24px; font-weight: bold; color: #0088cc; }
        .small-text { font-size: 12px; color: #666; }
        .chart-container { width: 100%; height: 250px; margin: 12px 0; background: white; border-radius: 12px; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }
        .ticker { background: #f8f9fa; border-radius: 20px; padding: 8px 12px; overflow: hidden; white-space: nowrap; margin-bottom: 12px; font-size: 14px; }
        .ticker-content { display: inline-block; animation: scroll 20s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .trade-item { display: inline-block; margin-right: 30px; }
        .info-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .info-card { background: #f8f9fa; border-radius: 16px; padding: 12px; text-align: center; }
        .info-label { font-size: 12px; color: #666; }
        .info-value { font-size: 20px; font-weight: bold; margin-top: 4px; }
        .leaderboard-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; }
        .rank { font-weight: bold; width: 40px; }
        .user-name { flex: 2; }
        .user-shares { font-weight: bold; }
        .filter-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .filter-btn, .sort-btn { background: #e9ecef; color: #333; margin: 0; width: auto; padding: 6px 12px; font-size: 14px; cursor: pointer; border-radius: 20px; }
        .filter-btn.active, .sort-btn.active { background: #0088cc; color: white; }
    </style>
</head>
<body>
    <div class="loading-bar" id="loadingBar"><div class="loading-progress" id="loadingProgress"></div></div>
    <div id="app">Загрузка...</div>
    <div class="tabs-wrapper" id="tabsWrapper">
        <div class="tabs" id="tabs">
            <div class="tab" data-tab="profile"><div class="tab-icon">👤</div><div class="tab-label">Профиль</div></div>
            <div class="tab active" data-tab="stocks"><div class="tab-icon">📈</div><div class="tab-label">Акции</div></div>
            <div class="tab" data-tab="analytics"><div class="tab-icon">📊</div><div class="tab-label">Аналитика</div></div>
            <div class="tab" data-tab="rating"><div class="tab-icon">🏆</div><div class="tab-label">Рейтинг</div></div>
            <div class="tab" data-tab="wallet"><div class="tab-icon">💳</div><div class="tab-label">Кошелёк</div></div>
            <div class="tab" data-tab="settings"><div class="tab-icon">⚙️</div><div class="tab-label">Настройки</div></div>
        </div>
    </div>
    <script>
        (async () => {
            // Drag scroll
            const tabsWrapper = document.getElementById('tabsWrapper');
            let isDown = false, startX, scrollLeft;
            tabsWrapper.addEventListener('mousedown', (e) => { isDown = true; startX = e.pageX - tabsWrapper.offsetLeft; scrollLeft = tabsWrapper.scrollLeft; tabsWrapper.style.cursor = 'grabbing'; });
            window.addEventListener('mouseup', () => { isDown = false; tabsWrapper.style.cursor = 'grab'; });
            window.addEventListener('mousemove', (e) => { if (!isDown) return; e.preventDefault(); const x = e.pageX - tabsWrapper.offsetLeft; const walk = (x - startX) * 2; tabsWrapper.scrollLeft = scrollLeft - walk; });
            
            let progress = 0;
            const progressBar = document.getElementById('loadingProgress');
            function setProgress(v) { progress = v; if (progressBar) progressBar.style.width = progress + '%'; }
            setProgress(10);
            
            const tg = window.Telegram.WebApp;
            tg.ready(); tg.expand();
            setProgress(20);
            let userId = tg.initDataUnsafe?.user?.id;
            const username = tg.initDataUnsafe?.user?.username || `user_${userId}`;
            if (!userId) {
                document.getElementById('app').innerHTML = '<div class="card error">Ошибка: не удалось определить пользователя. Запустите через Telegram.</div>';
                setProgress(100);
                return;
            }
            setProgress(30);
            
            const SUPABASE_URL = "https://gsutnhhklidxmewdkcvk.supabase.co";
            const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzdXRuaGhrbGlkeG1ld2RrY3ZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NzA2MTEsImV4cCI6MjA5NjE0NjYxMX0.XEtyJVT0BfmEgAAsGagPHRdHhmCgrtWEbtzov0c3EXc";
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            let currentUser = null;
            setProgress(40);
            
            function toCents(v) { return Math.round(parseFloat(v) * 100); }
            function fromCents(c) { return (c / 100).toFixed(2); }
            
            async function getOrCreateUser() {
                let { data, error } = await supabase.from('users').select('*').eq('id', userId).maybeSingle();
                if (error) throw new Error(`Ошибка запроса: ${error.message}`);
                if (!data) {
                    const { data: newUser, error: insertError } = await supabase.from('users').insert([{ id: userId, username, shares: 0, stars_balance: 0 }]).select().single();
                    if (insertError) throw new Error(`Ошибка вставки: ${insertError.message}`);
                    return newUser;
                }
                return data;
            }
            
            async function getActiveOrders() {
                const { data, error } = await supabase.from('orders').select('*').eq('status', 'active').order('price_per_share', { ascending: true });
                if (error) throw new Error(`Ошибка загрузки ордеров: ${error.message}`);
                return data || [];
            }
            
            async function getUserOrders() {
                const { data, error } = await supabase.from('orders').select('*').eq('seller_id', userId).eq('status', 'active');
                if (error) throw new Error(`Ошибка загрузки моих ордеров: ${error.message}`);
                return data || [];
            }
            
            async function cancelOrder(orderId) {
                const { data, error } = await supabase.rpc('cancel_order', { p_order_id: orderId, p_user_id: userId });
                if (error) throw new Error(error.message);
                if (!data.success) throw new Error(data.error);
                return true;
            }
            
            async function getPriceHistory() {
                const { data, error } = await supabase.from('price_history').select('price, created_at').order('created_at', { ascending: true }).limit(100);
                if (error) throw new Error(`Ошибка загрузки истории цен: ${error.message}`);
                return data || [];
            }
            
            async function getRecentTrades(limit = 10) {
                const { data, error } = await supabase.from('trades').select('amount, price_per_share').order('created_at', { ascending: false }).limit(limit);
                if (error) throw new Error(`Ошибка загрузки сделок: ${error.message}`);
                return data || [];
            }
            
            async function getCurrentPrice() {
                const { data, error } = await supabase.from('trades').select('amount, price_per_share').order('created_at', { ascending: false }).limit(50);
                if (error) throw new Error(`Ошибка загрузки сделок для цены: ${error.message}`);
                if (!data || data.length === 0) return 100;
                let totalAmount = 0, totalStars = 0;
                for (let trade of data) { totalAmount += trade.amount; totalStars += trade.amount * trade.price_per_share; }
                return totalAmount > 0 ? totalStars / totalAmount : 100;
            }
            
            async function getTotalMarketCap() {
                const { data, error } = await supabase.from('users').select('shares');
                if (error) throw new Error(`Ошибка подсчёта акций: ${error.message}`);
                const totalSharesCents = data.reduce((sum, u) => sum + u.shares, 0);
                const currentPriceCents = await getCurrentPrice();
                const marketCapStars = (totalSharesCents / 100) * (currentPriceCents / 100);
                return { totalShares: totalSharesCents, currentPrice: currentPriceCents, marketCap: marketCapStars };
            }
            
            async function createOrder(amount, price) {
                const amountCents = toCents(amount);
                const priceCents = toCents(price);
                if (amountCents < 100) throw new Error('Минимальное количество – 1');
                if (priceCents < 100) throw new Error('Минимальная цена – 1 Star');
                const { data, error } = await supabase.rpc('create_sell_order', { p_user_id: userId, p_amount: amountCents, p_price: priceCents });
                if (error) throw new Error(error.message);
                if (!data.success) throw new Error(data.error);
                currentUser.shares -= amountCents;
                return true;
            }
            
            async function executePartialTrade(orderId, buyAmountCents) {
                const { data, error } = await supabase.rpc('execute_trade_partial', { p_order_id: orderId, p_buyer_id: userId, p_buy_amount: buyAmountCents });
                if (error) throw new Error(error.message);
                if (!data.success) throw new Error(data.error);
                return true;
            }
            
            function drawCanvasChart(history) {
                const container = document.getElementById('chart-container');
                if (!container) return;
                container.innerHTML = '';
                if (!history || history.length === 0) {
                    container.innerHTML = '<p style="text-align:center; padding:20px;">Нет данных для графика</p>';
                    return;
                }
                const canvas = document.createElement('canvas');
                const width = container.clientWidth, height = 250;
                canvas.width = width; canvas.height = height;
                canvas.style.width = '100%'; canvas.style.height = 'auto';
                container.appendChild(canvas);
                const ctx = canvas.getContext('2d');
                const values = history.map(h => h.price / 100);
                const max = Math.max(...values), min = Math.min(...values), range = max - min;
                const padding = { top: 20, bottom: 30, left: 40, right: 20 };
                const graphWidth = width - padding.left - padding.right;
                const graphHeight = height - padding.top - padding.bottom;
                const stepX = graphWidth / (values.length - 1);
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, width, height);
                ctx.beginPath();
                ctx.strokeStyle = '#ccc';
                ctx.lineWidth = 1;
                ctx.moveTo(padding.left, padding.top);
                ctx.lineTo(padding.left, height - padding.bottom);
                ctx.lineTo(width - padding.right, height - padding.bottom);
                ctx.stroke();
                ctx.beginPath();
                ctx.strokeStyle = '#0088cc';
                ctx.lineWidth = 2;
                for (let i = 0; i < values.length; i++) {
                    const x = padding.left + i * stepX;
                    let y = (range === 0) ? padding.top + graphHeight/2 : padding.top + graphHeight - ((values[i] - min) / range) * graphHeight;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
                ctx.fillStyle = '#333';
                ctx.font = '11px sans-serif';
                ctx.fillText(max.toFixed(2), padding.left - 30, padding.top + 10);
                ctx.fillText(min.toFixed(2), padding.left - 30, height - padding.bottom - 5);
                if (history.length > 0) {
                    const firstDate = new Date(history[0].created_at).toLocaleDateString();
                    const lastDate = new Date(history[history.length-1].created_at).toLocaleDateString();
                    ctx.fillText(firstDate, padding.left, height - padding.bottom + 15);
                    ctx.fillText(lastDate, width - padding.right - 30, height - padding.bottom + 15);
                }
            }
            
            function renderTicker(trades) {
                const container = document.getElementById('ticker');
                if (!container) return;
                if (!trades || trades.length === 0) { container.innerHTML = '<div class="ticker-content">Нет сделок</div>'; return; }
                const items = trades.map(t => `<span class="trade-item">${fromCents(t.amount)} шт. по ${fromCents(t.price_per_share)} ⭐</span>`).join('');
                container.innerHTML = `<div class="ticker-content">${items}</div>`;
            }
            
            let currentOrdersFilter = 'all';
            let currentSortDir = 'asc';
            async function renderStocksTab() {
                try {
                    setProgress(60);
                    let orders = [];
                    if (currentOrdersFilter === 'all') orders = await getActiveOrders();
                    else orders = await getUserOrders();
                    orders.sort((a,b) => currentSortDir === 'asc' ? a.price_per_share - b.price_per_share : b.price_per_share - a.price_per_share);
                    const priceHistory = await getPriceHistory();
                    const recentTrades = await getRecentTrades(10);
                    const { totalShares, currentPrice, marketCap } = await getTotalMarketCap();
                    setProgress(80);
                    const html = `
                        <div class="card">
                            <div class="flex-between"><div><p>📊 Акций: <strong>${fromCents(currentUser.shares)}</strong></p><p>⭐ Stars: <strong>${fromCents(currentUser.stars_balance)}</strong></p></div><div class="price">${(currentPrice/100).toFixed(2)} ⭐</div></div>
                        </div>
                        <div class="card">
                            <div class="info-panel"><div class="info-card"><div class="info-label">Рыночная капитализация</div><div class="info-value">${Math.round(marketCap)} ⭐</div></div><div class="info-card"><div class="info-label">Всего акций</div><div class="info-value">${(totalShares/100).toFixed(2)}</div></div></div>
                            <div id="chart-container" class="chart-container"></div>
                            <div id="ticker" class="ticker"></div>
                        </div>
                        <div class="card"><h3>📈 Продать акции</h3><input type="number" id="sellAmount" placeholder="Количество (минимум 1)" step="0.01" min="1"><input type="number" id="sellPrice" placeholder="Цена за 1 акцию (Stars)" step="0.01" min="1"><button id="sellBtn">➕ Выставить на продажу</button></div>
                        <div class="card"><div class="filter-bar"><button class="filter-btn ${currentOrdersFilter === 'all' ? 'active' : ''}" data-filter="all">Все ордера</button><button class="filter-btn ${currentOrdersFilter === 'my' ? 'active' : ''}" data-filter="my">Мои ордера</button><button class="sort-btn ${currentSortDir === 'asc' ? 'active' : ''}" data-sort="asc">↑ Цена выше</button><button class="sort-btn ${currentSortDir === 'desc' ? 'active' : ''}" data-sort="desc">↓ Цена ниже</button></div><h3>📋 Активные ордера на продажу</h3><div id="ordersList"></div></div>
                    `;
                    document.getElementById('app').innerHTML = html;
                    drawCanvasChart(priceHistory);
                    renderTicker(recentTrades);
                    document.querySelectorAll('.filter-btn').forEach(btn => {
                        btn.addEventListener('click', () => { currentOrdersFilter = btn.dataset.filter; renderStocksTab(); });
                    });
                    document.querySelectorAll('.sort-btn').forEach(btn => {
                        btn.addEventListener('click', () => { currentSortDir = btn.dataset.sort; renderStocksTab(); });
                    });
                    const ordersDiv = document.getElementById('ordersList');
                    if (orders.length === 0) ordersDiv.innerHTML = '<p>Нет активных ордеров</p>';
                    else {
                        orders.forEach(order => {
                            const div = document.createElement('div'); div.className = 'order-item';
                            const isOwn = order.seller_id === userId;
                            div.innerHTML = `<div class="order-info"><div>${fromCents(order.amount)} шт. по ${fromCents(order.price_per_share)} ⭐</div><div class="small-text">Продавец ID: ${order.seller_id}</div></div><div class="order-actions">${!isOwn ? `<button class="buy-btn" data-order='${JSON.stringify(order)}'>Купить</button>` : `<button class="cancel-btn" data-order-id="${order.id}">Отменить</button>`}</div>`;
                            ordersDiv.appendChild(div);
                        });
                        document.querySelectorAll('.buy-btn').forEach(btn => {
                            btn.addEventListener('click', async () => {
                                const order = JSON.parse(btn.dataset.order);
                                const maxShares = fromCents(order.amount);
                                let buyAmount = prompt(`Введите количество акций для покупки (до ${maxShares}):`, maxShares);
                                if (buyAmount === null) return;
                                buyAmount = parseFloat(buyAmount);
                                if (isNaN(buyAmount) || buyAmount <= 0 || buyAmount > maxShares) { alert('Некорректное количество'); return; }
                                const buyAmountCents = toCents(buyAmount);
                                try {
                                    const { data: freshOrder, error: freshErr } = await supabase.from('orders').select('amount, status').eq('id', order.id).single();
                                    if (freshErr) throw new Error('Ошибка проверки ордера');
                                    if (freshOrder.status !== 'active') throw new Error('Ордер уже не активен');
                                    if (freshOrder.amount < buyAmountCents) throw new Error('Количество превышает доступное. Кто-то уже купил часть.');
                                    await executePartialTrade(order.id, buyAmountCents);
                                    alert('Сделка успешно завершена!');
                                    await refreshAll();
                                } catch (err) { alert(err.message); }
                            });
                        });
                        document.querySelectorAll('.cancel-btn').forEach(btn => {
                            btn.addEventListener('click', async () => {
                                const orderId = parseInt(btn.dataset.orderId);
                                if (confirm('Отменить ордер?')) { try { await cancelOrder(orderId); alert('Ордер отменён, акции возвращены'); await refreshAll(); } catch (err) { alert(err.message); } }
                            });
                        });
                    }
                    const sellBtn = document.getElementById('sellBtn');
                    if (sellBtn) {
                        sellBtn.addEventListener('click', async () => {
                            let amount = parseFloat(document.getElementById('sellAmount').value);
                            let price = parseFloat(document.getElementById('sellPrice').value);
                            if (isNaN(amount) || isNaN(price) || amount < 1 || price < 1) { alert('Введите количество не менее 1 и цену не менее 1'); return; }
                            try { await createOrder(amount, price); alert('Ордер создан'); await refreshAll(); } catch (err) { alert(err.message); }
                        });
                    }
                    setProgress(100); setTimeout(() => { const loadingBar = document.getElementById('loadingBar'); if (loadingBar) loadingBar.style.display = 'none'; }, 500);
                } catch (err) { console.error(err); document.getElementById('app').innerHTML = `<div class="card error">Ошибка: ${err.message}</div>`; setProgress(100); }
            }
            
            async function refreshAll() { currentUser = await getOrCreateUser(); await renderStocksTab(); }
            
            function renderProfileTab() {
                document.getElementById('app').innerHTML = `<div class="card"><h2>👤 Профиль</h2><p><strong>${currentUser.username}</strong></p><p>ID: ${userId}</p><p>📌 Акций: ${fromCents(currentUser.shares)}</p><p>⭐ Stars: ${fromCents(currentUser.stars_balance)}</p><hr><p class="small-text">Виртуальная биржа акций за Telegram Stars.</p></div>`;
                const bar = document.getElementById('loadingBar'); if (bar) bar.style.display = 'none';
            }
            async function renderRatingTab() { 
                try {
                    const { data, error } = await supabase.from('users').select('username, shares').order('shares', { ascending: false }).limit(20);
                    if (error) throw error;
                    let html = `<div class="card"><h2>🏆 Рейтинг держателей акций</h2><div id="leaderboardList">`;
                    if (data.length === 0) html += '<p>Нет данных</p>';
                    else {
                        data.forEach((user, idx) => {
                            html += `<div class="leaderboard-item" style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eee;"><div class="rank">${idx+1}</div><div class="user-name">${user.username || "Аноним"}</div><div class="user-shares">${fromCents(user.shares)} акций</div></div>`;
                        });
                    }
                    html += `</div></div>`;
                    document.getElementById('app').innerHTML = html;
                    const bar = document.getElementById('loadingBar'); if (bar) bar.style.display = 'none';
                } catch(err) { document.getElementById('app').innerHTML = `<div class="card error">${err.message}</div>`; }
            }
            function renderWalletTab() { 
                document.getElementById('app').innerHTML = `<div class="card"><h2>💳 Кошелёк</h2><p>⭐ Баланс Stars: <strong>${fromCents(currentUser.stars_balance)}</strong></p><p>📊 Акций: <strong>${fromCents(currentUser.shares)}</strong></p><hr><p>Пополнение и вывод – через бота.</p><button onclick="window.Telegram.WebApp.openTelegramLink('https://t.me/ваш_бот?start=topup')">💸 Пополнить Stars</button></div>`;
                const bar = document.getElementById('loadingBar'); if (bar) bar.style.display = 'none';
            }
            function renderAnalyticsTab() { document.getElementById('app').innerHTML = '<div class="card"><h2>📊 Аналитика</h2><p>Графики и статистика в разработке</p></div>'; const bar = document.getElementById('loadingBar'); if (bar) bar.style.display = 'none'; }
            function renderSettingsTab() { document.getElementById('app').innerHTML = '<div class="card"><h2>⚙️ Настройки</h2><p>Тема и уведомления скоро</p></div>'; const bar = document.getElementById('loadingBar'); if (bar) bar.style.display = 'none'; }
            
            currentUser = await getOrCreateUser();
            let activeTab = 'stocks';
            await renderStocksTab();
            
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', async () => {
                    const tabName = tab.dataset.tab;
                    activeTab = tabName;
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    const bar = document.getElementById('loadingBar'); if (bar) bar.style.display = 'block';
                    setProgress(30);
                    if (tabName === 'profile') renderProfileTab();
                    else if (tabName === 'stocks') await renderStocksTab();
                    else if (tabName === 'analytics') renderAnalyticsTab();
                    else if (tabName === 'rating') await renderRatingTab();
                    else if (tabName === 'wallet') renderWalletTab();
                    else if (tabName === 'settings') renderSettingsTab();
                });
            });
        })();
    </script>
</body>
