<html lang="ru">

    <style>
        /* ===== ВАШ ПОЛНЫЙ CSS (скопируйте из вашего рабочего файла, где всё отображалось корректно) ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; scrollbar-width: none; -ms-overflow-style: none; }

        }
        .app-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(10, 14, 26, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(56, 189, 248, 0.25);
            padding: 12px 16px;
            z-index: 101;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-logo {
            font-weight: 700;
            font-size: 18px;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header-icons { display: flex; gap: 20px; align-items: center; }
        .header-icon { font-size: 24px; cursor: pointer; transition: 0.2s; position: relative; }
        .header-icon:active { transform: scale(0.94); }
        .notification-badge {
            position: absolute;
            top: -8px;
            right: -12px;

            height: 18px;

            border-top: 1px solid rgba(56, 189, 248, 0.25);

            justify-content: center;

            background: rgba(255, 255, 255, 0.04);

        .tab.active {
            background: linear-gradient(135deg, #2b6e9e, #1a4c6e);

        }
        .tab-icon { font-size: 22px; margin-bottom: 4px; }
        .tab-label { font-size: 11px; font-weight: 600; letter-spacing: 0.3px; }
        button {
            background: linear-gradient(135deg, #2b6e9e, #1a4c6e);

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #121826;

            max-width: 90%;

        .modal-content h3 { text-align: center; margin-bottom: 16px; font-size: 18px; }

        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            z-index: 2000;

            white-space: nowrap;

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(-20px); }

            gap: 10px;
            margin: 16px 0;
            max-height: 400px;
            overflow-y: auto;
        }
        .achievement-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 18px;
            padding: 10px 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;

        .achievement-card.selected { border-color: #2b6e9e; background: rgba(43, 110, 158, 0.2); }
        .achievement-card.disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(0.3); }
        .achievement-icon { font-size: 28px; margin-bottom: 4px; }
        .achievement-name { font-weight: 600; font-size: 13px; }
        .achievement-desc, .achievement-condition, .achievement-date { font-size: 10px; color: #9ca3af; margin-top: 4px; }
        .progress-bar {
            background: rgba(255,255,255,0.1);

            height: 6px;

            margin: 6px 0;

        .progress-fill {
            background: linear-gradient(90deg, #2b6e9e, #60a5fa);

        .rank-card {
            display: flex;
            align-items: center;
            justify-content: space-between;

            border-radius: 20px;
            padding: 12px;
            margin-top: 12px;
        }
        .avatars-grid, .bg-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 20px 0;
            max-height: 360px;
            overflow-y: auto;
        }
        .avatar-option {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            width: 65px;
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            margin: 0 auto;

        .avatar-option.selected { border: 2px solid #2b6e9e; background: rgba(43, 110, 158, 0.3); transform: scale(1.05); }
        .avatar-option .avatar-emoji { font-size: 40px; line-height: 1; }
        .bg-option {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
            margin: 0 auto;
            border: 2px solid transparent;
        }
        .bg-option.selected { border-color: #2b6e9e; transform: scale(1.05); }
        .custom-color-preview {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            cursor: pointer;
            margin: 0 auto;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2b6e9e;
            font-size: 28px;
        }
        .topup-amounts { display: flex; gap: 12px; margin: 16px 0; flex-wrap: wrap; }
        .amount-btn {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 16px;
            border-radius: 60px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
        }
        .amount-btn.selected { background: linear-gradient(135deg, #2b6e9e, #1a4c6e); color: white; box-shadow: 0 0 8px #2b6e9e; }

        .info-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 12px 0; }
        .info-card { background: rgba(0, 0, 0, 0.3); border-radius: 20px; padding: 12px; text-align: center; }
        .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .filter-btn, .sort-btn, .timeframe-btn {
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .filter-btn.active, .sort-btn.active, .timeframe-btn.active { background: linear-gradient(135deg, #2b6e9e, #1a4c6e); color: white; }
        .leaderboard-item, .history-item, .referral-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        #ordersList, #usersList, #adminOrdersList { max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body>
<div class="app-header">
    <div class="header-logo">VoxAction</div>
    <div class="header-icons">
        <div class="header-icon" id="headerNotificationBell">🔔<span class="notification-badge" id="headerNotificationBadge" style="display:none;">0</span></div>
        <div class="header-icon" id="headerSettingsGear">⚙️</div>
    </div>
</div>
<div id="app">Загрузка...</div>
<div class="tabs-wrapper">
    <div class="tabs" id="tabs">
        <div class="tab" data-tab="profile"><div class="tab-icon">👤</div><div class="tab-label">Профиль</div></div>
        <div class="tab active" data-tab="stocks"><div class="tab-icon">📈</div><div class="tab-label">Акции</div></div>
        <div class="tab" data-tab="analytics"><div class="tab-icon">📊</div><div class="tab-label">Аналитика</div></div>
        <div class="tab" data-tab="rating"><div class="tab-icon">🏆</div><div class="tab-label">Рейтинг</div></div>

    </div>
</div>
<div id="topupModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" id="closeTopupModal">&times;</span>
        <h3>💸 Пополнение Stars</h3>
        <div class="topup-amounts">
            <div class="amount-btn" data-amount="200">200 ⭐</div>
            <div class="amount-btn" data-amount="500">500 ⭐</div>
            <div class="amount-btn" data-amount="1000">1000 ⭐</div>
        </div>
        <div class="custom-amount"><input type="number" id="customTopupAmount" placeholder="Своя сумма (1-10000)" min="1" step="1"></div>
        <div id="topupFeeInfo" style="background: rgba(0,0,0,0.3); padding: 12px; border-radius: 20px; text-align: center; margin-bottom: 16px;"></div>
        <button id="confirmTopupBtn">Пополнить</button>
    </div>
</div>
<script>
    // ========== ПОЛНЫЙ СКРИПТ (ВСЕ ФУНКЦИИ) ==========
    (async () => {
        // Drag tabs
        const tabsWrapper = document.querySelector('.tabs-wrapper');
        let isDown = false, startX, scrollLeft;
        tabsWrapper.addEventListener('mousedown', (e) => { isDown = true; startX = e.pageX - tabsWrapper.offsetLeft; scrollLeft = tabsWrapper.scrollLeft; tabsWrapper.style.cursor = 'grabbing'; });
        window.addEventListener('mouseup', () => { isDown = false; tabsWrapper.style.cursor = 'grab'; });
        window.addEventListener('mousemove', (e) => { if (!isDown) return; e.preventDefault(); const x = e.pageX - tabsWrapper.offsetLeft; const walk = (x - startX) * 2; tabsWrapper.scrollLeft = scrollLeft - walk; });
        
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        window.tg = tg;
        window.userId = tg.initDataUnsafe?.user?.id;
        window.username = tg.initDataUnsafe?.user?.username || `user_${window.userId}`;
        if (!window.userId) { document.getElementById('app').innerHTML = '<div class="card" style="text-align:center;">Ошибка: запустите через Telegram</div>'; return; }
        if (window.userId === 6048486427) document.querySelector('.admin-tab').style.display = 'inline-flex';
        
        // Утилиты
        window.toCents = (v) => Math.round(parseFloat(v) * 100);
        window.fromCents = (c) => (c / 100).toFixed(2);
        
        window.showCustomModal = function(title, message) {
            const modalHtml = `
                <div class="modal" id="customMessageModal" style="display:flex;">
                    <div class="modal-content">
                        <span class="close-modal" id="closeCustomModal">&times;</span>
                        <h3>${title}</h3>
                        <p style="margin:20px 0; text-align:center;">${message}</p>
                        <button id="customModalOkBtn">OK</button>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            const modal = document.getElementById('customMessageModal');
            document.getElementById('closeCustomModal').onclick = () => modal.remove();
            document.getElementById('customModalOkBtn').onclick = () => modal.remove();
        };
        
        window.showToast = function(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        };
        
        const SUPABASE_URL = "https://gsutnhhklidxmewdkcvk.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzdXRuaGhrbGlkeG1ld2RrY3ZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NzA2MTEsImV4cCI6MjA5NjE0NjYxMX0.XEtyJVT0BfmEgAAsGagPHRdHhmCgrtWEbtzov0c3EXc";
        window.supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        window.currentUser = null;
        window.BACKEND_URL = 'https://voxaction-bot-main.onrender.com';
        
        // ----- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ (API) -----
        async function ensureWelcomeAchievement(userId) {
            try {
                const { data: achData } = await window.supabase.from('achievements').select('id').eq('name', '🌟 Первый шаг').maybeSingle();
                if (!achData) return;
                const { data: existing } = await window.supabase.from('user_achievements').select('achievement_id').eq('user_id', userId).eq('achievement_id', achData.id).maybeSingle();
                if (!existing) {
                    await window.supabase.from('user_achievements').insert({ user_id: userId, achievement_id: achData.id, earned_at: new Date().toISOString() });
                }
            } catch(e) { console.error(e); }
        }
        
        window.getOrCreateUser = async function() {
            let { data, error } = await window.supabase.from('users').select('*').eq('id', window.userId).maybeSingle();
            if (error) throw new Error(`Ошибка запроса: ${error.message}`);
            if (!data) {
                const { data: newUser, error: insertError } = await window.supabase.from('users').insert([{ 
                    id: window.userId, 
                    username: window.username, 
                    shares: 0, 
                    stars_balance: 0,
                    selected_achievements: [],
                    avatar_url: '👤',
                    avatar_bg: 'gradient1',
                    registered_at: new Date().toISOString()
                }]).select().single();
                if (insertError) throw new Error(`Ошибка вставки: ${insertError.message}`);
                await ensureWelcomeAchievement(window.userId);
                return { user: newUser, isNew: true };
            }
            await ensureWelcomeAchievement(window.userId);
            if (!data.selected_achievements) data.selected_achievements = [];
            if (!data.avatar_url) data.avatar_url = '👤';
            if (!data.avatar_bg) data.avatar_bg = 'gradient1';
            if (!data.registered_at) {
                await window.supabase.from('users').update({ registered_at: new Date().toISOString() }).eq('id', window.userId);
                data.registered_at = new Date().toISOString();
            }
            return { user: data, isNew: false };
        };
        
        window.getActiveOrders = async function() {
            const { data, error } = await window.supabase.from('orders').select('*').eq('status', 'active').order('price_per_share', { ascending: true });
            if (error) throw new Error(error.message);
            return data || [];
        };
        window.getUserOrders = async function() {
            const { data, error } = await window.supabase.from('orders').select('*').eq('seller_id', window.userId).eq('status', 'active');
            if (error) throw new Error(error.message);
            return data || [];
        };
        window.cancelOrder = async function(orderId) {
            const { data, error } = await window.supabase.rpc('cancel_order', { p_order_id: orderId, p_user_id: window.userId });
            if (error) throw new Error(error.message);
            if (!data.success) throw new Error(data.error);
            return true;
        };
        window.createOrder = async function(amount, price) {
            const amountCents = window.toCents(amount), priceCents = window.toCents(price);
            if (amountCents < 100) throw new Error('Минимум 1 акция');
            if (priceCents < 100) throw new Error('Минимум 1 Star');
            const { data, error } = await window.supabase.rpc('create_sell_order', { p_user_id: window.userId, p_amount: amountCents, p_price: priceCents });
            if (error) throw new Error(error.message);
            if (!data.success) throw new Error(data.error);
            window.currentUser.shares -= amountCents;
            return true;
        };
        window.executePartialTrade = async function(orderId, buyAmountCents) {
            const { data, error } = await window.supabase.rpc('execute_trade_partial', { p_order_id: orderId, p_buyer_id: window.userId, p_buy_amount: buyAmountCents });
            if (error) throw new Error(error.message);
            if (!data.success) throw new Error(data.error);
            return true;
        };
        window.getRecentTrades = async function(limit = 10) {
            const { data, error } = await window.supabase.from('trades').select('amount, price_per_share').order('created_at', { ascending: false }).limit(limit);
            if (error) throw new Error(error.message);
            return data || [];
        };
        window.getCurrentPrice = async function() {
            const { data, error } = await window.supabase.from('trades').select('amount, price_per_share').order('created_at', { ascending: false }).limit(50);
            if (error || !data || data.length === 0) return 100;
            let totalAmount = 0, totalStars = 0;
            for (let trade of data) { totalAmount += trade.amount; totalStars += trade.amount * trade.price_per_share; }
            return totalAmount > 0 ? totalStars / totalAmount : 100;
        };
        window.getTotalMarketCap = async function() {
            const { data, error } = await window.supabase.from('users').select('shares');
            if (error) throw new Error(error.message);
            const totalSharesCents = data.reduce((s,u) => s + u.shares, 0);
            const currentPriceCents = await window.getCurrentPrice();
            const marketCapStars = (totalSharesCents / 100) * (currentPriceCents / 100);
            return { totalShares: totalSharesCents, currentPrice: currentPriceCents, marketCap: marketCapStars };
        };
        window.getLeaderboard = async function() {
            const { data, error } = await window.supabase.from('users').select('username, shares, id').eq('hide_rating', false).order('shares', { ascending: false });
            if (error) throw new Error(error.message);
            return data || [];
        };
        window.getUserRank = async function() {
            const leaders = await window.getLeaderboard();
            const idx = leaders.findIndex(u => u.id === window.userId);
            if (idx === -1) return null;
            return idx + 1;
        };
        window.getUserStats = async function() {
            const { data, error } = await window.supabase.from('trades').select('amount, total_stars').or(`seller_id.eq.${window.userId},buyer_id.eq.${window.userId}`);
            if (error) return { totalTrades: 0, totalVolume: 0 };
            return { totalTrades: data.length, totalVolume: data.reduce((s,t) => s + t.total_stars/100, 0) };
        };
        window.getEarnedAchievements = async function() {
            const { data, error } = await window.supabase
                .from('user_achievements')
                .select('achievement_id, earned_at, achievements(id, name, description, icon, condition_type, condition_value)')
                .eq('user_id', window.userId);
            if (error) return [];
            return data.map(ua => ({
                id: ua.achievements.id,
                name: ua.achievements.name,
                description: ua.achievements.description,
                icon: ua.achievements.icon,
                earned_at: ua.earned_at,
                condition_type: ua.achievements.condition_type,
                condition_value: ua.achievements.condition_value
            }));
        };
        window.getAllAchievements = async function() {
            const { data, error } = await window.supabase.from('achievements').select('*');
            if (error) return [];
            return data;
        };
        window.getSellerRating = async function(sellerId) {
            const { data, error } = await window.supabase.from('seller_ratings').select('rating').eq('seller_id', sellerId);
            if (error || !data.length) return null;
            return data.reduce((s,r)=>s+r.rating,0)/data.length;
        };
        
        // ----- УВЕДОМЛЕНИЯ -----
        let notificationsChannel = null;
        async function loadNotifications() {
            const { data, error } = await window.supabase.from('notifications').select('*').eq('user_id', window.userId).order('created_at', { ascending: false });
            if (error) return [];
            return data;
        }
        async function getUnreadCount() {
            const { count, error } = await window.supabase.from('notifications').select('*', { count: 'exact', head: true }).eq('user_id', window.userId).eq('is_read', false);
            if (error) return 0;
            return count || 0;
        }
        window.markNotificationRead = async function(notifId) {
            await window.supabase.from('notifications').update({ is_read: true }).eq('id', notifId);
            await window.updateBellBadge();
        };
        window.deleteNotification = async function(notifId) {
            await window.supabase.from('notifications').delete().eq('id', notifId);
            await window.updateBellBadge();
            if (window.notificationsModalOpen) await window.showNotificationsModal();
        };
        window.markAllRead = async function() {
            await window.supabase.from('notifications').update({ is_read: true }).eq('user_id', window.userId).eq('is_read', false);
            await window.updateBellBadge();
            if (window.notificationsModalOpen) await window.showNotificationsModal();
        };
        window.updateBellBadge = async function() {
            const unread = await getUnreadCount();
            const badge = document.getElementById('headerNotificationBadge');
            if (badge) {
                if (unread > 0) {
                    badge.textContent = unread > 9 ? '9+' : unread;
                    badge.style.display = 'flex';
                } else {
                    badge.style.display = 'none';
                }
            }
        };
        window.showNotificationsModal = async function() {
            const notifications = await loadNotifications();
            const listHtml = notifications.map(n => `
                <div class="notification-item ${!n.is_read ? 'unread' : ''}" data-id="${n.id}">
                    <div class="notification-message">${n.message}</div>
                    <div class="notification-time">${new Date(n.created_at).toLocaleString()}</div>
                    <div class="notification-actions">
                        ${!n.is_read ? `<button class="mark-read" data-id="${n.id}">✓</button>` : ''}
                        <button class="delete-notif" data-id="${n.id}">🗑️</button>
                    </div>
                </div>
            `).join('');
            const modalHtml = `
                <div class="modal" id="notificationsModal" style="display:flex;">
                    <div class="modal-content">
                        <span class="close-modal" id="closeNotifModal">&times;</span>
                        <h3>🔔 Уведомления</h3>
                        <div class="notifications-list">${listHtml || '<p style="text-align:center; padding:20px;">Нет уведомлений</p>'}</div>
                        ${notifications.length ? '<button id="markAllReadBtn" class="secondary">Отметить все прочитанными</button>' : ''}
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            window.notificationsModalOpen = true;
            document.getElementById('closeNotifModal').onclick = () => {
                document.getElementById('notificationsModal').remove();
                window.notificationsModalOpen = false;
            };
            if (notifications.length) {
                document.getElementById('markAllReadBtn')?.addEventListener('click', async () => {
                    await window.markAllRead();
                    document.getElementById('notificationsModal').remove();
                    window.notificationsModalOpen = false;
                    await window.showNotificationsModal();
                });
            }
            document.querySelectorAll('.mark-read').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = parseInt(btn.dataset.id);
                    await window.markNotificationRead(id);
                    document.getElementById('notificationsModal').remove();
                    window.notificationsModalOpen = false;
                    await window.showNotificationsModal();
                });
            });
            document.querySelectorAll('.delete-notif').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = parseInt(btn.dataset.id);
                    await window.deleteNotification(id);
                    document.getElementById('notificationsModal').remove();
                    window.notificationsModalOpen = false;
                    await window.showNotificationsModal();
                });
            });
        };
        function setupRealtimeNotifications() {
            if (notificationsChannel) return;
            notificationsChannel = window.supabase
                .channel('notifications-channel')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'notifications', filter: `user_id=eq.${window.userId}` }, (payload) => {
                    const newNotif = payload.new;
                    window.showToast(`🔔 ${newNotif.message}`);
                    window.updateBellBadge();
                })
                .subscribe();
        }
        
        // ----- НАСТРОЙКИ (шестерёнка) -----
        async function renderSettingsTab() {
            const hideRating = window.currentUser.hide_rating || false;
            const customColor = localStorage.getItem('custom_color') || '#2b6e9e';
            const notifyTrades = window.currentUser.notify_trades ?? true;
            const notifyTopup = window.currentUser.notify_topup ?? true;
            const notifyReferral = window.currentUser.notify_referral ?? true;
            const html = `<div class="card"><h2>⚙️ Настройки</h2><label><input type="checkbox" id="hideRatingCheckbox" ${hideRating?'checked':''}> Скрыть из рейтинга</label><br><br><div><strong>Уведомления от бота:</strong></div><label><input type="checkbox" id="notifyTradesCheckbox" ${notifyTrades?'checked':''}> О сделках</label><br><label><input type="checkbox" id="notifyTopupCheckbox" ${notifyTopup?'checked':''}> О пополнении</label><br><label><input type="checkbox" id="notifyReferralCheckbox" ${notifyReferral?'checked':''}> О рефералах</label><br><br><div><strong>Цвет акцента:</strong></div><input type="color" id="colorPicker" value="${customColor}" style="width:60px; padding:0;"><button id="saveSettings">Сохранить</button></div>`;
            document.getElementById('app').innerHTML = html;
            document.getElementById('colorPicker').addEventListener('input', (e) => document.documentElement.style.setProperty('--accent', e.target.value));
            document.getElementById('saveSettings').onclick = async () => {
                const newHide = document.getElementById('hideRatingCheckbox').checked;
                const newColor = document.getElementById('colorPicker').value;
                localStorage.setItem('custom_color', newColor);
                document.documentElement.style.setProperty('--accent', newColor);
                await window.supabase.from('users').update({ hide_rating: newHide, notify_trades: document.getElementById('notifyTradesCheckbox').checked, notify_topup: document.getElementById('notifyTopupCheckbox').checked, notify_referral: document.getElementById('notifyReferralCheckbox').checked }).eq('id', window.userId);
                window.currentUser.hide_rating = newHide;
                window.showCustomModal('Успех', 'Настройки сохранены');
            };
        }
        
        // ----- ПОПОЛНЕНИЕ -----
        let selectedAmount = null;
        window.updateTopupFee = function(amount) { const fee = Math.floor(amount * 0.05); const receive = amount - fee; document.getElementById('topupFeeInfo').innerHTML = `💸 Вы платите: ${amount} ⭐<br>📉 Комиссия (5%): ${fee} ⭐<br>✅ Получите: ${receive} ⭐`; };
        document.querySelectorAll('#topupModal .amount-btn').forEach(btn => btn.addEventListener('click', () => { document.querySelectorAll('#topupModal .amount-btn').forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); selectedAmount = parseInt(btn.dataset.amount); document.getElementById('customTopupAmount').value = selectedAmount; window.updateTopupFee(selectedAmount); }));
        document.getElementById('customTopupAmount')?.addEventListener('input', () => { let val = parseInt(document.getElementById('customTopupAmount').value); if(!isNaN(val) && val>=1) { selectedAmount = val; document.querySelectorAll('#topupModal .amount-btn').forEach(b => b.classList.remove('selected')); window.updateTopupFee(selectedAmount); } else document.getElementById('topupFeeInfo').innerHTML = ''; });
        document.getElementById('confirmTopupBtn')?.addEventListener('click', async () => { if(!selectedAmount || selectedAmount<1) { window.showCustomModal('Ошибка','Выберите сумму'); return; } document.getElementById('topupModal').style.display = 'none'; try { const res = await fetch(`${window.BACKEND_URL}/create-invoice`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ user_id: window.userId, amount: selectedAmount }) }); const data = await res.json(); if(data.ok && data.invoice_link) window.tg.openInvoice(data.invoice_link, (status) => { if(status === 'paid') { window.showCustomModal('Успех','Баланс пополнен'); window.refreshAll(); } }); else window.showCustomModal('Ошибка', data.error || 'Не удалось создать счёт'); } catch(e) { window.showCustomModal('Ошибка','Соединение'); } });
        document.getElementById('closeTopupModal')?.addEventListener('click', () => document.getElementById('topupModal').style.display = 'none');
        
        // ----- ЗАПУСК -----
        const { user, isNew } = await window.getOrCreateUser();
        window.currentUser = user;
        const savedColor = localStorage.getItem('custom_color') || '#2b6e9e';
        document.documentElement.style.setProperty('--accent', savedColor);
        await window.renderStocksTab(window.currentUser);
        if (isNew) setTimeout(() => window.renderProfileTab(
            window.currentUser, window.supabase, window.userId, window.fromCents, window.showCustomModal,
            window.getUserStats, window.getUserRank, window.getEarnedAchievements, window.getAllAchievements,
            window.updateBellBadge, window.showNotificationsModal
        ), 500);
        setupRealtimeNotifications();
        await window.updateBellBadge();
        
        document.getElementById('headerNotificationBell')?.addEventListener('click', () => window.showNotificationsModal());
        document.getElementById('headerSettingsGear')?.addEventListener('click', () => renderSettingsTab());
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', async () => {
                const tabName = tab.dataset.tab;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                if(tabName === 'profile') await window.renderProfileTab(
                    window.currentUser, window.supabase, window.userId, window.fromCents, window.showCustomModal,
                    window.getUserStats, window.getUserRank, window.getEarnedAchievements, window.getAllAchievements,
                    window.updateBellBadge, window.showNotificationsModal
                );
                else if(tabName === 'stocks') await window.renderStocksTab(window.currentUser);
                else if(tabName === 'analytics') await window.renderAnalyticsTab();
                else if(tabName === 'rating') await window.renderRatingTab();
                else if(tabName === 'wallet') await window.renderWalletTab();
                else if(tabName === 'referral') await window.renderReferralTab();
                else if(tabName === 'admin') await window.renderAdminTab();
            });
        });
    })();
</script>
</body>
</html>
