<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Акции – биржа | VoxAction</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;user-select:none;scrollbar-width:none;-ms-overflow-style:none}
        *::-webkit-scrollbar{display:none}
        body{background:#0a0e1a;font-family:'Inter',system-ui,apple-system,'Segoe UI',Roboto,sans-serif;color:#eef2ff;padding-bottom:calc(76px + env(safe-area-inset-bottom))}
        .card{background:rgba(18,24,38,.7);backdrop-filter:blur(16px);border-radius:28px;padding:18px;margin:12px 16px;border:1px solid rgba(56,189,248,.2);box-shadow:0 8px 20px rgba(0,0,0,.3);position:relative}
        .tabs-wrapper{position:fixed;bottom:0;left:0;right:0;background:rgba(10,14,26,.95);backdrop-filter:blur(20px);border-top:1px solid rgba(56,189,248,.25);padding:6px 0 calc(6px + env(safe-area-inset-bottom));z-index:100;overflow-x:auto;white-space:nowrap}
        .tabs{display:inline-flex;gap:6px;padding:0 12px}
        .tab{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 12px;border-radius:60px;background:rgba(255,255,255,.04);transition:all .2s;cursor:pointer;min-width:68px}
        .tab.active{background:linear-gradient(135deg,#2b6e9e,#1a4c6e);box-shadow:0 0 12px rgba(43,110,158,.6)}
        .tab-icon{font-size:22px;margin-bottom:4px}
        .tab-label{font-size:11px;font-weight:600;letter-spacing:.3px}
        button{background:linear-gradient(135deg,#2b6e9e,#1a4c6e);border:none;padding:12px 20px;border-radius:44px;font-size:15px;font-weight:600;color:white;width:100%;margin-top:10px;cursor:pointer;transition:.2s;box-shadow:0 2px 8px rgba(0,0,0,.3)}
        button:active{transform:scale(.96);opacity:.9}
        button.small{width:auto;padding:8px 16px;margin-top:8px;font-size:13px}
        button.secondary{background:rgba(255,255,255,.1);margin-top:8px}
        input{width:100%;padding:12px 16px;margin:6px 0;border:1px solid rgba(56,189,248,.3);border-radius:44px;font-size:15px;background:#111827;color:#f0f4ff;outline:none}
        input:focus{border-color:#2b6e9e;box-shadow:0 0 0 2px rgba(43,110,158,.4)}
        .order-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.08);gap:12px;flex-wrap:wrap}
        .price{font-size:26px;font-weight:800;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;background-clip:text;color:transparent}
        .small-text{font-size:12px;color:#9ca3af}
        .chart-container{width:100%;height:220px;margin:16px 0;border-radius:20px;overflow:hidden;background:#0f1320}
        canvas{width:100%;height:100%}
        .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);backdrop-filter:blur(12px);z-index:1000;align-items:center;justify-content:center}
        .modal-content{background:#121826;border-radius:32px;max-width:90%;width:400px;max-height:80%;overflow-y:auto;padding:20px;border:1px solid #2b6e9e;box-shadow:0 20px 40px rgba(0,0,0,.4)}
        .modal-content h3{text-align:center;margin-bottom:16px;font-size:18px}
        .close-modal{float:right;font-size:28px;cursor:pointer;color:#9ca3af}
        .trades-list{max-height:400px;overflow-y:auto}
        .trade-item-row{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid rgba(255,255,255,.1);font-size:13px}
        .profile-avatar{display:flex;flex-direction:column;align-items:center;margin-bottom:20px;cursor:pointer}
        .avatar-circle{width:88px;height:88px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:48px;color:white;text-shadow:0 1px 2px rgba(0,0,0,.3);box-shadow:0 6px 16px rgba(0,0,0,.4);margin-bottom:8px;transition:.2s}
        .avatar-circle:hover{transform:scale(1.02)}
        .avatar-emoji{display:inline-block;line-height:1}
        .notification-bell{font-size:22px;cursor:pointer;position:relative;display:inline-block}
        .notification-badge{position:absolute;top:-8px;right:-12px;background:#e74c3c;color:white;border-radius:50%;width:18px;height:18px;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:bold}
        .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);backdrop-filter:blur(12px);color:white;padding:12px 20px;border-radius:40px;z-index:2000;font-size:14px;border-left:4px solid #2b6e9e;box-shadow:0 4px 12px rgba(0,0,0,.3);animation:fadeInOut 5s ease forwards;pointer-events:none;white-space:nowrap}
        @keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(-20px)}10%{opacity:1;transform:translateX(-50%) translateY(0)}90%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-20px)}}
        .bg-gradient1{background:linear-gradient(135deg,#2b6e9e,#1a4c6e)}.bg-gradient2{background:linear-gradient(135deg,#9b59b6,#8e44ad)}.bg-gradient3{background:linear-gradient(135deg,#e67e22,#d35400)}.bg-gradient4{background:linear-gradient(135deg,#27ae60,#2ecc71)}.bg-gradient5{background:linear-gradient(135deg,#f1c40f,#f39c12)}.bg-gradient6{background:linear-gradient(135deg,#e74c3c,#c0392b)}.bg-gradient7{background:linear-gradient(135deg,#1abc9c,#16a085)}.bg-gradient8{background:linear-gradient(135deg,#3498db,#2980b9)}.bg-gradient9{background:linear-gradient(135deg,#34495e,#2c3e50)}.bg-gradient10{background:linear-gradient(135deg,#ff9a9e,#fad0c4)}.bg-gradient11{background:linear-gradient(135deg,#a18cd1,#fbc2eb)}
        .achievement-icons{display:flex;justify-content:center;gap:16px;margin:16px 0;flex-wrap:wrap}
        .achi-icon{width:56px;height:56px;background:rgba(255,255,255,.05);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;cursor:pointer;transition:.2s;border:1px solid transparent}
        .achi-icon.earned{background:linear-gradient(135deg,#2b6e9e,#1a4c6e);border-color:#60a5fa;box-shadow:0 0 10px rgba(43,110,158,.5)}
        .stats-container{display:flex;flex-direction:column;gap:12px;margin:16px 0}
        .stats-row{display:flex;gap:12px;justify-content:space-between}
        .stat-card{background:rgba(0,0,0,.3);border-radius:24px;padding:16px;text-align:center;flex:1}
        .stat-value{font-size:28px;font-weight:800;background:linear-gradient(135deg,#eef2ff,#a5b4fc);-webkit-background-clip:text;background-clip:text;color:transparent}
        .stat-label{font-size:12px;margin-top:4px}
        .progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:6px;overflow:hidden;margin:6px 0}
        .progress-fill{background:linear-gradient(90deg,#2b6e9e,#60a5fa);height:100%;width:0%;border-radius:10px}
        .next-achievements{margin-top:12px;background:rgba(0,0,0,.2);border-radius:20px;padding:12px}
        .next-achievement-item{margin-bottom:12px}
        .rank-card{display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.3);border-radius:20px;padding:12px;margin-top:12px}
        .order-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:14px}
        .best-price{display:flex;justify-content:space-between;margin:12px 0;padding:10px;background:rgba(0,0,0,.3);border-radius:20px}
        .filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
        .filter-btn,.sort-btn,.timeframe-btn{background:rgba(255,255,255,.05);padding:6px 14px;border-radius:60px;font-size:13px;font-weight:500;cursor:pointer;transition:.2s}
        .filter-btn.active,.sort-btn.active,.timeframe-btn.active{background:linear-gradient(135deg,#2b6e9e,#1a4c6e);color:white}
        .orders-container{max-height:300px;overflow-y:auto;margin-top:12px}
        .leaderboard-item,.history-item,.referral-item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
        .avatars-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:20px 0}
        .avatar-option{width:65px;height:65px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.05);border-radius:50%;margin:0 auto;cursor:pointer}
        .avatar-option.selected{border:2px solid #2b6e9e;background:rgba(43,110,158,.3);transform:scale(1.05)}
        .bg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:20px 0}
        .bg-option{width:65px;height:65px;border-radius:50%;margin:0 auto;cursor:pointer;border:2px solid transparent}
        .bg-option.selected{border-color:#2b6e9e;transform:scale(1.05)}
        .custom-color-preview{width:65px;height:65px;border-radius:50%;margin:0 auto;cursor:pointer;border:2px solid transparent;display:flex;align-items:center;justify-content:center;font-size:28px}
        .topup-amounts{display:flex;gap:12px;margin:16px 0;flex-wrap:wrap}
        .amount-btn{background:rgba(255,255,255,.05);padding:10px 16px;border-radius:60px;text-align:center;cursor:pointer;transition:.2s;font-weight:600}
        .amount-btn.selected{background:linear-gradient(135deg,#2b6e9e,#1a4c6e);color:white;box-shadow:0 0 8px #2b6e9e}
        .ticker{background:rgba(0,0,0,.35);border-radius:60px;padding:8px 16px;overflow:hidden;white-space:nowrap;margin:12px 0}
        .ticker-content{display:inline-block;animation:scroll 20s linear infinite}
        @keyframes scroll{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
        .info-panel{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0}
        .info-card{background:rgba(0,0,0,.3);border-radius:20px;padding:12px;text-align:center}
        .notification-item{padding:12px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;justify-content:space-between;align-items:center}
        .notification-item.unread{background:rgba(43,110,158,0.2);border-left:3px solid #2b6e9e}
        .notification-message{flex:1;font-size:13px}
        .notification-time{font-size:10px;color:#9ca3af;margin:0 12px}
    </style>
</head>
<body>
<div id="app">Загрузка...</div>
<div class="tabs-wrapper">
    <div class="tabs" id="tabs">
        <div class="tab" data-tab="profile"><div class="tab-icon">👤</div><div class="tab-label">Профиль</div></div>
        <div class="tab active" data-tab="stocks"><div class="tab-icon">📈</div><div class="tab-label">Акции</div></div>
        <div class="tab" data-tab="analytics"><div class="tab-icon">📊</div><div class="tab-label">Аналитика</div></div>
        <div class="tab" data-tab="rating"><div class="tab-icon">🏆</div><div class="tab-label">Рейтинг</div></div>
        <div class="tab" data-tab="wallet"><div class="tab-icon">💳</div><div class="tab-label">Кошелёк</div></div>
        <div class="tab" data-tab="referral"><div class="tab-icon">🔗</div><div class="tab-label">Рефералка</div></div>
        <div class="tab" data-tab="settings"><div class="tab-icon">⚙️</div><div class="tab-label">Настройки</div></div>
        <div class="tab admin-tab" data-tab="admin" style="display:none"><div class="tab-icon">👑</div><div class="tab-label">Админ</div></div>
    </div>
</div>
<div id="topupModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h3>💸 Пополнение Stars</h3>
        <div class="topup-amounts">
            <div class="amount-btn" data-amount="200">200 ⭐</div>
            <div class="amount-btn" data-amount="500">500 ⭐</div>
            <div class="amount-btn" data-amount="1000">1000 ⭐</div>
        </div>
        <input type="number" id="customTopupAmount" placeholder="Своя сумма (1-10000)" min="1" step="1">
        <div id="topupFeeInfo"></div>
        <button id="confirmTopupBtn">Пополнить</button>
    </div>
</div>
<script>
    (async () => {
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        let userId = tg.initDataUnsafe?.user?.id;
        let username = tg.initDataUnsafe?.user?.username || `user_${userId}`;
        if (!userId) { document.getElementById('app').innerHTML = '<div class="card" style="text-align:center;">Ошибка: запустите через Telegram</div>'; return; }
        if (userId === 6048486427) document.querySelector('.admin-tab').style.display = 'inline-flex';

        const SUPABASE_URL = "https://gsutnhhklidxmewdkcvk.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzdXRuaGhrbGlkeG1ld2RrY3ZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NzA2MTEsImV4cCI6MjA5NjE0NjYxMX0.XEtyJVT0BfmEgAAsGagPHRdHhmCgrtWEbtzov0c3EXc";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const BACKEND_URL = 'https://voxaction-bot-main.onrender.com'; // ЗАМЕНИТЕ НА ВАШ URL
        let currentUser = null;

        function toCents(v) { return Math.round(parseFloat(v) * 100); }
        function fromCents(c) { return (c / 100).toFixed(2); }
        function showMessage(title, msg) { tg.showPopup({ title, message: msg, buttons: [{ type: 'ok' }] }); }
        function showModal(title, msg) {
            const html = `<div class="modal" style="display:flex"><div class="modal-content"><span class="close-modal">&times;</span><h3>${title}</h3><p style="margin:20px 0;text-align:center">${msg}</p><button id="modalOk">OK</button></div></div>`;
            document.body.insertAdjacentHTML('beforeend', html);
            const m = document.body.lastElementChild;
            m.querySelector('.close-modal').onclick = () => m.remove();
            m.querySelector('#modalOk').onclick = () => m.remove();
        }
        function toast(msg) {
            const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 5000);
        }

        // ---------- ОСНОВНЫЕ ФУНКЦИИ ДЛЯ АКЦИЙ (старая логика) ----------
        async function getActiveOrders() {
            const res = await fetch(`${BACKEND_URL}/get-active-orders`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ user_id: userId }) });
            const data = await res.json();
            if (!data.ok) throw new Error(data.error);
            return data.orders;
        }
        async function getUserOrders() {
            const res = await fetch(`${BACKEND_URL}/get-user-orders`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ user_id: userId }) });
            const data = await res.json();
            if (!data.ok) throw new Error(data.error);
            return data.orders;
        }
        async function cancelOrder(orderId) {
            const res = await fetch(`${BACKEND_URL}/cancel-order`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ user_id: userId, order_id: orderId }) });
            const data = await res.json();
            if (!data.ok) throw new Error(data.error);
            return true;
        }
        async function createOrder(amount, price) {
            const res = await fetch(`${BACKEND_URL}/create-sell-order`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ user_id: userId, amount, price }) });
            const data = await res.json();
            if (!data.ok) throw new Error(data.error);
            return true;
        }
        async function executePartialTrade(orderId, buyAmountCents) {
            const res = await fetch(`${BACKEND_URL}/execute-trade`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ user_id: userId, order_id: orderId, amount: buyAmountCents/100 }) });
            const data = await res.json();
            if (!data.ok) throw new Error(data.error);
            return true;
        }
        async function getPriceHistory() {
            let start = new Date();
            if (currentTimeframe === '1d') start.setDate(start.getDate()-1);
            else if (currentTimeframe === '7d') start.setDate(start.getDate()-7);
            else start.setDate(start.getDate()-30);
            const { data } = await supabase.from('price_history').select('price,created_at').gte('created_at',start.toISOString()).order('created_at',{ascending:true}).limit(100);
            return data || [];
        }
        async function getRecentTrades(limit=10) {
            const { data } = await supabase.from('trades').select('amount,price_per_share').order('created_at',{ascending:false}).limit(limit);
            return data || [];
        }
        async function getCurrentPrice() {
            const { data } = await supabase.from('trades').select('amount,price_per_share').order('created_at',{ascending:false}).limit(50);
            if (!data || !data.length) return 100;
            let totalAmt=0,totalStars=0;
            for(let t of data){ totalAmt+=t.amount; totalStars+=t.amount*t.price_per_share; }
            return totalAmt>0 ? totalStars/totalAmt : 100;
        }
        async function getTotalMarketCap() {
            const { data } = await supabase.from('users').select('shares');
            const totalSharesCents = data.reduce((s,u)=>s+u.shares,0);
            const price = await getCurrentPrice();
            return { totalShares: totalSharesCents, price, cap: (totalSharesCents/100)*(price/100) };
        }
        async function getLeaderboard() {
            const { data } = await supabase.from('users').select('id, username, shares').eq('hide_rating', false).order('shares', { ascending: false });
            return data || [];
        }
        async function getUserStats() {
            const { data } = await supabase.from('trades').select('amount, total_stars').or(`seller_id.eq.${userId},buyer_id.eq.${userId}`);
            if (!data) return { totalTrades: 0, totalVolume: 0 };
            return { totalTrades: data.length, totalVolume: data.reduce((s,t) => s + t.total_stars/100, 0) };
        }
        async function getSellerRating(sellerId) {
            const { data } = await supabase.from('seller_ratings').select('rating').eq('seller_id', sellerId);
            if (!data || !data.length) return null;
            return data.reduce((s,r)=>s+r.rating,0)/data.length;
        }
        
        let currentTimeframe = '30d';
        function drawCanvasChart(history) {
            const cont = document.getElementById('chart-container');
            if (!cont) return;
            cont.innerHTML = '';
            if (!history.length) { cont.innerHTML = '<p style="padding:20px;text-align:center">Нет данных</p>'; return; }
            const canvas = document.createElement('canvas');
            const w = cont.clientWidth, h = 220;
            canvas.width = w; canvas.height = h;
            canvas.style.width = '100%'; canvas.style.height = 'auto';
            cont.appendChild(canvas);
            const ctx = canvas.getContext('2d');
            const vals = history.map(h => h.price/100);
            const max = Math.max(...vals), min = Math.min(...vals), range = max-min;
            const pad = { top:20, bottom:30, left:40, right:20 };
            const gw = w - pad.left - pad.right;
            const gh = h - pad.top - pad.bottom;
            const step = gw / (vals.length-1);
            ctx.fillStyle = '#0f1320';
            ctx.fillRect(0,0,w,h);
            ctx.beginPath(); ctx.strokeStyle = '#2b6e9e'; ctx.lineWidth = 2;
            for(let i=0;i<vals.length;i++) {
                const x = pad.left + i*step;
                let y = (range===0) ? pad.top+gh/2 : pad.top + gh - ((vals[i]-min)/range)*gh;
                if(i===0) ctx.moveTo(x,y);
                else ctx.lineTo(x,y);
            }
            ctx.stroke();
            ctx.fillStyle = '#eef2ff'; ctx.font='11px sans-serif';
            ctx.fillText(max.toFixed(2), pad.left-30, pad.top+10);
            ctx.fillText(min.toFixed(2), pad.left-30, h-pad.bottom-5);
            if(history.length) {
                const first = new Date(history[0].created_at).toLocaleDateString();
                const last = new Date(history[history.length-1].created_at).toLocaleDateString();
                ctx.fillText(first, pad.left, h-pad.bottom+15);
                ctx.fillText(last, w-pad.right-40, h-pad.bottom+15);
            }
        }
        function renderTicker(trades) {
            const cont = document.getElementById('ticker');
            if (!cont) return;
            if (!trades.length) { cont.innerHTML = '<div class="ticker-content">Нет сделок</div>'; return; }
            cont.innerHTML = `<div class="ticker-content">${trades.map(t => `<span style="margin-right:24px">${fromCents(t.amount)} шт. по ${fromCents(t.price_per_share)} ⭐</span>`).join('')}</div>`;
        }
        
        let currentOrdersFilter = 'all';
        let currentSortDir = 'asc';
        async function renderStocks() {
            try {
                let orders = [];
                if (currentOrdersFilter === 'all') orders = await getActiveOrders();
                else orders = await getUserOrders();
                for(let o of orders) o.seller_rating = await getSellerRating(o.seller_id);
                if (currentSortDir === 'asc') orders.sort((a,b)=>a.price_per_share - b.price_per_share);
                else orders.sort((a,b)=>b.price_per_share - a.price_per_share);
                const hist = await getPriceHistory();
                const recent = await getRecentTrades(10);
                const { totalShares, price, cap } = await getTotalMarketCap();
                const html = `
                    <div class="card"><div style="display:flex;justify-content:space-between"><div><p>📊 Акций: <strong>${fromCents(currentUser.shares)}</strong></p><p>⭐ Stars: <strong>${fromCents(currentUser.stars_balance)}</strong></p></div><div class="price">${(price/100).toFixed(2)} ⭐</div></div></div>
                    <div class="card"><div class="info-panel"><div class="info-card"><div class="small-text">Рыночная капитализация</div><div class="price" style="font-size:20px">${Math.round(cap)} ⭐</div></div><div class="info-card"><div class="small-text">Всего акций</div><div class="price" style="font-size:20px">${(totalShares/100).toFixed(2)}</div></div></div>
                    <div style="display:flex;gap:8px;margin-bottom:12px"><button class="timeframe-btn ${currentTimeframe==='1d'?'active':''}" data-tf="1d">1д</button><button class="timeframe-btn ${currentTimeframe==='7d'?'active':''}" data-tf="7d">7д</button><button class="timeframe-btn ${currentTimeframe==='30d'?'active':''}" data-tf="30d">30д</button><button id="refreshChart" style="margin-left:auto;width:auto;padding:6px 12px">🔄</button></div>
                    <div id="chart-container" class="chart-container"></div><div id="ticker" class="ticker"></div></div>

            if (error) throw new Error(error.message);

        async function getEarnedAchievements() {
            const { data } = await supabase.from('user_achievements')
                .select('achievement_id, earned_at, achievements(*)')
                .eq('user_id', userId);
            if (!data) return [];
            // Удаляем возможные дубликаты (оставляем первый)
            const unique = [];
            const seen = new Set();
            for (let item of data) {
                if (!seen.has(item.achievement_id)) {
                    seen.add(item.achievement_id);
                    unique.push({ ...item.achievements, earned_at: item.earned_at });
                }
            }
            return unique;
        }
        
        async function getAllAchievements() {
            const { data } = await supabase.from('achievements').select('*');
            return data || [];
        }
        
        async function getUserRank() {
            const leaders = await getLeaderboard();
            const idx = leaders.findIndex(u => u.id === userId);
            return idx !== -1 ? idx + 1 : null;
        }
        
        async function getNextProgress() {
            const all = await getAllAchievements();
            const earned = await getEarnedAchievements();
            const earnedIds = new Set(earned.map(a => a.id));
            const ignore = ['🌟 Первый шаг', '🎨 Стилист', '✅ Абсолютный чемпион'];
            const notEarned = all.filter(a => !earnedIds.has(a.id) && !ignore.includes(a.name));
            if (!notEarned.length) return [];
            const stats = await getUserStats();
            const trades = stats.totalTrades;
            const shares = currentUser.shares;
            const refs = currentUser.referral_count || 0;
            const topup = currentUser.total_topup || 0;
            const next = [];
            for (let ach of notEarned) {
                let cur = 0, need = ach.condition_value;
                switch (ach.condition_type) {
                    case 'trades_count': cur = trades; break;
                    case 'shares_held': cur = shares; break;
                    case 'referrals_count': cur = refs; break;
                    case 'total_topup': cur = topup; break;
                    default: continue;
                }
                if (cur < need) {
                    next.push({ ...ach, cur, need, prog: Math.min(100, (cur / need) * 100) });
                }
                if (next.length >= 3) break;
            }
            return next;
        }

                icon.addEventListener('click', async () => {
                    const slot = parseInt(icon.dataset.slot);
                    const curId = icon.dataset.achId ? parseInt(icon.dataset.achId) : null;
                    await openAchievementSelector(slot, earned, selectedIds, curId);
                });
            });
            await updateBellBadge();
        }
        
        // ---------- ОСТАЛЬНЫЕ ВКЛАДКИ (заглушки, можно расширить) ----------
        async function renderRating() {
            const leaders = await getLeaderboard();
            let html = `<div class="card"><h2>🏆 Рейтинг держателей акций</h2>`;
            if (!leaders.length) html += '<p>Нет данных</p>';
            else leaders.forEach((u,i) => html += `<div class="leaderboard-item"><div class="rank">${i+1}</div><div class="user-name">${u.username||'Аноним'}</div><div class="user-shares">${fromCents(u.shares)} акций</div></div>`);
            html += `</div>`;
            document.getElementById('app').innerHTML = html;
        }
        async function renderWallet() {
            document.getElementById('app').innerHTML = `<div class="card"><h2>💳 Кошелёк</h2><p>⭐ Баланс: <strong>${fromCents(currentUser.stars_balance)}</strong></p><p>📊 Акций: <strong>${fromCents(currentUser.shares)}</strong></p><hr><button id="topupBtn">💸 Пополнить Stars</button><button id="withdrawGiftsBtn" style="margin-top:12px">🎁 Вывести через подарки</button></div>`;
            document.getElementById('topupBtn')?.addEventListener('click', () => document.getElementById('topupModal').style.display = 'flex');
            document.getElementById('withdrawGiftsBtn')?.addEventListener('click', () => tg.openTelegramLink('https://t.me/VoxAction_Bot?start=withdraw_gifts'));
        }
        async function renderReferral() {
            const refLink = `https://t.me/VoxAction_Bot?start=${currentUser.referral_code || 'REF0000'}`;
            const cnt = currentUser.referral_count || 0;
            const earned = cnt * 5;
            const html = `<div class="card"><h2>🔗 Реферальная программа</h2><div class="stats-row"><div class="stat-card"><div class="stat-value">${cnt}</div><div class="stat-label">Приглашено друзей</div></div><div class="stat-card"><div class="stat-value">${earned}</div><div class="stat-label">Заработано акций</div></div></div><h3>Ваша реферальная ссылка</h3><div class="small-text" style="background:rgba(0,0,0,.3);padding:8px;border-radius:20px;word-break:break-all">${refLink}</div><button id="copyRefLink">📋 Скопировать ссылку</button></div>`;
            document.getElementById('app').innerHTML = html;
            document.getElementById('copyRefLink')?.addEventListener('click', () => { navigator.clipboard.writeText(refLink); showModal('Скопировано', 'Ссылка скопирована'); });
        }
        async function renderAnalytics() {
            const vol = await supabase.rpc('get_volume_history', { days_limit: 30 });
            let html = `<div class="card"><h2>📊 Объёмы торгов</h2><canvas id="volCanvas" style="width:100%;height:130px"></canvas><p class="small-text">Объём за 30 дней</p></div>`;
            document.getElementById('app').innerHTML = html;
            if (vol.data && vol.data.length) {
                const canvas = document.getElementById('volCanvas');
                const ctx = canvas.getContext('2d');
                const w = canvas.clientWidth, h = 130;
                canvas.width = w; canvas.height = h;
                const maxVol = Math.max(...vol.data.map(v=>v.total_amount/100));
                const barW = (w-40)/vol.data.length - 2;
                ctx.fillStyle = '#2b6e9e';
                vol.data.forEach((v,i) => {
                    const barH = (v.total_amount/100 / maxVol) * (h-20);
                    ctx.fillRect(20 + i*(barW+2), h-10-barH, barW, barH);
                });
            }
        }
        async function renderSettings() {
            const hide = currentUser.hide_rating || false;
            const color = localStorage.getItem('custom_color') || '#2b6e9e';
            const html = `<div class="card"><h2>⚙️ Настройки</h2><label><input type="checkbox" id="hideRating" ${hide?'checked':''}> Скрыть из рейтинга</label><br><br><div><strong>Уведомления от бота:</strong></div><label><input type="checkbox" id="notifyTrades" ${currentUser.notify_trades!==false?'checked':''}> О сделках</label><br><label><input type="checkbox" id="notifyTopup" ${currentUser.notify_topup!==false?'checked':''}> О пополнении</label><br><label><input type="checkbox" id="notifyReferral" ${currentUser.notify_referral!==false?'checked':''}> О рефералах</label><br><br><div><strong>Цвет акцента:</strong></div><input type="color" id="colorPicker" value="${color}" style="width:60px;padding:0"><button id="saveSettings">Сохранить</button></div>`;
            document.getElementById('app').innerHTML = html;
            document.getElementById('saveSettings').onclick = async () => {
                const newHide = document.getElementById('hideRating').checked;
                const newColor = document.getElementById('colorPicker').value;
                localStorage.setItem('custom_color', newColor);
                document.documentElement.style.setProperty('--accent', newColor);
                await supabase.from('users').update({
                    hide_rating: newHide,
                    notify_trades: document.getElementById('notifyTrades').checked,
                    notify_topup: document.getElementById('notifyTopup').checked,
                    notify_referral: document.getElementById('notifyReferral').checked
                }).eq('id', userId);
                currentUser.hide_rating = newHide;
                showModal('Успех', 'Настройки сохранены');
            };
        }
        async function renderAdmin() {
            if (userId !== 6048486427) { document.getElementById('app').innerHTML = '<div class="card error">Доступ запрещён</div>'; return; }
            try {
                const stats = await fetch(`${BACKEND_URL}/admin/stats`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ admin_id: userId }) }).then(r=>r.json());
                const usersData = await fetch(`${BACKEND_URL}/admin/users`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ admin_id: userId }) }).then(r=>r.json());
                const orders = await getActiveOrders();
                let html = `<div class="card"><h2>👑 Админ-панель</h2><h3>Статистика</h3><p>Акций в обращении: ${stats.total_shares || 0}</p><p>Резерв: ${stats.reserve || 0}</p><hr><h3>Выдать акции/звёзды</h3><input type="number" id="targetUserId" placeholder="ID"><input type="number" id="giveShares" placeholder="Акции"><button id="giveSharesBtn">Выдать акции</button><input type="number" id="giveStars" placeholder="Stars"><button id="giveStarsBtn">Выдать Stars</button><hr><h3>Активные ордера</h3><div id="adminOrdersList"></div><hr><h3>Пользователи</h3><div id="usersList" style="max-height:300px; overflow-y:auto;"></div></div>`;
                document.getElementById('app').innerHTML = html;
                const ordersDiv = document.getElementById('adminOrdersList');
                ordersDiv.innerHTML = '';
                if (orders.length) orders.forEach(o => ordersDiv.innerHTML += `<div class="order-item"><div>${fromCents(o.amount)} шт. по ${fromCents(o.price_per_share)} ⭐ (продавец ${o.seller_id})</div><button class="cancel-btn" data-id="${o.id}">Отменить</button></div>`);
                document.querySelectorAll('.cancel-btn').forEach(btn => btn.addEventListener('click', async () => {
                    const res = await fetch(`${BACKEND_URL}/admin/cancel-order`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ admin_id: userId, order_id: btn.dataset.id }) });
                    const data = await res.json();
                    if(data.ok) { showModal('Успех','Ордер отменён'); renderAdmin(); } else showModal('Ошибка',data.error);
                }));
                if(usersData.users) document.getElementById('usersList').innerHTML = usersData.users.map(u => `<div>ID: ${u.id} | ${u.username||'Аноним'} | Акций: ${fromCents(u.shares)} | Stars: ${fromCents(u.stars_balance)}</div>`).join('');
                document.getElementById('giveSharesBtn').onclick = async () => {
                    const target = parseInt(document.getElementById('targetUserId').value);
                    const shares = parseInt(document.getElementById('giveShares').value);
                    if(!target||!shares) { showModal('Ошибка','Заполните поля'); return; }
                    const res = await fetch(`${BACKEND_URL}/admin/add-shares`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ admin_id: userId, target_id: target, shares }) });
                    const data = await res.json();
                    if(data.ok) showModal('Успех','Акции выданы'); else showModal('Ошибка',data.error);
                };
                document.getElementById('giveStarsBtn').onclick = async () => {
                    const target = parseInt(document.getElementById('targetUserId').value);
                    const stars = parseInt(document.getElementById('giveStars').value);
                    if(!target||!stars) { showModal('Ошибка','Заполните поля'); return; }
                    const res = await fetch(`${BACKEND_URL}/admin/add-stars`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ admin_id: userId, target_id: target, stars }) });
                    const data = await res.json();
                    if(data.ok) showModal('Успех','Stars выданы'); else showModal('Ошибка',data.error);
                };
            } catch(e) { document.getElementById('app').innerHTML = `<div class="card error">${e.message}</div>`; }
        }
        
        // ---------- ПОПОЛНЕНИЕ ----------
        let selectedAmount = null;
        function updateTopupFee(amt) {
            const fee = Math.floor(amt * 0.05);
            const rec = amt - fee;
            document.getElementById('topupFeeInfo').innerHTML = `💸 Вы платите: ${amt} ⭐<br>📉 Комиссия (5%): ${fee} ⭐<br>✅ Получите: ${rec} ⭐`;
        }
        document.querySelectorAll('#topupModal .amount-btn').forEach(btn => btn.addEventListener('click', () => {
            document.querySelectorAll('#topupModal .amount-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedAmount = parseInt(btn.dataset.amount);
            document.getElementById('customTopupAmount').value = selectedAmount;
            updateTopupFee(selectedAmount);
        }));
        document.getElementById('customTopupAmount')?.addEventListener('input', () => {
            let val = parseInt(document.getElementById('customTopupAmount').value);
            if (!isNaN(val) && val>=1) { selectedAmount = val; document.querySelectorAll('#topupModal .amount-btn').forEach(b => b.classList.remove('selected')); updateTopupFee(selectedAmount); }
            else document.getElementById('topupFeeInfo').innerHTML = '';
        });
        document.getElementById('confirmTopupBtn')?.addEventListener('click', async () => {
            if (!selectedAmount || selectedAmount<1) { showModal('Ошибка','Выберите сумму'); return; }
            document.getElementById('topupModal').style.display = 'none';
            try {
                const res = await fetch(`${BACKEND_URL}/create-invoice`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ user_id: userId, amount: selectedAmount }) });
                const data = await res.json();
                if (data.ok && data.invoice_link) tg.openInvoice(data.invoice_link, (status) => { if (status === 'paid') { showModal('Успех','Баланс пополнен'); refreshUser(); renderStocks(); } });
                else showModal('Ошибка', data.error || 'Не удалось создать счёт');
            } catch(e) { showModal('Ошибка','Соединение'); }
        });
        document.getElementById('closeTopupModal')?.addEventListener('click', () => document.getElementById('topupModal').style.display = 'none');
        
        async function refreshUser() {
            const res = await getOrCreateUser();
            currentUser = res.user;
        }
        
        // ---------- АВТООБНОВЛЕНИЕ ----------
        let autoRefresh = null;
        function startAuto() {
            if (autoRefresh) clearInterval(autoRefresh);
            autoRefresh = setInterval(async () => {
                const active = document.querySelector('.tab.active');
                if (active && active.dataset.tab === 'stocks') {
                    await refreshUser();
                    await renderStocks();
                }
            }, 15000);
        }
        function stopAuto() { if (autoRefresh) clearInterval(autoRefresh); autoRefresh = null; }
        
        // ---------- ЗАПУСК ----------
        const { user, isNew } = await getOrCreateUser();
        currentUser = user;
        const savedColor = localStorage.getItem('custom_color') || '#2b6e9e';
        document.documentElement.style.setProperty('--accent', savedColor);
        await renderStocks();
        setupRealtime();
        await updateBellBadge();
        startAuto();
        if (isNew) setTimeout(() => openAvatar(), 500);
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', async () => {
                const name = tab.dataset.tab;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                if (name === 'stocks') {
                    startAuto();
                    await refreshUser();
                    await renderStocks();
                } else {
                    stopAuto();
                    if (name === 'profile') {
                        await refreshUser();
                        await renderProfile();
                    } else if (name === 'analytics') await renderAnalytics();
                    else if (name === 'rating') await renderRating();
                    else if (name === 'wallet') await renderWallet();
                    else if (name === 'referral') await renderReferral();
                    else if (name === 'settings') await renderSettings();
                    else if (name === 'admin') await renderAdmin();
                }
            });
        });
    })();
</script>
</body>
</html>
