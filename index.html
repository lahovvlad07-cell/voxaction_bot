<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Акции – биржа | VoxAction</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Вынесенные модули вкладок -->
    <script src="profile.js"></script>
    <script src="stocks.js"></script>
    <script src="analytics.js"></script>
    <script src="rating.js"></script>
    <script src="wallet.js"></script>
    <script src="referral.js"></script>
    <script src="admin.js"></script>
    <style>
        /* ========== ВЕСЬ ВАШ CSS ОТСЮДА ========== */
        /* Скопируйте сюда полностью стили из вашего рабочего index.html 
           (тот, где всё отображалось корректно). */
        /* Ниже приведены основные стили, но для гарантии вставьте свои. */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; scrollbar-width: none; -ms-overflow-style: none; }
        *::-webkit-scrollbar { display: none; }
        body {
            background: #0a0e1a;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            color: #eef2ff;
            padding-top: 70px;
            padding-bottom: calc(76px + env(safe-area-inset-bottom));
        }
        .app-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(10, 14, 26, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(56, 189, 248, 0.25);
            padding: 12px 16px;
            z-index: 101;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-logo {
            font-weight: 700;
            font-size: 18px;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header-icons { display: flex; gap: 20px; align-items: center; }
        .header-icon { font-size: 24px; cursor: pointer; transition: 0.2s; position: relative; }
        .header-icon:active { transform: scale(0.94); }
        .notification-badge {
            position: absolute;
            top: -8px;
            right: -12px;
            background: #e74c3c;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .card {
            background: rgba(18, 24, 38, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 18px;
            margin: 12px 16px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            position: relative;
        }
        .tabs-wrapper {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 14, 26, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(56, 189, 248, 0.25);
            padding: 6px 0 calc(6px + env(safe-area-inset-bottom));
            z-index: 100;
            overflow-x: auto;
            white-space: nowrap;
        }
        .tabs {
            display: inline-flex;
            gap: 6px;
            padding: 0 12px;
        }
        .tab {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px 12px;
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.04);
            transition: all 0.2s;
            cursor: pointer;
            min-width: 68px;
        }
        .tab.active {
            background: linear-gradient(135deg, #2b6e9e, #1a4c6e);
            box-shadow: 0 0 12px rgba(43, 110, 158, 0.6);
        }
        .tab-icon { font-size: 22px; margin-bottom: 4px; }
        .tab-label { font-size: 11px; font-weight: 600; letter-spacing: 0.3px; }
        button {
            background: linear-gradient(135deg, #2b6e9e, #1a4c6e);
            border: none;
            padding: 14px 20px;
            border-radius: 44px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            width: 100%;
            margin-top: 14px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }
        button:active { transform: scale(0.96); opacity: 0.9; }
        input {
            width: 100%;
            padding: 14px 18px;
            margin: 8px 0;
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 44px;
            background: #111827;
            color: #f0f4ff;
            outline: none;
        }
        .price {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .small-text { font-size: 12px; color: #9ca3af; }
        .chart-container { width: 100%; height: 220px; margin: 16px 0; border-radius: 20px; overflow: hidden; background: #0f1320; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #121826;
            border-radius: 32px;
            max-width: 90%;
            width: 400px;
            max-height: 80%;
            overflow-y: auto;
            padding: 20px;
            border: 1px solid #2b6e9e;
        }
        .close-modal { float: right; font-size: 28px; cursor: pointer; }
        /* Остальные стили (аватары, достижения, графики и т.д.) скопируйте из вашего рабочего файла */
        /* ... */
    </style>
</head>
<body>
<div class="app-header">
    <div class="header-logo">VoxAction</div>
    <div class="header-icons">
        <div class="header-icon" id="headerNotificationBell">🔔<span class="notification-badge" id="headerNotificationBadge" style="display:none;">0</span></div>
        <div class="header-icon" id="headerSettingsGear">⚙️</div>
    </div>
</div>
<div id="app">Загрузка...</div>
<div class="tabs-wrapper">
    <div class="tabs" id="tabs">
        <div class="tab" data-tab="profile"><div class="tab-icon">👤</div><div class="tab-label">Профиль</div></div>
        <div class="tab active" data-tab="stocks"><div class="tab-icon">📈</div><div class="tab-label">Акции</div></div>
        <div class="tab" data-tab="analytics"><div class="tab-icon">📊</div><div class="tab-label">Аналитика</div></div>
        <div class="tab" data-tab="rating"><div class="tab-icon">🏆</div><div class="tab-label">Рейтинг</div></div>
        <div class="tab" data-tab="wallet"><div class="tab-icon">💳</div><div class="tab-label">Кошелёк</div></div>
        <div class="tab" data-tab="referral"><div class="tab-icon">🔗</div><div class="tab-label">Рефералка</div></div>
        <div class="tab admin-tab" data-tab="admin" style="display: none;"><div class="tab-icon">👑</div><div class="tab-label">Админ</div></div>
    </div>
</div>
<div id="topupModal" class="modal">...</div> <!-- содержимое модалки -->
<script>
    // Основной скрипт (весь код инициализации, API, уведомления)
    (async () => {
        // Drag tabs
        const tabsWrapper = document.querySelector('.tabs-wrapper');
        let isDown = false, startX, scrollLeft;
        tabsWrapper.addEventListener('mousedown', (e) => { isDown = true; startX = e.pageX - tabsWrapper.offsetLeft; scrollLeft = tabsWrapper.scrollLeft; tabsWrapper.style.cursor = 'grabbing'; });
        window.addEventListener('mouseup', () => { isDown = false; tabsWrapper.style.cursor = 'grab'; });
        window.addEventListener('mousemove', (e) => { if (!isDown) return; e.preventDefault(); const x = e.pageX - tabsWrapper.offsetLeft; const walk = (x - startX) * 2; tabsWrapper.scrollLeft = scrollLeft - walk; });
        
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        window.tg = tg;
        window.userId = tg.initDataUnsafe?.user?.id;
        window.username = tg.initDataUnsafe?.user?.username || `user_${window.userId}`;
        if (!window.userId) { document.getElementById('app').innerHTML = '<div class="card" style="text-align:center;">Ошибка: запустите через Telegram</div>'; return; }
        if (window.userId === 6048486427) document.querySelector('.admin-tab').style.display = 'inline-flex';
        
        // Утилиты
        window.toCents = (v) => Math.round(parseFloat(v) * 100);
        window.fromCents = (c) => (c / 100).toFixed(2);
        window.showCustomModal = function(title, message) { /* ... */ };
        window.showToast = function(message) { /* ... */ };
        
        // Supabase
        const SUPABASE_URL = "https://gsutnhhklidxmewdkcvk.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzdXRuaGhrbGlkeG1ld2RrY3ZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NzA2MTEsImV4cCI6MjA5NjE0NjYxMX0.XEtyJVT0BfmEgAAsGagPHRdHhmCgrtWEbtzov0c3EXc";
        window.supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        window.currentUser = null;
        window.BACKEND_URL = 'https://voxaction-bot-main.onrender.com';
        
        // API функции (getOrCreateUser, getActiveOrders, ...) – скопируйте из предыдущей версии
        // Уведомления (loadNotifications, updateBellBadge, showNotificationsModal, setupRealtimeNotifications) – скопируйте
        // Функция настроек renderSettingsTab – скопируйте
        // Пополнение (updateTopupFee, обработчики модалки) – скопируйте
        
        // Запуск
        const { user, isNew } = await window.getOrCreateUser();
        window.currentUser = user;
        const savedColor = localStorage.getItem('custom_color') || '#2b6e9e';
        document.documentElement.style.setProperty('--accent', savedColor);
        await window.renderStocksTab(window.currentUser);
        if (isNew) setTimeout(() => window.renderProfileTab(
            window.currentUser, window.supabase, window.userId, window.fromCents, window.showCustomModal,
            window.getUserStats, window.getUserRank, window.getEarnedAchievements, window.getAllAchievements,
            window.updateBellBadge, window.showNotificationsModal
        ), 500);
        setupRealtimeNotifications();
        await window.updateBellBadge();
        
        document.getElementById('headerNotificationBell')?.addEventListener('click', () => window.showNotificationsModal());
        document.getElementById('headerSettingsGear')?.addEventListener('click', () => renderSettingsTab());
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', async () => {
                const tabName = tab.dataset.tab;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                if(tabName === 'profile') await window.renderProfileTab(
                    window.currentUser, window.supabase, window.userId, window.fromCents, window.showCustomModal,
                    window.getUserStats, window.getUserRank, window.getEarnedAchievements, window.getAllAchievements,
                    window.updateBellBadge, window.showNotificationsModal
                );
                else if(tabName === 'stocks') await window.renderStocksTab(window.currentUser);
                else if(tabName === 'analytics') await window.renderAnalyticsTab();
                else if(tabName === 'rating') await window.renderRatingTab();
                else if(tabName === 'wallet') await window.renderWalletTab();
                else if(tabName === 'referral') await window.renderReferralTab();
                else if(tabName === 'admin') await window.renderAdminTab();
            });
        });
    })();
</script>
</body>
</html>
