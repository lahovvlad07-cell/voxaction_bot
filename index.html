<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Акции – биржа</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        input, button, textarea { user-select: text; }
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --primary: #38bdf8;
            --primary-dark: #0284c7;
            --success: #10b981;
            --danger: #f97316;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto;
            background: var(--bg);
            color: var(--text);
            padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px));
            transition: background 0.2s, color 0.2s;
        }
        .card { background: var(--card-bg); border-radius: 24px; padding: 16px; margin: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .tabs-wrapper { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg); border-top: 1px solid var(--border); padding: 4px 0 calc(4px + env(safe-area-inset-bottom, 0px)); z-index: 100; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; cursor: grab; }
        .tabs-wrapper:active { cursor: grabbing; }
        .tabs { display: inline-flex; gap: 8px; padding: 0 12px; }
        .tab { display: inline-flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px 12px; border-radius: 40px; background: var(--border); transition: all 0.2s; cursor: pointer; min-width: 70px; }
        .tab.active { background: var(--primary); color: white; }
        .tab-icon { font-size: 22px; margin-bottom: 4px; }
        .tab-label { font-size: 12px; font-weight: 500; }
        button { background: var(--primary); color: white; border: none; padding: 12px 16px; border-radius: 40px; font-size: 16px; font-weight: 600; width: 100%; margin-top: 8px; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.97); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border); border-radius: 40px; font-size: 16px; background: var(--bg); color: var(--text); }
        .buy-btn, .cancel-btn { width: auto; padding: 6px 16px; margin: 0; font-size: 14px; }
        .cancel-btn { background: var(--danger); }
        .order-item { border-bottom: 1px solid var(--border); padding: 12px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .price { font-size: 24px; font-weight: bold; color: var(--primary); }
        .small-text { font-size: 12px; color: var(--text-secondary); }
        .chart-container { width: 100%; height: 250px; margin: 12px 0; background: var(--card-bg); border-radius: 12px; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }
        .ticker { background: var(--bg); border-radius: 20px; padding: 8px 12px; overflow: hidden; white-space: nowrap; margin-bottom: 12px; }
        .ticker-content { display: inline-block; animation: scroll 20s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .trade-item { display: inline-block; margin-right: 30px; }
        .info-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .info-card { background: var(--bg); border-radius: 16px; padding: 12px; text-align: center; }
        .info-label { font-size: 12px; color: var(--text-secondary); }
        .info-value { font-size: 20px; font-weight: bold; }
        .leaderboard-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
        .rank { font-weight: bold; width: 40px; }
        .user-name { flex: 2; }
        .user-shares { font-weight: bold; }
        .filter-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .filter-btn, .sort-btn, .timeframe-btn { background: var(--bg); color: var(--text); margin: 0; width: auto; padding: 6px 12px; font-size: 14px; cursor: pointer; border-radius: 20px; border: 1px solid var(--border); }
        .filter-btn.active, .sort-btn.active, .timeframe-btn.active { background: var(--primary); color: white; }
        .history-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: var(--card-bg); border-radius: 24px; max-width: 90%; width: 400px; max-height: 80%; overflow-y: auto; padding: 20px; }
        .close-modal { float: right; cursor: pointer; font-size: 24px; }
        .notification-bell { position: relative; display: inline-block; cursor: pointer; }
        .badge-count { position: absolute; top: -8px; right: -12px; background: red; color: white; font-size: 10px; border-radius: 20px; padding: 2px 6px; }
        .color-preview { width: 30px; height: 30px; border-radius: 50%; display: inline-block; margin-left: 10px; border: 1px solid #ccc; }
        .topup-amounts { display: flex; justify-content: space-around; margin: 15px 0; flex-wrap: wrap; gap: 12px; }
        .amount-btn { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 10px; border-radius: 30px; width: auto; margin: 0; flex: 1; text-align: center; cursor: pointer; transition: 0.2s; }
        .amount-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }
        .fee-info { background: var(--bg); padding: 12px; border-radius: 16px; margin: 12px 0; text-align: center; font-size: 14px; }
        .custom-amount { display: flex; gap: 8px; align-items: center; margin: 12px 0; }
        .custom-amount input { flex: 2; margin: 0; }
        .profile-avatar { display: flex; flex-direction: column; align-items: center; margin-bottom: 16px; cursor: pointer; }
        .avatar-circle { width: 80px; height: 80px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; color: white; margin-bottom: 8px; }
        .achievement-icons { display: flex; justify-content: center; gap: 12px; margin: 12px 0; flex-wrap: wrap; }
        .achi-icon { width: 50px; height: 50px; background: var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--text-secondary); cursor: pointer; transition: 0.2s; }
        .achi-icon.earned { background: var(--primary); color: white; }
        .admin-only { display: none; }
    </style>
</head>
<body>
    <div id="app">Загрузка...</div>
    <div class="tabs-wrapper">
        <div class="tabs" id="tabs">
            <div class="tab" data-tab="profile"><div class="tab-icon">👤</div><div class="tab-label">Профиль</div></div>
            <div class="tab active" data-tab="stocks"><div class="tab-icon">📈</div><div class="tab-label">Акции</div></div>
            <div class="tab" data-tab="analytics"><div class="tab-icon">📊</div><div class="tab-label">Аналитика</div></div>
            <div class="tab" data-tab="rating"><div class="tab-icon">🏆</div><div class="tab-label">Рейтинг</div></div>
            <div class="tab" data-tab="wallet"><div class="tab-icon">💳</div><div class="tab-label">Кошелёк</div></div>
            <div class="tab" data-tab="settings"><div class="tab-icon">⚙️</div><div class="tab-label">Настройки</div></div>
            <div class="tab admin-tab" data-tab="admin" style="display: none;"><div class="tab-icon">👑</div><div class="tab-label">Админ</div></div>
        </div>
    </div>
    <div id="topupModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeTopupModal">&times;</span>
            <h3>Пополнение Stars</h3>
            <div class="topup-amounts">
                <div class="amount-btn" data-amount="200">200 ⭐</div>
                <div class="amount-btn" data-amount="500">500 ⭐</div>
                <div class="amount-btn" data-amount="1000">1000 ⭐</div>
            </div>
            <div class="custom-amount">
                <input type="number" id="customTopupAmount" placeholder="Своя сумма" min="1" step="1">
            </div>
            <div class="fee-info" id="topupFeeInfo"></div>
            <button id="confirmTopupBtn">Пополнить</button>
        </div>
    </div>
    <script>
        (async () => {
            // DRAG TABS
            const tabsWrapper = document.querySelector('.tabs-wrapper');
            let isDown = false, startX, scrollLeft;
            tabsWrapper.addEventListener('mousedown', (e) => { isDown = true; startX = e.pageX - tabsWrapper.offsetLeft; scrollLeft = tabsWrapper.scrollLeft; tabsWrapper.style.cursor = 'grabbing'; });
            window.addEventListener('mouseup', () => { isDown = false; tabsWrapper.style.cursor = 'grab'; });
            window.addEventListener('mousemove', (e) => { if (!isDown) return; e.preventDefault(); const x = e.pageX - tabsWrapper.offsetLeft; const walk = (x - startX) * 2; tabsWrapper.scrollLeft = scrollLeft - walk; });
            
            const tg = window.Telegram.WebApp;
            tg.ready(); tg.expand();
            let userId = tg.initDataUnsafe?.user?.id;
            const username = tg.initDataUnsafe?.user?.username || `user_${userId}`;
            if (!userId) { document.getElementById('app').innerHTML = '<div class="card error">Ошибка: запустите через Telegram</div>'; return; }
            
            // Показываем админ-вкладку, если пользователь – админ
            if (userId === 6048486427) {
                document.querySelector('.admin-tab').style.display = 'inline-flex';
            }
            
            function showMessage(title, message) {
                tg.showPopup({
                    title: title,
                    message: message,
                    buttons: [{ type: 'ok' }]
                });
            }
            
            const SUPABASE_URL = "https://gsutnhhklidxmewdkcvk.supabase.co";
            const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzdXRuaGhrbGlkeG1ld2RrY3ZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NzA2MTEsImV4cCI6MjA5NjE0NjYxMX0.XEtyJVT0BfmEgAAsGagPHRdHhmCgrtWEbtzov0c3EXc";
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            let currentUser = null;
            
            function toCents(v) { return Math.round(parseFloat(v) * 100); }
            function fromCents(c) { return (c / 100).toFixed(2); }
            
            // ----------------------------- USER -----------------------------
            async function getOrCreateUser() {
                let { data, error } = await supabase.from('users').select('*').eq('id', userId).maybeSingle();
                if (error) throw new Error(`Ошибка запроса: ${error.message}`);
                if (!data) {
                    const { data: newUser, error: insertError } = await supabase.from('users').insert([{ id: userId, username, shares: 0, stars_balance: 0 }]).select().single();
                    if (insertError) throw new Error(`Ошибка вставки: ${insertError.message}`);
                    return newUser;
                }
                return data;
            }
            
            async function getActiveOrders() {
                const { data, error } = await supabase.from('orders').select('*').eq('status', 'active').order('price_per_share', { ascending: true });
                if (error) throw new Error(error.message);
                return data || [];
            }
            async function getUserOrders() {
                const { data, error } = await supabase.from('orders').select('*').eq('seller_id', userId).eq('status', 'active');
                if (error) throw new Error(error.message);
                return data || [];
            }
            async function cancelOrder(orderId) {
                const { data, error } = await supabase.rpc('cancel_order', { p_order_id: orderId, p_user_id: userId });
                if (error) throw new Error(error.message);
                if (!data.success) throw new Error(data.error);
                return true;
            }
            async function createOrder(amount, price) {
                const amountCents = toCents(amount), priceCents = toCents(price);
                if (amountCents < 100) throw new Error('Минимум 1 акция');
                if (priceCents < 100) throw new Error('Минимум 1 Star');
                const { data, error } = await supabase.rpc('create_sell_order', { p_user_id: userId, p_amount: amountCents, p_price: priceCents });
                if (error) throw new Error(error.message);
                if (!data.success) throw new Error(data.error);
                currentUser.shares -= amountCents;
                return true;
            }
            async function executePartialTrade(orderId, buyAmountCents) {
                const { data, error } = await supabase.rpc('execute_trade_partial', { p_order_id: orderId, p_buyer_id: userId, p_buy_amount: buyAmountCents });
                if (error) throw new Error(error.message);
                if (!data.success) throw new Error(data.error);
                return true;
            }
            
            async function getPriceHistory() {
                const { data, error } = await supabase.from('price_history').select('price, created_at').order('created_at', { ascending: true }).limit(100);
                if (error) throw new Error(error.message);
                return data || [];
            }
            async function getRecentTrades(limit = 10) {
                const { data, error } = await supabase.from('trades').select('amount, price_per_share').order('created_at', { ascending: false }).limit(limit);
                if (error) throw new Error(error.message);
                return data || [];
            }
            async function getCurrentPrice() {
                const { data, error } = await supabase.from('trades').select('amount, price_per_share').order('created_at', { ascending: false }).limit(50);
                if (error || !data || data.length === 0) return 100;
                let totalAmount = 0, totalStars = 0;
                for (let trade of data) { totalAmount += trade.amount; totalStars += trade.amount * trade.price_per_share; }
                return totalAmount > 0 ? totalStars / totalAmount : 100;
            }
            async function getTotalMarketCap() {
                const { data, error } = await supabase.from('users').select('shares');
                if (error) throw new Error(error.message);
                const totalSharesCents = data.reduce((s,u) => s + u.shares, 0);
                const currentPriceCents = await getCurrentPrice();
                const marketCapStars = (totalSharesCents / 100) * (currentPriceCents / 100);
                return { totalShares: totalSharesCents, currentPrice: currentPriceCents, marketCap: marketCapStars };
            }
            async function getLeaderboard() {
                const { data, error } = await supabase.from('users').select('username, shares').eq('hide_rating', false).order('shares', { ascending: false }).limit(20);
                if (error) throw new Error(error.message);
                return data;
            }
            async function getUserStats() {
                const { data, error } = await supabase.from('trades').select('amount, total_stars').or(`seller_id.eq.${userId},buyer_id.eq.${userId}`);
                if (error) return { totalTrades: 0, totalVolume: 0 };
                return { totalTrades: data.length, totalVolume: data.reduce((s,t) => s + t.total_stars/100, 0) };
            }
            async function getAchievements() {
                const { data, error } = await supabase.from('user_achievements').select('achievements(id, name, description, icon)').eq('user_id', userId);
                if (error) return [];
                return data.map(a => a.achievements);
            }
            async function getAllAchievements() {
                const { data, error } = await supabase.from('achievements').select('*');
                if (error) return [];
                return data;
            }
            async function getSellerRating(sellerId) {
                const { data, error } = await supabase.from('seller_ratings').select('rating').eq('seller_id', sellerId);
                if (error || !data.length) return null;
                return data.reduce((s,r)=>s+r.rating,0)/data.length;
            }
            
            // ----------------------------- CHART -----------------------------
            let currentTimeframe = '30d';
            async function fetchPriceHistoryForTimeframe() {
                let startDate = new Date();
                if (currentTimeframe === '1d') startDate.setDate(startDate.getDate() - 1);
                else if (currentTimeframe === '7d') startDate.setDate(startDate.getDate() - 7);
                else startDate.setDate(startDate.getDate() - 30);
                const { data, error } = await supabase.from('price_history').select('price, created_at').gte('created_at', startDate.toISOString()).order('created_at', { ascending: true }).limit(100);
                if (error) throw new Error(error.message);
                return data || [];
            }
            function drawCanvasChart(history) {
                const container = document.getElementById('chart-container');
                if (!container) return;
                container.innerHTML = '';
                if (!history || history.length === 0) { container.innerHTML = '<p style="padding:20px;">Нет данных</p>'; return; }
                const canvas = document.createElement('canvas');
                const width = container.clientWidth, height = 250;
                canvas.width = width; canvas.height = height;
                canvas.style.width = '100%'; canvas.style.height = 'auto';
                container.appendChild(canvas);
                const ctx = canvas.getContext('2d');
                const values = history.map(h => h.price / 100);
                const max = Math.max(...values), min = Math.min(...values), range = max - min;
                const padding = { top: 20, bottom: 30, left: 40, right: 20 };
                const graphWidth = width - padding.left - padding.right;
                const graphHeight = height - padding.top - padding.bottom;
                const stepX = graphWidth / (values.length - 1);
                ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--card-bg') || '#1e293b';
                ctx.fillRect(0, 0, width, height);
                ctx.beginPath(); ctx.strokeStyle = '#ccc'; ctx.lineWidth = 1;
                ctx.moveTo(padding.left, padding.top); ctx.lineTo(padding.left, height - padding.bottom); ctx.lineTo(width - padding.right, height - padding.bottom); ctx.stroke();
                ctx.beginPath(); ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--primary') || '#38bdf8'; ctx.lineWidth = 2;
                for (let i = 0; i < values.length; i++) {
                    const x = padding.left + i * stepX;
                    let y = (range === 0) ? padding.top + graphHeight/2 : padding.top + graphHeight - ((values[i] - min) / range) * graphHeight;
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.stroke();
                ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--text') || '#f1f5f9';
                ctx.font = '11px sans-serif';
                ctx.fillText(max.toFixed(2), padding.left - 30, padding.top + 10);
                ctx.fillText(min.toFixed(2), padding.left - 30, height - padding.bottom - 5);
                if (history.length > 0) {
                    const firstDate = new Date(history[0].created_at).toLocaleDateString();
                    const lastDate = new Date(history[history.length-1].created_at).toLocaleDateString();
                    ctx.fillText(firstDate, padding.left, height - padding.bottom + 15);
                    ctx.fillText(lastDate, width - padding.right - 30, height - padding.bottom + 15);
                }
            }
            function renderTicker(trades) {
                const container = document.getElementById('ticker');
                if (!container) return;
                if (!trades || trades.length === 0) { container.innerHTML = '<div class="ticker-content">Нет сделок</div>'; return; }
                const items = trades.map(t => `<span class="trade-item">${fromCents(t.amount)} шт. по ${fromCents(t.price_per_share)} ⭐</span>`).join('');
                container.innerHTML = `<div class="ticker-content">${items}</div>`;
            }
            
            // ----------------------------- RENDERING -----------------------------
            let currentOrdersFilter = 'all';
            let currentSortDir = 'asc';
            async function renderStocksTab() {
                try {
                    let orders = [];
                    if (currentOrdersFilter === 'all') orders = await getActiveOrders();
                    else orders = await getUserOrders();
                    for (let o of orders) o.seller_rating = await getSellerRating(o.seller_id);
                    orders.sort((a,b) => currentSortDir === 'asc' ? a.price_per_share - b.price_per_share : b.price_per_share - a.price_per_share);
                    const priceHistory = await fetchPriceHistoryForTimeframe();
                    const recentTrades = await getRecentTrades(10);
                    const { totalShares, currentPrice, marketCap } = await getTotalMarketCap();
                    const html = `
                        <div class="card">
                            <div class="flex-between"><div><p>📊 Акций: <strong>${fromCents(currentUser.shares)}</strong></p><p>⭐ Stars: <strong>${fromCents(currentUser.stars_balance)}</strong></p></div><div class="price">${(currentPrice/100).toFixed(2)} ⭐</div></div>
                        </div>
                        <div class="card">
                            <div class="info-panel"><div class="info-card"><div class="info-label">Рыночная капитализация</div><div class="info-value">${Math.round(marketCap)} ⭐</div></div><div class="info-card"><div class="info-label">Всего акций</div><div class="info-value">${(totalShares/100).toFixed(2)}</div></div></div>
                            <div style="display:flex; gap:8px; margin-bottom:12px;">
                                <button class="timeframe-btn ${currentTimeframe === '1d' ? 'active' : ''}" data-tf="1d">1д</button>
                                <button class="timeframe-btn ${currentTimeframe === '7d' ? 'active' : ''}" data-tf="7d">7д</button>
                                <button class="timeframe-btn ${currentTimeframe === '30d' ? 'active' : ''}" data-tf="30d">30д</button>
                            </div>
                            <div id="chart-container" class="chart-container"></div>
                            <div id="ticker" class="ticker"></div>
                        </div>
                        <div class="card"><h3>📈 Продать акции</h3><input type="number" id="sellAmount" step="0.01" min="1" placeholder="Количество (от 1)"><input type="number" id="sellPrice" step="0.01" min="1" placeholder="Цена (от 1 Star)"><button id="sellBtn">➕ Выставить</button></div>
                        <div class="card"><div class="filter-bar"><button class="filter-btn ${currentOrdersFilter === 'all' ? 'active' : ''}" data-filter="all">Все</button><button class="filter-btn ${currentOrdersFilter === 'my' ? 'active' : ''}" data-filter="my">Мои</button><button class="sort-btn ${currentSortDir === 'asc' ? 'active' : ''}" data-sort="asc">↑ Цена выше</button><button class="sort-btn ${currentSortDir === 'desc' ? 'active' : ''}" data-sort="desc">↓ Цена ниже</button></div><h3>📋 Ордера</h3><div id="ordersList"></div></div>
                    `;
                    document.getElementById('app').innerHTML = html;
                    drawCanvasChart(priceHistory);
                    renderTicker(recentTrades);
                    document.querySelectorAll('.timeframe-btn').forEach(btn => btn.addEventListener('click', async () => { currentTimeframe = btn.dataset.tf; await renderStocksTab(); }));
                    document.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', () => { currentOrdersFilter = btn.dataset.filter; renderStocksTab(); }));
                    document.querySelectorAll('.sort-btn').forEach(btn => btn.addEventListener('click', () => { currentSortDir = btn.dataset.sort; renderStocksTab(); }));
                    const ordersDiv = document.getElementById('ordersList');
                    if (orders.length === 0) ordersDiv.innerHTML = '<p>Нет ордеров</p>';
                    else {
                        orders.forEach(order => {
                            const isOwn = order.seller_id === userId;
                            let ratingHtml = order.seller_rating ? `<span class="stars-rating">${'★'.repeat(Math.floor(order.seller_rating))}${order.seller_rating%1>=0.5?'½':''}</span>` : '';
                            const div = document.createElement('div'); div.className = 'order-item';
                            div.innerHTML = `<div><div>${fromCents(order.amount)} шт. по ${fromCents(order.price_per_share)} ⭐</div><div class="small-text">Продавец: ${order.seller_id} ${ratingHtml}</div></div><div>${!isOwn ? `<button class="buy-btn" data-order='${JSON.stringify(order)}'>Купить</button>` : `<button class="cancel-btn" data-order-id="${order.id}">Отменить</button>`}</div>`;
                            ordersDiv.appendChild(div);
                        });
                        document.querySelectorAll('.buy-btn').forEach(btn => {
                            btn.addEventListener('click', async () => {
                                const order = JSON.parse(btn.dataset.order);
                                const maxShares = fromCents(order.amount);
                                let buyAmount = prompt(`Введите количество (от 1 до ${maxShares}):`, maxShares);
                                if (!buyAmount) return;
                                buyAmount = parseFloat(buyAmount);
                                if (isNaN(buyAmount) || buyAmount < 1 || buyAmount > maxShares) { showMessage('Ошибка', 'Некорректное количество'); return; }
                                try {
                                    await executePartialTrade(order.id, toCents(buyAmount));
                                    showMessage('Успех', 'Сделка завершена');
                                    await refreshAll();
                                } catch (err) { showMessage('Ошибка', err.message); }
                            });
                        });
                        document.querySelectorAll('.cancel-btn').forEach(btn => {
                            btn.addEventListener('click', async () => {
                                if (confirm('Отменить?')) { try { await cancelOrder(parseInt(btn.dataset.orderId)); showMessage('Успех', 'Ордер отменён'); await refreshAll(); } catch (err) { showMessage('Ошибка', err.message); } }
                            });
                        });
                    }
                    const sellBtn = document.getElementById('sellBtn');
                    if (sellBtn) sellBtn.addEventListener('click', async () => {
                        let amount = parseFloat(document.getElementById('sellAmount').value);
                        let price = parseFloat(document.getElementById('sellPrice').value);
                        if (isNaN(amount) || isNaN(price) || amount < 1 || price < 1) { showMessage('Ошибка', 'Введите количество не менее 1 и цену не менее 1'); return; }
                        try { await createOrder(amount, price); showMessage('Успех', 'Ордер создан'); await refreshAll(); } catch (err) { showMessage('Ошибка', err.message); }
                    });
                } catch (err) { document.getElementById('app').innerHTML = `<div class="card error">${err.message}</div>`; }
            }
            
            async function refreshAll() { currentUser = await getOrCreateUser(); await renderStocksTab(); }
            
            async function renderProfileTab() {
                const stats = await getUserStats();
                const userAchievements = await getAchievements();
                const allAchievements = await getAllAchievements();
                const selectedIds = currentUser.selected_achievements || [];
                const refCode = currentUser.referral_code;
                const refLink = `https://t.me/VoxAction_Bot?start=${refCode}`;
                const referralCount = currentUser.referral_count || 0;
                const referralBonusShares = referralCount * 5;
                const selectedAchievements = allAchievements.filter(a => selectedIds.includes(a.id));
                const displayedAchievements = selectedAchievements.slice(0,5);
                const achievementIconsHtml = displayedAchievements.map(ach => `<div class="achi-icon earned" data-ach-id="${ach.id}" title="${ach.name}: ${ach.description}">${ach.icon}</div>`).join('');
                const missingCount = Math.max(0, 5 - displayedAchievements.length);
                const missingHtml = '?'.repeat(missingCount).split('').map(() => `<div class="achi-icon">?</div>`).join('');
                const html = `
                    <div class="card" style="text-align: center;">
                        <div class="profile-avatar" id="avatarClick">
                            <div class="avatar-circle">${currentUser.username.charAt(0).toUpperCase()}</div>
                        </div>
                        <p style="font-size: 24px; font-weight: bold;">${currentUser.username}</p>
                        <p>ID: ${userId}</p>
                        <div class="achievement-icons" id="achievementIcons">
                            ${achievementIconsHtml}${missingHtml}
                        </div>
                        <button id="customizeAchievementsBtn" style="margin-top: 8px;">🎨 Настроить ачивки</button>
                        <div style="display: flex; justify-content: space-around; margin: 20px 0;">
                            <div><p style="font-size: 28px;">${fromCents(currentUser.shares)}</p><p class="small-text">Акций</p></div>
                            <div><p style="font-size: 28px;">${fromCents(currentUser.stars_balance)}</p><p class="small-text">Stars</p></div>
                        </div>
                        <hr>
                        <h3>📊 Статистика</h3>
                        <div style="display: flex; justify-content: space-around;">
                            <div><p style="font-size: 20px;">${stats.totalTrades}</p><p class="small-text">Сделок</p></div>
                            <div><p style="font-size: 20px;">${stats.totalVolume.toFixed(2)} ⭐</p><p class="small-text">Объём</p></div>
                        </div>
                        <hr>
                        <h3>👥 Рефералы</h3>
                        <div style="display: flex; justify-content: space-around; margin-bottom: 16px;">
                            <div><p style="font-size: 24px;">${referralCount}</p><p class="small-text">Приглашено друзей</p></div>
                            <div><p style="font-size: 24px;">${referralBonusShares}</p><p class="small-text">Заработано акций</p></div>
                        </div>
                        <h3>🔗 Реферальная ссылка</h3>
                        <div class="small-text" style="background: var(--bg); padding: 8px; border-radius: 12px; word-break: break-all;">${refLink}</div>
                        <p class="small-text" style="margin-top: 8px;">Приглашайте друзей – они получат бонус, а вы 5 акций, когда друг пополнит на 10 ⭐ 🎁.</p>
                    </div>
                `;
                document.getElementById('app').innerHTML = html;
                document.getElementById('avatarClick')?.addEventListener('click', () => {
                    showMessage('Аватар', 'Аватар можно изменить через @BotFather командой /setuserpic');
                });
                document.getElementById('customizeAchievementsBtn')?.addEventListener('click', () => {
                    const earnedAchievements = allAchievements.filter(a => userAchievements.some(ua => ua.id === a.id));
                    const checkboxes = earnedAchievements.map(ach => `<label><input type="checkbox" value="${ach.id}" ${selectedIds.includes(ach.id) ? 'checked' : ''}> ${ach.icon} ${ach.name}</label><br>`).join('');
                    const modalHtml = `
                        <div class="modal" id="achievementsSelectModal" style="display: flex;">
                            <div class="modal-content">
                                <span class="close-modal" id="closeSelectModal">&times;</span>
                                <h3>Выберите до 5 ачивок для отображения</h3>
                                <div id="achievementsList">${checkboxes}</div>
                                <button id="saveAchievementsBtn">Сохранить</button>
                            </div>
                        </div>
                    `;
                    document.body.insertAdjacentHTML('beforeend', modalHtml);
                    document.getElementById('closeSelectModal')?.addEventListener('click', () => {
                        document.getElementById('achievementsSelectModal').remove();
                    });
                    document.getElementById('saveAchievementsBtn')?.addEventListener('click', async () => {
                        const selected = Array.from(document.querySelectorAll('#achievementsSelectModal input:checked')).map(cb => parseInt(cb.value));
                        if (selected.length > 5) {
                            showMessage('Ошибка', 'Нельзя выбрать больше 5 ачивок');
                            return;
                        }
                        await supabase.from('users').update({ selected_achievements: selected }).eq('id', userId);
                        currentUser.selected_achievements = selected;
                        document.getElementById('achievementsSelectModal').remove();
                        await renderProfileTab();
                    });
                });
                document.querySelectorAll('.achi-icon').forEach(icon => {
                    icon.addEventListener('click', () => {
                        const all = allAchievements.map(a => `${a.icon} ${a.name}: ${a.description}`).join('\n');
                        showMessage('Ваши достижения', all);
                    });
                });
            }
            
            async function renderRatingTab() {
                const leaders = await getLeaderboard();
                let html = `<div class="card"><h2>🏆 Рейтинг держателей акций</h2>`;
                if (leaders.length === 0) html += '<p>Нет данных</p>';
                else leaders.forEach((u,i) => { html += `<div class="leaderboard-item"><div class="rank">${i+1}</div><div class="user-name">${u.username||'Аноним'}</div><div class="user-shares">${fromCents(u.shares)} акций</div></div>`; });
                html += `</div>`;
                document.getElementById('app').innerHTML = html;
            }
            
            async function renderWalletTab() {
                document.getElementById('app').innerHTML = `
                    <div class="card"><h2>💳 Кошелёк</h2><p>⭐ Баланс: <strong>${fromCents(currentUser.stars_balance)}</strong></p><p>📊 Акций: <strong>${fromCents(currentUser.shares)}</strong></p><hr>
                    <button id="topupBtn">💸 Пополнить Stars</button>
                    </div>`;
                document.getElementById('topupBtn')?.addEventListener('click', () => {
                    document.getElementById('topupModal').style.display = 'flex';
                    updateTopupFee(0);
                });
            }
            
            async function renderAnalyticsTab() {
                const volume = await supabase.rpc('get_volume_history', { days_limit: 30 });
                const trades = await supabase.from('trades').select('*').or(`seller_id.eq.${userId},buyer_id.eq.${userId}`).order('created_at', { ascending: false }).limit(50);
                let html = `<div class="card"><h2>📊 Объёмы торгов</h2><canvas id="volCanvas" style="width:100%; height:150px;"></canvas><p class="small-text">Объём за 30 дней</p></div>
                           <div class="card"><h2>📜 История сделок</h2><div id="historyList"></div></div>`;
                document.getElementById('app').innerHTML = html;
                if (volume.data && volume.data.length) {
                    const canvas = document.getElementById('volCanvas');
                    const ctx = canvas.getContext('2d');
                    const w = canvas.clientWidth, h = 150;
                    canvas.width = w; canvas.height = h;
                    const maxVol = Math.max(...volume.data.map(v=>v.total_amount/100));
                    const barW = (w-40)/volume.data.length - 2;
                    ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--primary') || '#38bdf8';
                    volume.data.forEach((v,i)=>{
                        const barH = (v.total_amount/100 / maxVol) * (h-20);
                        const x = 20 + i*(barW+2);
                        ctx.fillRect(x, h-10-barH, barW, barH);
                    });
                }
                const historyDiv = document.getElementById('historyList');
                if (trades.data && trades.data.length) {
                    historyDiv.innerHTML = trades.data.map(t => `<div class="history-item">${t.buyer_id===userId?'Покупка':'Продажа'} ${fromCents(t.amount)} шт. по ${fromCents(t.price_per_share)} ⭐<span class="small-text">${new Date(t.created_at).toLocaleString()}</span></div>`).join('');
                } else historyDiv.innerHTML = '<p>Нет сделок</p>';
            }
            
            async function renderSettingsTab() {
                const hideRating = currentUser.hide_rating || false;
                const customColor = localStorage.getItem('custom_color') || '#38bdf8';
                const notifyTrades = currentUser.notify_trades !== undefined ? currentUser.notify_trades : true;
                const notifyTopup = currentUser.notify_topup !== undefined ? currentUser.notify_topup : true;
                const notifyReferral = currentUser.notify_referral !== undefined ? currentUser.notify_referral : true;
                const html = `
                    <div class="card">
                        <h2>⚙️ Настройки</h2>
                        <label><input type="checkbox" id="hideRatingCheckbox" ${hideRating?'checked':''}> Скрыть из рейтинга</label><br><br>
                        <div><strong>Уведомления от бота:</strong></div>
                        <label><input type="checkbox" id="notifyTradesCheckbox" ${notifyTrades?'checked':''}> О сделках</label><br>
                        <label><input type="checkbox" id="notifyTopupCheckbox" ${notifyTopup?'checked':''}> О пополнении</label><br>
                        <label><input type="checkbox" id="notifyReferralCheckbox" ${notifyReferral?'checked':''}> О рефералах</label><br><br>
                        <div><strong>Цвет акцента:</strong></div>
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <input type="color" id="colorPicker" value="${customColor}">
                            <span id="colorPreview" class="color-preview" style="background: ${customColor};"></span>
                        </div>
                        <button id="saveSettings">Сохранить</button>
                    </div>
                `;
                document.getElementById('app').innerHTML = html;
                document.getElementById('colorPicker')?.addEventListener('input', (e) => {
                    document.getElementById('colorPreview').style.background = e.target.value;
                });
                document.getElementById('saveSettings').onclick = async () => {
                    const newHide = document.getElementById('hideRatingCheckbox').checked;
                    const newNotifyTrades = document.getElementById('notifyTradesCheckbox').checked;
                    const newNotifyTopup = document.getElementById('notifyTopupCheckbox').checked;
                    const newNotifyReferral = document.getElementById('notifyReferralCheckbox').checked;
                    const newColor = document.getElementById('colorPicker').value;
                    localStorage.setItem('custom_color', newColor);
                    document.documentElement.style.setProperty('--primary', newColor);
                    document.documentElement.style.setProperty('--primary-dark', newColor);
                    await supabase.from('users').update({
                        hide_rating: newHide,
                        notify_trades: newNotifyTrades,
                        notify_topup: newNotifyTopup,
                        notify_referral: newNotifyReferral,
                    }).eq('id', userId);
                    currentUser.hide_rating = newHide;
                    currentUser.notify_trades = newNotifyTrades;
                    currentUser.notify_topup = newNotifyTopup;
                    currentUser.notify_referral = newNotifyReferral;
                    showMessage('Успех', 'Настройки сохранены');
                };
            }
            
            // ----------------------------- ADMIN PANEL -----------------------------
            const BACKEND_URL = 'https://voxaction-bot-main.onrender.com'; // замените на ваш URL
            async function renderAdminTab() {
                if (userId !== 6048486427) {
                    document.getElementById('app').innerHTML = '<div class="card error">Доступ запрещён</div>';
                    return;
                }
                try {
                    const statsRes = await fetch(`${BACKEND_URL}/admin/stats`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ admin_id: userId })
                    });
                    const stats = await statsRes.json();
                    const usersRes = await fetch(`${BACKEND_URL}/admin/users`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ admin_id: userId })
                    });
                    const usersData = await usersRes.json();
                    const orders = await getActiveOrders();
                    const html = `
                        <div class="card">
                            <h2>👑 Админ-панель</h2>
                            <h3>Статистика</h3>
                            <p>Акций в обращении: ${stats.total_shares || 0}</p>
                            <p>Резерв (акции): ${stats.reserve || 0}</p>
                            <hr>
                            <h3>Выдать акции/звёзды</h3>
                            <input type="number" id="targetUserId" placeholder="ID пользователя">
                            <input type="number" id="giveShares" placeholder="Количество акций">
                            <button id="giveSharesBtn">Выдать акции</button>
                            <input type="number" id="giveStars" placeholder="Количество Stars">
                            <button id="giveStarsBtn">Выдать Stars</button>
                            <hr>
                            <h3>Активные ордера</h3>
                            <div id="adminOrdersList"></div>
                            <hr>
                            <h3>Пользователи</h3>
                            <div id="usersList" style="max-height: 300px; overflow-y: auto;"></div>
                        </div>
                    `;
                    document.getElementById('app').innerHTML = html;
                    // Ордера
                    const ordersDiv = document.getElementById('adminOrdersList');
                    if (orders.length === 0) ordersDiv.innerHTML = '<p>Нет активных ордеров</p>';
                    else {
                        orders.forEach(order => {
                            const div = document.createElement('div');
                            div.className = 'order-item';
                            div.innerHTML = `
                                <div>${fromCents(order.amount)} шт. по ${fromCents(order.price_per_share)} ⭐ (продавец ${order.seller_id})</div>
                                <button class="cancel-btn" data-order-id="${order.id}">Отменить ордер</button>
                            `;
                            ordersDiv.appendChild(div);
                        });
                        document.querySelectorAll('.cancel-btn').forEach(btn => {
                            btn.addEventListener('click', async () => {
                                const orderId = btn.dataset.orderId;
                                const res = await fetch(`${BACKEND_URL}/admin/cancel-order`, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ admin_id: userId, order_id: orderId })
                                });
                                const data = await res.json();
                                if (data.ok) {
                                    showMessage('Успех', 'Ордер отменён');
                                    renderAdminTab();
                                } else {
                                    showMessage('Ошибка', data.error);
                                }
                            });
                        });
                    }
                    // Пользователи
                    const usersDiv = document.getElementById('usersList');
                    if (usersData.users) {
                        usersDiv.innerHTML = usersData.users.map(u => `<div>ID: ${u.id} | ${u.username || 'Аноним'} | Акций: ${fromCents(u.shares)} | Stars: ${fromCents(u.stars_balance)}</div>`).join('');
                    }
                    // Выдача акций
                    document.getElementById('giveSharesBtn')?.addEventListener('click', async () => {
                        const targetId = parseInt(document.getElementById('targetUserId').value);
                        const shares = parseInt(document.getElementById('giveShares').value);
                        if (!targetId || !shares) { showMessage('Ошибка', 'Заполните поля'); return; }
                        const res = await fetch(`${BACKEND_URL}/admin/add-shares`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ admin_id: userId, target_id: targetId, shares: shares })
                        });
                        const data = await res.json();
                        if (data.ok) showMessage('Успех', 'Акции выданы');
                        else showMessage('Ошибка', data.error);
                    });
                    // Выдача звёзд
                    document.getElementById('giveStarsBtn')?.addEventListener('click', async () => {
                        const targetId = parseInt(document.getElementById('targetUserId').value);
                        const stars = parseInt(document.getElementById('giveStars').value);
                        if (!targetId || !stars) { showMessage('Ошибка', 'Заполните поля'); return; }
                        const res = await fetch(`${BACKEND_URL}/admin/add-stars`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ admin_id: userId, target_id: targetId, stars: stars })
                        });
                        const data = await res.json();
                        if (data.ok) showMessage('Успех', 'Stars выданы');
                        else showMessage('Ошибка', data.error);
                    });
                } catch (err) {
                    document.getElementById('app').innerHTML = `<div class="card error">Ошибка загрузки админ-панели: ${err.message}</div>`;
                }
            }
            
            // ----------------------------- TOPUP LOGIC -----------------------------
            let selectedAmount = null;
            function updateTopupFee(amount) {
                const fee = Math.floor(amount * 0.05);
                const receive = amount - fee;
                document.getElementById('topupFeeInfo').innerHTML = `
                    💸 Вы платите: <strong>${amount} ⭐</strong><br>
                    📉 Комиссия Telegram (5%): <strong>${fee} ⭐</strong><br>
                    ✅ Получите на баланс: <strong style="color: var(--success);">${receive} ⭐</strong>
                `;
            }
            document.querySelectorAll('#topupModal .amount-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('#topupModal .amount-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedAmount = parseInt(btn.dataset.amount);
                    document.getElementById('customTopupAmount').value = selectedAmount;
                    updateTopupFee(selectedAmount);
                });
            });
            const customInput = document.getElementById('customTopupAmount');
            if (customInput) {
                customInput.addEventListener('input', () => {
                    let val = parseInt(customInput.value);
                    if (!isNaN(val) && val >= 1) {
                        selectedAmount = val;
                        document.querySelectorAll('#topupModal .amount-btn').forEach(b => b.classList.remove('selected'));
                        updateTopupFee(selectedAmount);
                    } else {
                        document.getElementById('topupFeeInfo').innerHTML = '';
                    }
                });
            }
            document.getElementById('confirmTopupBtn')?.addEventListener('click', async () => {
                if (!selectedAmount || selectedAmount < 1) {
                    showMessage('Ошибка', 'Выберите или введите сумму');
                    return;
                }
                document.getElementById('topupModal').style.display = 'none';
                try {
                    const response = await fetch(`${BACKEND_URL}/create-invoice`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: userId, amount: selectedAmount })
                    });
                    const data = await response.json();
                    if (data.ok && data.invoice_link) {
                        tg.openInvoice(data.invoice_link, (status) => {
                            if (status === 'paid') {
                                showMessage('Успех', 'Баланс пополнен!');
                                refreshAll();
                            }
                        });
                    } else {
                        showMessage('Ошибка', data.error || 'Не удалось создать счёт');
                    }
                } catch (err) {
                    console.error(err);
                    showMessage('Ошибка', 'Ошибка соединения. Попробуйте позже.');
                }
            });
            document.getElementById('closeTopupModal')?.addEventListener('click', () => {
                document.getElementById('topupModal').style.display = 'none';
            });
            
            // ----------------------------- START -----------------------------
            currentUser = await getOrCreateUser();
            const savedColor = localStorage.getItem('custom_color') || '#38bdf8';
            document.documentElement.style.setProperty('--primary', savedColor);
            document.documentElement.style.setProperty('--primary-dark', savedColor);
            await renderStocksTab();
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', async () => {
                    const tabName = tab.dataset.tab;
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    if (tabName === 'profile') await renderProfileTab();
                    else if (tabName === 'stocks') await renderStocksTab();
                    else if (tabName === 'analytics') await renderAnalyticsTab();
                    else if (tabName === 'rating') await renderRatingTab();
                    else if (tabName === 'wallet') await renderWalletTab();
                    else if (tabName === 'settings') await renderSettingsTab();
                    else if (tabName === 'admin') await renderAdminTab();
                });
            });
        })();
    </script>
</body>
</html>
