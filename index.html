<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Акции – биржа</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto; margin: 0; padding: 12px; background: #f0f2f5; }
        .card { background: white; border-radius: 20px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .error { color: red; background: #ffe0e0; padding: 12px; border-radius: 12px; }
        button { background: #0088cc; color: white; border: none; padding: 12px 16px; border-radius: 40px; font-size: 16px; font-weight: 600; width: 100%; margin-top: 8px; cursor: pointer; }
        button:active { transform: scale(0.97); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 40px; font-size: 16px; background: #fafafa; }
        .order { border-bottom: 1px solid #eee; padding: 8px 0; display: flex; justify-content: space-between; align-items: center; }
        .buy-btn { background: #2ecc71; width: auto; padding: 6px 16px; margin: 0; font-size: 14px; }
    </style>
</head>
<body>
    <div id="app">Загрузка...</div>
    <script>
        // 1. Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        let userId = tg.initDataUnsafe?.user?.id;
        const username = tg.initDataUnsafe?.user?.username || "player";
        if (!userId) {
            console.warn("⚠️ Telegram ID не найден, используем тестовый 123456");
            userId = 123456;
        }

        // 2. Supabase Edge Functions base URL (замените на ваш проект)
        const FUNCTIONS_URL = "https://gsutnhhklidxmewdkcvk.supabase.co/functions/v1";

        // Вспомогательная функция для вызова Edge Functions
        async function callFunction(name, body = null) {
            const url = `${FUNCTIONS_URL}/${name}`;
            const options = { method: body ? "POST" : "GET", headers: { "Content-Type": "application/json" } };
            if (body) options.body = JSON.stringify(body);
            const res = await fetch(url, options);
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        }

        let currentUser = null;

        async function loadData() {
            try {
                // Получаем баланс через Edge Function
                const balance = await callFunction(`get-balance?user_id=${userId}`);
                currentUser = { shares: balance.shares, stars_balance: balance.stars, id: userId };

                // Получаем активные ордера через Edge Function (можно создать функцию get-orders, но пока сделаем прямой запрос с service_role? 
                // Для простоты добавим временную функцию get-orders, но пока используем прямую? Нет, лучше через Edge Function. 
                // Создадим отдельную функцию get-orders в Supabase (код ниже). 
                // Пока оставим заглушку: orders = [].
                // Но чтобы не усложнять, я добавлю функцию get-orders прямо сейчас.
                // Я написал её в инструкции, но для полного кода добавлю ещё один fetch.
                // Для краткости здесь будем использовать прямую таблицу с RLS выключенным? Нет, сделаем правильно.
                // Допишем функцию get-orders в Supabase. Я включу её в ответе.
                // Предположим, что она уже есть. Вызовем:
                const ordersData = await callFunction("get-orders");
                renderUI(balance, ordersData.orders);
            } catch (err) {
                console.error(err);
                document.getElementById('app').innerHTML = `<div class="card error">Ошибка загрузки: ${err.message}</div>`;
            }
        }

        function renderUI(balance, orders) {
            const html = `
                <div class="card">
                    <h2>💰 Мой баланс</h2>
                    <p>📊 Акций: <strong>${balance.shares}</strong></p>
                    <p>⭐ Stars: <strong>${balance.stars_balance}</strong></p>
                    <hr />
                    <p style="font-size:12px; color:gray;">ID: ${userId}</p>
                </div>
                <div class="card">
                    <h3>📈 Продать акции</h3>
                    <input type="number" id="sellAmount" placeholder="Количество" min="1">
                    <input type="number" id="sellPrice" placeholder="Цена за 1 акцию (Stars)" min="1">
                    <button id="sellBtn">➕ Выставить на продажу</button>
                </div>
                <div class="card">
                    <h3>📋 Книга ордеров (продажа)</h3>
                    <div id="ordersList">${orders.length ? '' : '<p>Нет активных ордеров.</p>'}</div>
                </div>
            `;
            document.getElementById('app').innerHTML = html;

            if (orders.length) {
                const ordersDiv = document.getElementById('ordersList');
                ordersDiv.innerHTML = orders.map(order => `
                    <div class="order">
                        <div>${order.amount} шт. по ${order.price_per_share} ⭐</div>
                        <button class="buy-btn" data-id="${order.id}" data-price="${order.price_per_share}" data-amount="${order.amount}" data-seller="${order.seller_id}">Купить</button>
                    </div>
                `).join('');
                document.querySelectorAll('.buy-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const orderId = parseInt(btn.dataset.id);
                        const price = parseInt(btn.dataset.price);
                        const amount = parseInt(btn.dataset.amount);
                        const total = price * amount;
                        if (currentUser.stars_balance < total) {
                            alert(`Недостаточно Stars. Нужно ${total}, у вас ${currentUser.stars_balance}`);
                            return;
                        }
                        try {
                            await callFunction("execute-trade", { order_id: orderId, buyer_id: userId });
                            alert("Сделка завершена!");
                            location.reload();
                        } catch (err) {
                            alert("Ошибка: " + err.message);
                        }
                    });
                });
            }

            document.getElementById('sellBtn').addEventListener('click', async () => {
                const amount = parseInt(document.getElementById('sellAmount').value);
                const price = parseInt(document.getElementById('sellPrice').value);
                if (isNaN(amount) || isNaN(price) || amount <= 0 || price <= 0) {
                    alert('Введите корректные количество и цену');
                    return;
                }
                if (currentUser.shares < amount) {
                    alert(`Недостаточно акций. У вас только ${currentUser.shares}`);
                    return;
                }
                try {
                    await callFunction("create-order", { seller_id: userId, amount, price_per_share: price });
                    alert("Ордер создан");
                    location.reload();
                } catch (err) {
                    alert("Ошибка: " + err.message);
                }
            });
        }

        loadData();
    </script>
</body>
</html>
