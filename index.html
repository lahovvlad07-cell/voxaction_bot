<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Акции – биржа</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto; margin: 0; padding: 16px; background: #f0f2f5; }
        .card { background: white; border-radius: 20px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .error { color: red; background: #ffe0e0; padding: 12px; border-radius: 12px; }
        button { background: #0088cc; color: white; border: none; padding: 12px 16px; border-radius: 40px; font-size: 16px; font-weight: 600; width: 100%; margin-top: 8px; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.97); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 40px; font-size: 16px; background: #fafafa; }
        .buy-btn { background: #2ecc71; width: auto; padding: 6px 16px; margin: 0; }
        .order-item, .trade-item { border-bottom: 1px solid #eee; padding: 8px 0; display: flex; justify-content: space-between; align-items: center; }
        .status { font-size: 12px; color: gray; margin-top: 8px; }
        #price-chart { width: 100%; height: 300px; margin-top: 8px; background: white; border-radius: 12px; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        .ticker { background: #f8f9fa; border-radius: 40px; padding: 8px 16px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .current-price { font-size: 24px; font-weight: bold; color: #0088cc; }
        .capitalization { font-size: 14px; color: #555; }
        .marquee { background: #f0f2f5; border-radius: 20px; padding: 8px 12px; margin-bottom: 16px; white-space: nowrap; overflow-x: auto; font-size: 13px; scrollbar-width: thin; }
        .marquee span { display: inline-block; background: white; padding: 4px 12px; border-radius: 20px; margin-right: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .balance-inline { font-size: 14px; color: #2c3e50; margin-top: 8px; margin-bottom: 8px; font-weight: 500; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div id="app">Загрузка...</div>
    <script>
        (async () => {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            let userId = tg.initDataUnsafe?.user?.id;
            const username = tg.initDataUnsafe?.user?.username || "player";
            if (!userId) {
                console.warn("⚠️ Тестовый режим, используем ID 123456");
                userId = 123456;
            }

            const SUPABASE_URL = "https://gsutnhhklidxmewdkcvk.supabase.co";
            const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzdXRuaGhrbGlkeG1ld2RrY3ZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NzA2MTEsImV4cCI6MjA5NjE0NjYxMX0.XEtyJVT0BfmEgAAsGagPHRdHhmCgrtWEbtzov0c3EXc";
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            let currentUser = null;

            // ---------- Пользователь ----------
            async function getOrCreateUser() {
                let { data, error } = await supabase.from('users').select('*').eq('id', userId).maybeSingle();
                if (error) throw new Error(`Ошибка запроса: ${error.message}`);
                if (!data) {
                    const { data: newUser, error: insertError } = await supabase.from('users').insert([{ id: userId, username, shares: 100, stars_balance: 50 }]).select().single();
                    if (insertError) throw new Error(`Ошибка вставки: ${insertError.message}`);
                    return newUser;
                }
                return data;
            }

            // ---------- Активные ордера ----------
            async function getActiveOrders() {
                const { data, error } = await supabase.from('orders').select('*').eq('status', 'active').order('price_per_share', { ascending: true });
                if (error) throw new Error(`Ошибка загрузки ордеров: ${error.message}`);
                return data || [];
            }

            // ---------- История цен ----------
            async function getPriceHistory() {
                const { data, error } = await supabase.from('price_history').select('price, created_at').order('created_at', { ascending: true }).limit(100);
                if (error) throw new Error(`Ошибка загрузки истории цен: ${error.message}`);
                return data || [];
            }

            // ---------- Последние сделки (для бегущей строки) ----------
            async function getLastTrades(limit = 10) {
                const { data, error } = await supabase
                    .from('trades')
                    .select('price_per_share, created_at')
                    .order('created_at', { ascending: false })
                    .limit(limit);
                if (error) throw new Error(`Ошибка загрузки последних сделок: ${error.message}`);
                return data || [];
            }

            // ---------- Текущая цена (последняя цена из price_history) ----------
            async function getCurrentPrice() {
                const { data, error } = await supabase
                    .from('price_history')
                    .select('price')
                    .order('created_at', { ascending: false })
                    .limit(1);
                if (error) throw new Error(`Ошибка загрузки текущей цены: ${error.message}`);
                if (data && data.length > 0) return data[0].price;
                return null;
            }

            // ---------- Капитализация (price * количество выпущенных акций) ----------
            async function getMarketCap() {
                const price = await getCurrentPrice();
                if (!price) return 0;
                const { data, error } = await supabase.from('users').select('shares');
                if (error) throw new Error(`Ошибка загрузки капитализации: ${error.message}`);
                const totalShares = data.reduce((acc, u) => acc + u.shares, 0);
                return price * totalShares;
            }

            // ---------- RPC-функции ----------
            async function createOrder(amount, price) {
                const { data, error } = await supabase.rpc('create_sell_order', { p_user_id: userId, p_amount: amount, p_price: price });
                if (error) throw new Error(error.message);
                if (!data.success) throw new Error(data.error);
                currentUser.shares -= amount;
                return true;
            }

            async function executeTrade(order) {
                const { data, error } = await supabase.rpc('execute_trade', { p_order_id: order.id, p_buyer_id: userId });
                if (error) throw new Error(error.message);
                if (!data.success) throw new Error(data.error);
                const totalStars = order.amount * order.price_per_share;
                currentUser.stars_balance -= totalStars;
                currentUser.shares += order.amount;
                return true;
            }

            // ---------- График (Canvas) ----------
            function drawCanvasChart(history) {
                const container = document.getElementById('price-chart');
                if (!container) return;
                container.innerHTML = '';
                if (!history || history.length === 0) {
                    container.innerHTML = '<p style="text-align:center; padding:20px;">Нет данных для графика</p>';
                    return;
                }
                const canvas = document.createElement('canvas');
                const width = container.clientWidth;
                const height = 300;
                canvas.width = width;
                canvas.height = height;
                canvas.style.width = '100%';
                canvas.style.height = 'auto';
                container.appendChild(canvas);
                const ctx = canvas.getContext('2d');
                const values = history.map(h => h.price);
                const max = Math.max(...values);
                const min = Math.min(...values);
                const range = max - min;
                const padding = { top: 20, bottom: 30, left: 40, right: 20 };
                const graphWidth = width - padding.left - padding.right;
                const graphHeight = height - padding.top - padding.bottom;
                const stepX = graphWidth / (values.length - 1);
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, width, height);
                ctx.beginPath();
                ctx.strokeStyle = '#ccc';
                ctx.lineWidth = 1;
                ctx.moveTo(padding.left, padding.top);
                ctx.lineTo(padding.left, height - padding.bottom);
                ctx.lineTo(width - padding.right, height - padding.bottom);
                ctx.stroke();
                ctx.beginPath();
                ctx.strokeStyle = '#0088cc';
                ctx.lineWidth = 2;
                for (let i = 0; i < values.length; i++) {
                    const x = padding.left + i * stepX;
                    let y;
                    if (range === 0) y = padding.top + graphHeight / 2;
                    else y = padding.top + graphHeight - ((values[i] - min) / range) * graphHeight;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
                ctx.fillStyle = '#333';
                ctx.font = '11px sans-serif';
                ctx.fillText(max.toFixed(1), padding.left - 30, padding.top + 10);
                ctx.fillText(min.toFixed(1), padding.left - 30, height - padding.bottom - 5);
                if (history.length > 0) {
                    const firstDate = new Date(history[0].created_at).toLocaleDateString();
                    const lastDate = new Date(history[history.length-1].created_at).toLocaleDateString();
                    ctx.fillText(firstDate, padding.left, height - padding.bottom + 15);
                    ctx.fillText(lastDate, width - padding.right - 30, height - padding.bottom + 15);
                }
            }

            // ---------- Бегущая строка последних сделок ----------
            function renderMarquee(trades) {
                const container = document.getElementById('marqueeTrades');
                if (!container) return;
                if (!trades || trades.length === 0) {
                    container.innerHTML = '<span>Нет сделок</span>';
                    return;
                }
                container.innerHTML = trades.map(t => `<span>${t.price_per_share}⭐ ${new Date(t.created_at).toLocaleTimeString()}</span>`).join('');
            }

            // ---------- Отрисовка UI (баланс, капитализация, цена) ----------
            async function renderUI(orders, priceHistory, currentPrice, marketCap, lastTrades) {
                const html = `
                    <div class="card">
                        <div class="flex-between">
                            <div>
                                <div class="current-price">${currentPrice !== null ? currentPrice + ' ⭐' : '—'}</div>
                                <div class="capitalization">Рыночная капитализация: ${marketCap} ⭐</div>
                            </div>
                        </div>
                        <div class="balance-inline">📊 Акций: ${currentUser.shares} &nbsp;|&nbsp; ⭐ Stars: ${currentUser.stars_balance}</div>
                        <div id="price-chart"></div>
                    </div>
                    <div class="marquee" id="marqueeTrades"></div>
                    <div class="card">
                        <h3>📈 Продать акции</h3>
                        <input type="number" id="sellAmount" placeholder="Количество" min="1">
                        <input type="number" id="sellPrice" placeholder="Цена за 1 акцию (Stars)" min="1">
                        <button id="sellBtn">➕ Выставить на продажу</button>
                    </div>
                    <div class="card">
                        <h3>📋 Активные ордера на продажу</h3>
                        <div id="ordersList"></div>
                    </div>
                `;
                document.getElementById('app').innerHTML = html;
                drawCanvasChart(priceHistory);
                renderMarquee(lastTrades);

                const ordersDiv = document.getElementById('ordersList');
                if (orders.length === 0) {
                    ordersDiv.innerHTML = '<p>Нет активных ордеров</p>';
                } else {
                    orders.forEach(order => {
                        const div = document.createElement('div');
                        div.className = 'order-item';
                        div.innerHTML = `
                            <div>${order.amount} шт. по ${order.price_per_share} ⭐ (всего ${order.amount * order.price_per_share})</div>
                            <button class="buy-btn" data-order='${JSON.stringify(order)}'>Купить</button>
                        `;
                        ordersDiv.appendChild(div);
                    });
                    document.querySelectorAll('.buy-btn').forEach(btn => {
                        btn.addEventListener('click', async () => {
                            const order = JSON.parse(btn.dataset.order);
                            try {
                                await executeTrade(order);
                                alert('Сделка успешно завершена!');
                                loadPage();
                            } catch (err) {
                                alert(err.message);
                            }
                        });
                    });
                }
                document.getElementById('sellBtn').addEventListener('click', async () => {
                    const amount = parseInt(document.getElementById('sellAmount').value);
                    const price = parseInt(document.getElementById('sellPrice').value);
                    if (isNaN(amount) || isNaN(price) || amount <= 0 || price <= 0) {
                        alert('Введите корректные количество и цену');
                        return;
                    }
                    try {
                        await createOrder(amount, price);
                        alert('Ордер создан');
                        loadPage();
                    } catch (err) {
                        alert(err.message);
                    }
                });
            }

            async function loadPage() {
                try {
                    currentUser = await getOrCreateUser();
                    const orders = await getActiveOrders();
                    const priceHistory = await getPriceHistory();
                    const currentPrice = await getCurrentPrice();
                    const marketCap = await getMarketCap();
                    const lastTrades = await getLastTrades(8);
                    await renderUI(orders, priceHistory, currentPrice, marketCap, lastTrades);
                } catch (err) {
                    console.error(err);
                    document.getElementById('app').innerHTML = `<div class="card error">Ошибка: ${err.message}</div>`;
                }
            }

            loadPage();
        })();
    </script>
</body>
</html>
