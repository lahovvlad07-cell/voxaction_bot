<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Акции – биржа | VoxAction</title>
    <!-- Font Awesome 6 (векторные иконки) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; scrollbar-width: none; -ms-overflow-style: none; }
        *::-webkit-scrollbar { display: none; }
        body {
            background: #0a0e1a;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            color: #eef2ff;
            padding-bottom: calc(76px + env(safe-area-inset-bottom));
        }
        .card {
            background: rgba(18, 24, 38, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 18px;
            margin: 12px 16px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        .tabs-wrapper {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 14, 26, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(56, 189, 248, 0.25);
            padding: 6px 0 calc(6px + env(safe-area-inset-bottom));
            z-index: 100;
            overflow-x: auto;
            white-space: nowrap;
        }
        .tabs {
            display: inline-flex;
            gap: 6px;
            padding: 0 12px;
        }
        .tab {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px 12px;
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.04);
            transition: all 0.2s;
            cursor: pointer;
            min-width: 68px;
        }
        .tab.active {
            background: linear-gradient(135deg, #2b6e9e, #1a4c6e);
            box-shadow: 0 0 12px rgba(43, 110, 158, 0.6);
        }
        .tab-icon { font-size: 22px; margin-bottom: 4px; }
        .tab-label { font-size: 11px; font-weight: 600; letter-spacing: 0.3px; }
        button {
            background: linear-gradient(135deg, #2b6e9e, #1a4c6e);
            border: none;
            padding: 14px 20px;
            border-radius: 44px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            width: 100%;
            margin-top: 14px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }
        button:active { transform: scale(0.96); opacity: 0.9; }
        button.secondary { background: rgba(255, 255, 255, 0.1); margin-top: 8px; }
        input {
            width: 100%;
            padding: 14px 18px;
            margin: 8px 0;
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 44px;
            font-size: 16px;
            background: #111827;
            color: #f0f4ff;
            outline: none;
        }
        input:focus { border-color: #2b6e9e; box-shadow: 0 0 0 2px rgba(43, 110, 158, 0.4); }
        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            gap: 12px;
            flex-wrap: wrap;
        }
        .price {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .small-text { font-size: 12px; color: #9ca3af; }
        .chart-container { width: 100%; height: 220px; margin: 16px 0; border-radius: 20px; overflow: hidden; background: #0f1320; }
        canvas { width: 100%; height: 100%; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #121826;
            border-radius: 32px;
            max-width: 90%;
            width: 400px;
            max-height: 80%;
            overflow-y: auto;
            padding: 20px;
            border: 1px solid #2b6e9e;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        .modal-content h3 { text-align: center; margin-bottom: 16px; font-size: 18px; }
        .close-modal { float: right; font-size: 28px; cursor: pointer; color: #9ca3af; }
        .profile-avatar { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; cursor: pointer; }
        .avatar-circle {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.4);
            margin-bottom: 12px;
            transition: 0.2s;
        }
        .avatar-circle i { font-size: 48px; color: white; line-height: 1; }
        .avatar-circle:hover { transform: scale(1.02); }
        /* Градиенты для фона аватара */
        .bg-gradient1 { background: linear-gradient(135deg, #2b6e9e, #1a4c6e); }
        .bg-gradient2 { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
        .bg-gradient3 { background: linear-gradient(135deg, #e67e22, #d35400); }
        .bg-gradient4 { background: linear-gradient(135deg, #27ae60, #2ecc71); }
        .bg-gradient5 { background: linear-gradient(135deg, #f1c40f, #f39c12); }
        .bg-gradient6 { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .bg-gradient7 { background: linear-gradient(135deg, #1abc9c, #16a085); }
        .bg-gradient8 { background: linear-gradient(135deg, #3498db, #2980b9); }
        .bg-gradient9 { background: linear-gradient(135deg, #34495e, #2c3e50); }
        .bg-gradient10 { background: linear-gradient(135deg, #ff9a9e, #fad0c4); }
        .bg-gradient11 { background: linear-gradient(135deg, #a18cd1, #fbc2eb); }
        /* Кастомный цвет будет применён как обычный background */
        .achievement-icons { display: flex; justify-content: center; gap: 16px; margin: 16px 0; flex-wrap: wrap; }
        .achi-icon {
            width: 56px;
            height: 56px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .achi-icon.earned {
            background: linear-gradient(135deg, #2b6e9e, #1a4c6e);
            border-color: #60a5fa;
            box-shadow: 0 0 10px rgba(43, 110, 158, 0.5);
        }
        .stats-container { display: flex; flex-direction: column; gap: 12px; margin: 16px 0; }
        .stats-row { display: flex; gap: 12px; justify-content: space-between; }
        .stat-card { background: rgba(0, 0, 0, 0.3); border-radius: 24px; padding: 16px; text-align: center; flex: 1; }
        .stat-value {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #eef2ff, #a5b4fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .stat-label { font-size: 12px; margin-top: 4px; }
        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 16px 0;
            max-height: 400px;
            overflow-y: auto;
        }
        .achievement-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 18px;
            padding: 10px 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .achievement-card.selected { border-color: #2b6e9e; background: rgba(43, 110, 158, 0.2); }
        .achievement-card.disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(0.3); }
        .achievement-icon { font-size: 28px; margin-bottom: 4px; }
        .achievement-name { font-weight: 600; font-size: 13px; }
        .achievement-desc, .achievement-condition, .achievement-date { font-size: 10px; color: #9ca3af; margin-top: 4px; }
        /* Сетки аватарок (векторные) и фонов */
        .avatars-grid, .bg-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 20px 0;
            max-height: 360px;
            overflow-y: auto;
        }
        .avatar-option {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            width: 65px;
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            cursor: pointer;
            transition: 0.2s;
            margin: 0 auto;
        }
        .avatar-option i { font-size: 32px; color: white; }
        .avatar-option.selected { border: 2px solid #2b6e9e; background: rgba(43, 110, 158, 0.3); transform: scale(1.05); }
        .bg-option {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
            margin: 0 auto;
            border: 2px solid transparent;
        }
        .bg-option.selected { border-color: #2b6e9e; transform: scale(1.05); }
        .custom-color-preview {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            cursor: pointer;
            margin: 0 auto;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2b6e9e;
            font-size: 24px;
        }
        .topup-amounts { display: flex; gap: 12px; margin: 16px 0; flex-wrap: wrap; }
        .amount-btn {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 16px;
            border-radius: 60px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
        }
        .amount-btn.selected { background: linear-gradient(135deg, #2b6e9e, #1a4c6e); color: white; box-shadow: 0 0 8px #2b6e9e; }
        .ticker { background: rgba(0, 0, 0, 0.35); border-radius: 60px; padding: 8px 16px; overflow: hidden; white-space: nowrap; margin: 12px 0; font-size: 14px; }
        .ticker-content { display: inline-block; animation: scroll 20s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .info-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 12px 0; }
        .info-card { background: rgba(0, 0, 0, 0.3); border-radius: 20px; padding: 12px; text-align: center; }
        .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .filter-btn, .sort-btn, .timeframe-btn {
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .filter-btn.active, .sort-btn.active, .timeframe-btn.active { background: linear-gradient(135deg, #2b6e9e, #1a4c6e); color: white; }
        .leaderboard-item, .history-item, .referral-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        #ordersList, #usersList, #adminOrdersList { max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body>
<div id="app">Загрузка...</div>
<div class="tabs-wrapper">
    <div class="tabs" id="tabs">
        <div class="tab" data-tab="profile"><div class="tab-icon">👤</div><div class="tab-label">Профиль</div></div>
        <div class="tab active" data-tab="stocks"><div class="tab-icon">📈</div><div class="tab-label">Акции</div></div>
        <div class="tab" data-tab="analytics"><div class="tab-icon">📊</div><div class="tab-label">Аналитика</div></div>
        <div class="tab" data-tab="rating"><div class="tab-icon">🏆</div><div class="tab-label">Рейтинг</div></div>
        <div class="tab" data-tab="wallet"><div class="tab-icon">💳</div><div class="tab-label">Кошелёк</div></div>
        <div class="tab" data-tab="referral"><div class="tab-icon">🔗</div><div class="tab-label">Рефералка</div></div>
        <div class="tab" data-tab="settings"><div class="tab-icon">⚙️</div><div class="tab-label">Настройки</div></div>
        <div class="tab admin-tab" data-tab="admin" style="display: none;"><div class="tab-icon">👑</div><div class="tab-label">Админ</div></div>
    </div>
</div>
<div id="topupModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" id="closeTopupModal">&times;</span>
        <h3>💸 Пополнение Stars</h3>
        <div class="topup-amounts">
            <div class="amount-btn" data-amount="200">200 ⭐</div>
            <div class="amount-btn" data-amount="500">500 ⭐</div>
            <div class="amount-btn" data-amount="1000">1000 ⭐</div>
        </div>
        <div class="custom-amount"><input type="number" id="customTopupAmount" placeholder="Своя сумма (1-10000)" min="1" step="1"></div>
        <div id="topupFeeInfo" style="background: rgba(0,0,0,0.3); padding: 12px; border-radius: 20px; text-align: center; margin-bottom: 16px;"></div>
        <button id="confirmTopupBtn">Пополнить</button>
    </div>
</div>
<script>
    (async () => {
        // Drag tabs
        const tabsWrapper = document.querySelector('.tabs-wrapper');
        let isDown = false, startX, scrollLeft;
        tabsWrapper.addEventListener('mousedown', (e) => { isDown = true; startX = e.pageX - tabsWrapper.offsetLeft; scrollLeft = tabsWrapper.scrollLeft; tabsWrapper.style.cursor = 'grabbing'; });
        window.addEventListener('mouseup', () => { isDown = false; tabsWrapper.style.cursor = 'grab'; });
        window.addEventListener('mousemove', (e) => { if (!isDown) return; e.preventDefault(); const x = e.pageX - tabsWrapper.offsetLeft; const walk = (x - startX) * 2; tabsWrapper.scrollLeft = scrollLeft - walk; });
        
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        let userId = tg.initDataUnsafe?.user?.id;
        let username = tg.initDataUnsafe?.user?.username || `user_${userId}`;
        if (!userId) { document.getElementById('app').innerHTML = '<div class="card" style="text-align:center;">Ошибка: запустите через Telegram</div>'; return; }
        if (userId === 6048486427) document.querySelector('.admin-tab').style.display = 'inline-flex';
        
        function showCustomModal(title, message) {
            const modalHtml = `
                <div class="modal" id="customMessageModal" style="display:flex;">
                    <div class="modal-content">
                        <span class="close-modal" id="closeCustomModal">&times;</span>
                        <h3>${title}</h3>
                        <p style="margin: 20px 0; text-align: center;">${message}</p>
                        <button id="customModalOkBtn">OK</button>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            const modal = document.getElementById('customMessageModal');
            document.getElementById('closeCustomModal').onclick = () => modal.remove();
            document.getElementById('customModalOkBtn').onclick = () => modal.remove();
        }
        
        const SUPABASE_URL = "https://gsutnhhklidxmewdkcvk.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzdXRuaGhrbGlkeG1ld2RrY3ZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NzA2MTEsImV4cCI6MjA5NjE0NjYxMX0.XEtyJVT0BfmEgAAsGagPHRdHhmCgrtWEbtzov0c3EXc";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentUser = null;
        
        function toCents(v) { return Math.round(parseFloat(v) * 100); }
        function fromCents(c) { return (c / 100).toFixed(2); }
        
        // --- Достижения ---
        async function ensureWelcomeAchievement(userId) {
            try {
                const { data: achData, error: achErr } = await supabase
                    .from('achievements')
                    .select('id')
                    .eq('name', '🌟 Первый шаг')
                    .maybeSingle();
                if (achErr || !achData) return;
                const achId = achData.id;
                const { data: existing } = await supabase
                    .from('user_achievements')
                    .select('achievement_id')
                    .eq('user_id', userId)
                    .eq('achievement_id', achId)
                    .maybeSingle();
                if (!existing) {
                    await supabase.from('user_achievements').insert({ user_id: userId, achievement_id: achId, earned_at: new Date().toISOString() });
                }
            } catch(e) { console.error(e); }
        }
        
        async function getOrCreateUser() {
            let { data, error } = await supabase.from('users').select('*').eq('id', userId).maybeSingle();
            if (error) throw new Error(`Ошибка запроса: ${error.message}`);
            if (!data) {
                const { data: newUser, error: insertError } = await supabase.from('users').insert([{ 
                    id: userId, 
                    username, 
                    shares: 0, 
                    stars_balance: 0,
                    selected_achievements: [],
                    avatar_url: 'fa-user',
                    avatar_bg: 'gradient1'
                }]).select().single();
                if (insertError) throw new Error(`Ошибка вставки: ${insertError.message}`);
                await ensureWelcomeAchievement(userId);
                return { user: newUser, isNew: true };
            }
            await ensureWelcomeAchievement(userId);
            if (!data.selected_achievements) data.selected_achievements = [];
            if (!data.avatar_url) data.avatar_url = 'fa-user';
            if (!data.avatar_bg) data.avatar_bg = 'gradient1';
            return { user: data, isNew: false };
        }
        
        // --- Функции для торговли (без изменений) ---
        async function getActiveOrders() {
            const { data, error } = await supabase.from('orders').select('*').eq('status', 'active').order('price_per_share', { ascending: true });
            if (error) throw new Error(error.message);
            return data || [];
        }
        async function getUserOrders() {
            const { data, error } = await supabase.from('orders').select('*').eq('seller_id', userId).eq('status', 'active');
            if (error) throw new Error(error.message);
            return data || [];
        }
        async function cancelOrder(orderId) {
            const { data, error } = await supabase.rpc('cancel_order', { p_order_id: orderId, p_user_id: userId });
            if (error) throw new Error(error.message);
            if (!data.success) throw new Error(data.error);
            return true;
        }
        async function createOrder(amount, price) {
            const amountCents = toCents(amount), priceCents = toCents(price);
            if (amountCents < 100) throw new Error('Минимум 1 акция');
            if (priceCents < 100) throw new Error('Минимум 1 Star');
            const { data, error } = await supabase.rpc('create_sell_order', { p_user_id: userId, p_amount: amountCents, p_price: priceCents });
            if (error) throw new Error(error.message);
            if (!data.success) throw new Error(data.error);
            currentUser.shares -= amountCents;
            return true;
        }
        async function executePartialTrade(orderId, buyAmountCents) {
            const { data, error } = await supabase.rpc('execute_trade_partial', { p_order_id: orderId, p_buyer_id: userId, p_buy_amount: buyAmountCents });
            if (error) throw new Error(error.message);
            if (!data.success) throw new Error(data.error);
            return true;
        }
        async function getPriceHistory() {
            const { data, error } = await supabase.from('price_history').select('price, created_at').order('created_at', { ascending: true }).limit(100);
            if (error) throw new Error(error.message);
            return data || [];
        }
        async function getRecentTrades(limit = 10) {
            const { data, error } = await supabase.from('trades').select('amount, price_per_share').order('created_at', { ascending: false }).limit(limit);
            if (error) throw new Error(error.message);
            return data || [];
        }
        async function getCurrentPrice() {
            const { data, error } = await supabase.from('trades').select('amount, price_per_share').order('created_at', { ascending: false }).limit(50);
            if (error || !data || data.length === 0) return 100;
            let totalAmount = 0, totalStars = 0;
            for (let trade of data) { totalAmount += trade.amount; totalStars += trade.amount * trade.price_per_share; }
            return totalAmount > 0 ? totalStars / totalAmount : 100;
        }
        async function getTotalMarketCap() {
            const { data, error } = await supabase.from('users').select('shares');
            if (error) throw new Error(error.message);
            const totalSharesCents = data.reduce((s,u) => s + u.shares, 0);
            const currentPriceCents = await getCurrentPrice();
            const marketCapStars = (totalSharesCents / 100) * (currentPriceCents / 100);
            return { totalShares: totalSharesCents, currentPrice: currentPriceCents, marketCap: marketCapStars };
        }
        async function getLeaderboard() {
            const { data, error } = await supabase.from('users').select('username, shares').eq('hide_rating', false).order('shares', { ascending: false }).limit(20);
            if (error) throw new Error(error.message);
            return data;
        }
        async function getUserStats() {
            const { data, error } = await supabase.from('trades').select('amount, total_stars').or(`seller_id.eq.${userId},buyer_id.eq.${userId}`);
            if (error) return { totalTrades: 0, totalVolume: 0 };
            return { totalTrades: data.length, totalVolume: data.reduce((s,t) => s + t.total_stars/100, 0) };
        }
        async function getEarnedAchievements() {
            const { data, error } = await supabase
                .from('user_achievements')
                .select('achievement_id, earned_at, achievements(id, name, description, icon, condition_type, condition_value)')
                .eq('user_id', userId);
            if (error) return [];
            return data.map(ua => ({
                id: ua.achievements.id,
                name: ua.achievements.name,
                description: ua.achievements.description,
                icon: ua.achievements.icon,
                earned_at: ua.earned_at,
                condition_type: ua.achievements.condition_type,
                condition_value: ua.achievements.condition_value
            }));
        }
        async function getSellerRating(sellerId) {
            const { data, error } = await supabase.from('seller_ratings').select('rating').eq('seller_id', sellerId);
            if (error || !data.length) return null;
            return data.reduce((s,r)=>s+r.rating,0)/data.length;
        }
        
        // --- ГРАФИК И ТАБЫ ---
        let currentTimeframe = '30d';
        async function fetchPriceHistoryForTimeframe() {
            let startDate = new Date();
            if (currentTimeframe === '1d') startDate.setDate(startDate.getDate() - 1);
            else if (currentTimeframe === '7d') startDate.setDate(startDate.getDate() - 7);

        function drawCanvasChart(history) {
            const container = document.getElementById('chart-container');
            if (!container) return;
            container.innerHTML = '';
            if (!history || history.length === 0) { container.innerHTML = '<p style="padding:20px; text-align:center;">Нет данных</p>'; return; }
            const canvas = document.createElement('canvas');
            const width = container.clientWidth, height = 220;
            canvas.width = width; canvas.height = height;
            canvas.style.width = '100%'; canvas.style.height = 'auto';
            container.appendChild(canvas);
            const ctx = canvas.getContext('2d');
            const values = history.map(h => h.price / 100);
            const max = Math.max(...values), min = Math.min(...values), range = max - min;
            const padding = { top: 20, bottom: 30, left: 40, right: 20 };
            const graphWidth = width - padding.left - padding.right;
            const graphHeight = height - padding.top - padding.bottom;
            const stepX = graphWidth / (values.length - 1);
            ctx.fillStyle = '#0f1320';
            ctx.fillRect(0, 0, width, height);
            ctx.beginPath(); ctx.strokeStyle = '#2b6e9e'; ctx.lineWidth = 2;
            for (let i = 0; i < values.length; i++) {
                const x = padding.left + i * stepX;
                let y = (range === 0) ? padding.top + graphHeight/2 : padding.top + graphHeight - ((values[i] - min) / range) * graphHeight;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            ctx.fillStyle = '#eef2ff'; ctx.font = '11px sans-serif';
            ctx.fillText(max.toFixed(2), padding.left - 30, padding.top + 10);
            ctx.fillText(min.toFixed(2), padding.left - 30, height - padding.bottom - 5);
            if (history.length) {
                const firstDate = new Date(history[0].created_at).toLocaleDateString();
                const lastDate = new Date(history[history.length-1].created_at).toLocaleDateString();
                ctx.fillText(firstDate, padding.left, height - padding.bottom + 15);
                ctx.fillText(lastDate, width - padding.right - 40, height - padding.bottom + 15);
            }
        }

                });
            });
        }
        
        // --- ОСТАЛЬНЫЕ ВКЛАДКИ (без изменений) ---
        async function renderRatingTab() {
            const leaders = await getLeaderboard();
            let html = `<div class="card"><h2>🏆 Рейтинг держателей акций</h2>`;
            if (!leaders.length) html += '<p>Нет данных</p>';
            else leaders.forEach((u,i) => { html += `<div class="leaderboard-item"><div class="rank">${i+1}</div><div class="user-name">${u.username||'Аноним'}</div><div class="user-shares">${fromCents(u.shares)} акций</div></div>`; });
            html += `</div>`;
            document.getElementById('app').innerHTML = html;
        }
        async function renderWalletTab() {
            document.getElementById('app').innerHTML = `<div class="card"><h2>💳 Кошелёк</h2><p>⭐ Баланс: <strong>${fromCents(currentUser.stars_balance)}</strong></p><p>📊 Акций: <strong>${fromCents(currentUser.shares)}</strong></p><hr><button id="topupBtn">💸 Пополнить Stars</button><button id="withdrawGiftsBtn" style="margin-top:12px;">🎁 Вывести через подарки</button></div>`;
            document.getElementById('topupBtn')?.addEventListener('click', () => { document.getElementById('topupModal').style.display = 'flex'; updateTopupFee(0); });
            document.getElementById('withdrawGiftsBtn')?.addEventListener('click', () => { tg.openTelegramLink('https://t.me/VoxAction_Bot?start=withdraw_gifts'); });
        }
        async function renderReferralTab() {
            const refCode = currentUser.referral_code;
            const refLink = `https://t.me/VoxAction_Bot?start=${refCode || 'REF0000'}`;
            const referralCount = currentUser.referral_count || 0;
            const earnedShares = referralCount * 5;
            const html = `<div class="card"><h2>🔗 Реферальная программа</h2><div class="stats-row"><div class="stat-card"><div class="stat-value">${referralCount}</div><div class="stat-label">Приглашено друзей</div></div><div class="stat-card"><div class="stat-value">${earnedShares}</div><div class="stat-label">Заработано акций</div></div></div><h3>Ваша реферальная ссылка</h3><div class="small-text" style="background:rgba(0,0,0,0.3); padding:8px; border-radius:20px; word-break:break-all;">${refLink}</div><p class="small-text">Приглашайте друзей – они получат бонус, а вы 5 акций, когда он пополнит на 10 ⭐.</p><button id="copyRefLink">📋 Скопировать ссылку</button></div>`;
            document.getElementById('app').innerHTML = html;
            document.getElementById('copyRefLink')?.addEventListener('click', () => { navigator.clipboard.writeText(refLink); showCustomModal('Скопировано', 'Реферальная ссылка скопирована в буфер обмена'); });
        }
        async function renderAnalyticsTab() {
            const volume = await supabase.rpc('get_volume_history', { days_limit: 30 });
            const trades = await supabase.from('trades').select('*').or(`seller_id.eq.${userId},buyer_id.eq.${userId}`).order('created_at', { ascending: false }).limit(50);
            let html = `<div class="card"><h2>📊 Объёмы торгов</h2><canvas id="volCanvas" style="width:100%; height:130px;"></canvas><p class="small-text">Объём за 30 дней</p></div><div class="card"><h2>📜 История сделок</h2><div id="historyList"></div></div>`;
            document.getElementById('app').innerHTML = html;
            if (volume.data && volume.data.length) {
                const canvas = document.getElementById('volCanvas');
                const ctx = canvas.getContext('2d');
                const w = canvas.clientWidth, h = 130;
                canvas.width = w; canvas.height = h;
                const maxVol = Math.max(...volume.data.map(v=>v.total_amount/100));
                const barW = (w-40)/volume.data.length - 2;
                ctx.fillStyle = '#2b6e9e';
                volume.data.forEach((v,i)=>{ const barH = (v.total_amount/100 / maxVol) * (h-20); ctx.fillRect(20 + i*(barW+2), h-10-barH, barW, barH); });
            }
            const historyDiv = document.getElementById('historyList');
            if (trades.data && trades.data.length) historyDiv.innerHTML = trades.data.map(t => `<div class="history-item"><span>${t.buyer_id===userId?'Покупка':'Продажа'} ${fromCents(t.amount)} шт. по ${fromCents(t.price_per_share)} ⭐</span><span class="small-text">${new Date(t.created_at).toLocaleString()}</span></div>`).join('');
            else historyDiv.innerHTML = '<p>Нет сделок</p>';
        }
        async function renderSettingsTab() {
            const hideRating = currentUser.hide_rating || false;
            const customColor = localStorage.getItem('custom_color') || '#2b6e9e';
            const notifyTrades = currentUser.notify_trades ?? true;
            const notifyTopup = currentUser.notify_topup ?? true;
            const notifyReferral = currentUser.notify_referral ?? true;
            const html = `<div class="card"><h2>⚙️ Настройки</h2><label><input type="checkbox" id="hideRatingCheckbox" ${hideRating?'checked':''}> Скрыть из рейтинга</label><br><br><div><strong>Уведомления от бота:</strong></div><label><input type="checkbox" id="notifyTradesCheckbox" ${notifyTrades?'checked':''}> О сделках</label><br><label><input type="checkbox" id="notifyTopupCheckbox" ${notifyTopup?'checked':''}> О пополнении</label><br><label><input type="checkbox" id="notifyReferralCheckbox" ${notifyReferral?'checked':''}> О рефералах</label><br><br><div><strong>Цвет акцента:</strong></div><input type="color" id="colorPicker" value="${customColor}" style="width:60px; padding:0;"><button id="saveSettings">Сохранить</button></div>`;
            document.getElementById('app').innerHTML = html;
            document.getElementById('colorPicker').addEventListener('input', (e) => document.documentElement.style.setProperty('--accent', e.target.value));
            document.getElementById('saveSettings').onclick = async () => {
                const newHide = document.getElementById('hideRatingCheckbox').checked;
                const newColor = document.getElementById('colorPicker').value;
                localStorage.setItem('custom_color', newColor);
                document.documentElement.style.setProperty('--accent', newColor);
                await supabase.from('users').update({ hide_rating: newHide, notify_trades: document.getElementById('notifyTradesCheckbox').checked, notify_topup: document.getElementById('notifyTopupCheckbox').checked, notify_referral: document.getElementById('notifyReferralCheckbox').checked }).eq('id', userId);
                currentUser.hide_rating = newHide;
                showCustomModal('Успех', 'Настройки сохранены');
            };
        }
        
        const BACKEND_URL = 'https://voxaction-bot-main.onrender.com';
        async function renderAdminTab() {
            if (userId !== 6048486427) { document.getElementById('app').innerHTML = '<div class="card error">Доступ запрещён</div>'; return; }
            try {
                const stats = await fetch(`${BACKEND_URL}/admin/stats`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ admin_id: userId }) }).then(r=>r.json());
                const usersData = await fetch(`${BACKEND_URL}/admin/users`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ admin_id: userId }) }).then(r=>r.json());
                const orders = await getActiveOrders();
                let html = `<div class="card"><h2>👑 Админ-панель</h2><h3>Статистика</h3><p>Акций в обращении: ${stats.total_shares || 0}</p><p>Резерв: ${stats.reserve || 0}</p><hr><h3>Выдать акции/звёзды</h3><input type="number" id="targetUserId" placeholder="ID"><input type="number" id="giveShares" placeholder="Акции"><button id="giveSharesBtn">Выдать акции</button><input type="number" id="giveStars" placeholder="Stars"><button id="giveStarsBtn">Выдать Stars</button><hr><h3>Активные ордера</h3><div id="adminOrdersList"></div><hr><h3>Пользователи</h3><div id="usersList" style="max-height:300px; overflow-y:auto;"></div></div>`;
                document.getElementById('app').innerHTML = html;
                const ordersDiv = document.getElementById('adminOrdersList');
                if (!orders.length) ordersDiv.innerHTML = '<p>Нет ордеров</p>';
                else orders.forEach(order => { const div = document.createElement('div'); div.className = 'order-item'; div.innerHTML = `<div>${fromCents(order.amount)} шт. по ${fromCents(order.price_per_share)} ⭐ (продавец ${order.seller_id})</div><button class="cancel-btn" data-order-id="${order.id}">Отменить</button>`; ordersDiv.appendChild(div); });
                document.querySelectorAll('.cancel-btn').forEach(btn => btn.addEventListener('click', async () => { const res = await fetch(`${BACKEND_URL}/admin/cancel-order`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ admin_id: userId, order_id: btn.dataset.orderId }) }); const data = await res.json(); if(data.ok) { showCustomModal('Успех','Ордер отменён'); renderAdminTab(); } else showCustomModal('Ошибка',data.error); }));
                if(usersData.users) document.getElementById('usersList').innerHTML = usersData.users.map(u => `<div>ID: ${u.id} | ${u.username||'Аноним'} | Акций: ${fromCents(u.shares)} | Stars: ${fromCents(u.stars_balance)}</div>`).join('');
                document.getElementById('giveSharesBtn').onclick = async () => { const target = parseInt(document.getElementById('targetUserId').value); const shares = parseInt(document.getElementById('giveShares').value); if(!target||!shares) { showCustomModal('Ошибка','Заполните поля'); return; } const res = await fetch(`${BACKEND_URL}/admin/add-shares`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ admin_id: userId, target_id: target, shares }) }); const data = await res.json(); if(data.ok) showCustomModal('Успех','Акции выданы'); else showCustomModal('Ошибка',data.error); };
                document.getElementById('giveStarsBtn').onclick = async () => { const target = parseInt(document.getElementById('targetUserId').value); const stars = parseInt(document.getElementById('giveStars').value); if(!target||!stars) { showCustomModal('Ошибка','Заполните поля'); return; } const res = await fetch(`${BACKEND_URL}/admin/add-stars`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ admin_id: userId, target_id: target, stars }) }); const data = await res.json(); if(data.ok) showCustomModal('Успех','Stars выданы'); else showCustomModal('Ошибка',data.error); };
            } catch(e) { document.getElementById('app').innerHTML = `<div class="card error">${e.message}</div>`; }
        }
        
        let selectedAmount = null;
        function updateTopupFee(amount) { const fee = Math.floor(amount * 0.05); const receive = amount - fee; document.getElementById('topupFeeInfo').innerHTML = `💸 Вы платите: ${amount} ⭐<br>📉 Комиссия (5%): ${fee} ⭐<br>✅ Получите: ${receive} ⭐`; }
        document.querySelectorAll('#topupModal .amount-btn').forEach(btn => btn.addEventListener('click', () => { document.querySelectorAll('#topupModal .amount-btn').forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); selectedAmount = parseInt(btn.dataset.amount); document.getElementById('customTopupAmount').value = selectedAmount; updateTopupFee(selectedAmount); }));
        document.getElementById('customTopupAmount')?.addEventListener('input', () => { let val = parseInt(document.getElementById('customTopupAmount').value); if(!isNaN(val) && val>=1) { selectedAmount = val; document.querySelectorAll('#topupModal .amount-btn').forEach(b => b.classList.remove('selected')); updateTopupFee(selectedAmount); } else document.getElementById('topupFeeInfo').innerHTML = ''; });
        document.getElementById('confirmTopupBtn')?.addEventListener('click', async () => { if(!selectedAmount || selectedAmount<1) { showCustomModal('Ошибка','Выберите сумму'); return; } document.getElementById('topupModal').style.display = 'none'; try { const res = await fetch(`${BACKEND_URL}/create-invoice`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ user_id: userId, amount: selectedAmount }) }); const data = await res.json(); if(data.ok && data.invoice_link) tg.openInvoice(data.invoice_link, (status) => { if(status === 'paid') { showCustomModal('Успех','Баланс пополнен'); refreshAll(); } }); else showCustomModal('Ошибка', data.error || 'Не удалось создать счёт'); } catch(e) { showCustomModal('Ошибка','Соединение'); } });
        document.getElementById('closeTopupModal')?.addEventListener('click', () => document.getElementById('topupModal').style.display = 'none');
        
        // --- ЗАПУСК ---
        const { user, isNew } = await getOrCreateUser();
        currentUser = user;
        const savedColor = localStorage.getItem('custom_color') || '#2b6e9e';
        document.documentElement.style.setProperty('--accent', savedColor);
        await renderStocksTab();
        if (isNew) setTimeout(() => openAvatarSelector(), 500);
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', async () => {
                const tabName = tab.dataset.tab;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                if(tabName === 'profile') await renderProfileTab();
                else if(tabName === 'stocks') await renderStocksTab();
                else if(tabName === 'analytics') await renderAnalyticsTab();
                else if(tabName === 'rating') await renderRatingTab();
                else if(tabName === 'wallet') await renderWalletTab();
                else if(tabName === 'referral') await renderReferralTab();
                else if(tabName === 'settings') await renderSettingsTab();
                else if(tabName === 'admin') await renderAdminTab();
            });
        });
    })();
</script>
</body>
</html>
