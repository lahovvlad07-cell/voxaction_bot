<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Акции – биржа</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: system-ui; padding: 16px; background: #f0f2f5; }
        .card { background: white; border-radius: 20px; padding: 16px; margin-bottom: 16px; }
        .error { color: red; background: #ffe0e0; padding: 12px; border-radius: 12px; }
    </style>
</head>
<body>
    <div id="app">Загрузка...</div>
    <script>
        (async () => {
            // ----- 1. Telegram и userId -----
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();

            // Получаем userId – если нет, используем fallback 123456
            let userId = tg.initDataUnsafe?.user?.id;
            const username = tg.initDataUnsafe?.user?.username || "player";

            if (!userId) {
                console.warn("⚠️ Telegram user ID не найден, используем тестовый ID 123456");
                userId = 123456;
                document.getElementById('app').innerHTML = `<div class="card">⚠️ Режим отладки: используется тестовый ID 123456. В Telegram ID определится автоматически.</div>`;
            }

            // ----- 2. Supabase (замените на свои ключи) -----
            const SUPABASE_URL = "https://gsutnhhklidxmewdkcvk.supabase.co";
            const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzdXRuaGhrbGlkeG1ld2RrY3ZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NzA2MTEsImV4cCI6MjA5NjE0NjYxMX0.XEtyJVT0BfmEgAAsGagPHRdHhmCgrtWEbtzov0c3EXc";

            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            // ----- 3. Функция загрузки баланса -----
            async function loadUser() {
                try {
                    // Пытаемся найти пользователя
                    let { data, error } = await supabase
                        .from('users')
                        .select('*')
                        .eq('id', userId)
                        .single();

                    if (error && error.code === 'PGRST116') {
                        // Пользователь не найден – создаём нового
                        const { data: newUser, error: insertError } = await supabase
                            .from('users')
                            .insert([{ id: userId, username: username, shares: 100, stars_balance: 50 }])
                            .select()
                            .single();
                        if (insertError) throw new Error(`Ошибка вставки: ${insertError.message}`);
                        data = newUser;
                    } else if (error) {
                        throw new Error(`Ошибка запроса: ${error.message}`);
                    }

                    // Отображаем баланс
                    document.getElementById('app').innerHTML = `
                        <div class="card">
                            <h2>💰 Мой баланс</h2>
                            <p>📊 Акций: <strong>${data.shares}</strong></p>
                            <p>⭐ Stars: <strong>${data.stars_balance}</strong></p>
                            <hr />
                            <p style="font-size:12px; color:gray;">ID: ${userId}</p>
                        </div>
                        <div class="card">
                            <p>✅ Всё работает! Теперь можно добавлять биржевую логику.</p>
                        </div>
                    `;
                } catch (err) {
                    console.error("❌ Ошибка загрузки:", err);
                    document.getElementById('app').innerHTML = `
                        <div class="card error">
                            <h3>Ошибка подключения к базе данных</h3>
                            <p>${err.message}</p>
                            <p>Проверьте настройки Supabase: URL, ключ, таблицы и CORS.</p>
                        </div>
                    `;
                }
            }

            // Запускаем
            await loadUser();
        })();
    </script>
</body>
</html>
