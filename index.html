<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Акции – биржа | VoxAction</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">Загрузка...</div>
<div class="tabs-wrapper">
    <div class="tabs" id="tabs">
        <div class="tab" data-tab="profile">👤<span class="tab-label">Профиль</span></div>
        <div class="tab active" data-tab="stocks">📈<span class="tab-label">Акции</span></div>
        <div class="tab" data-tab="analytics">📊<span class="tab-label">Аналитика</span></div>
        <div class="tab" data-tab="rating">🏆<span class="tab-label">Рейтинг</span></div>
        <div class="tab" data-tab="wallet">💳<span class="tab-label">Кошелёк</span></div>
        <div class="tab" data-tab="referral">🔗<span class="tab-label">Рефералка</span></div>
        <div class="tab" data-tab="settings">⚙️<span class="tab-label">Настройки</span></div>
        <div class="tab admin-tab" data-tab="admin" style="display:none">👑<span class="tab-label">Админ</span></div>
    </div>
</div>
<div id="topupModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" id="closeTopupModal">&times;</span>
        <h3>💸 Пополнение Stars</h3>
        <div class="topup-amounts">
            <div class="amount-btn" data-amount="200">200 ⭐</div>
            <div class="amount-btn" data-amount="500">500 ⭐</div>
            <div class="amount-btn" data-amount="1000">1000 ⭐</div>
        </div>
        <div><input type="number" id="customTopupAmount" placeholder="Своя сумма (1-10000)" min="1" step="1"></div>
        <div id="topupFeeInfo" style="background:rgba(0,0,0,.3);padding:12px;border-radius:20px;text-align:center;margin:16px 0"></div>
        <button id="confirmTopupBtn">Пополнить</button>
    </div>
</div>
<script src="common.js"></script>
<script src="profile.js"></script>
<script src="stocks.js"></script>
<script src="analytics.js"></script>
<script src="rating.js"></script>
<script src="wallet.js"></script>
<script src="referral.js"></script>
<script src="settings.js"></script>
<script src="admin.js"></script>
<script>
    (async () => {
        // Инициализация общих переменных
        window.tg = window.Telegram.WebApp;
        window.tg.ready(); window.tg.expand();
        window.userId = window.tg.initDataUnsafe?.user?.id;
        window.username = window.tg.initDataUnsafe?.user?.username || `user_${window.userId}`;
        if (!window.userId) { document.getElementById('app').innerHTML = '<div class="card error">Ошибка: запустите через Telegram</div>'; return; }
        if (window.userId === 6048486427) document.querySelector('.admin-tab').style.display = 'inline-flex';

        // Загружаем общие данные пользователя
        window.supabase = window.supabase.createClient(
            "https://gsutnhhklidxmewdkcvk.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzdXRuaGhrbGlkeG1ld2RrY3ZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NzA2MTEsImV4cCI6MjA5NjE0NjYxMX0.XEtyJVT0BfmEgAAsGagPHRdHhmCgrtWEbtzov0c3EXc"
        );
        window.BACKEND_URL = 'https://voxaction-bot-main.onrender.com';
        window.currentUser = null;

        async function loadUser() {
            let { data, error } = await window.supabase.from('users').select('*').eq('id', window.userId).maybeSingle();
            if (error) throw error;
            if (!data) {
                const { data: newUser, error: insErr } = await window.supabase.from('users').insert([{
                    id: window.userId, username: window.username, shares: 0, stars_balance: 0, selected_achievements: [],
                    avatar_url: '👤', avatar_bg: 'gradient1', registered_at: new Date().toISOString()
                }]).select().single();
                if (insErr) throw insErr;
                // приветственное достижение
                const { data: welcome } = await window.supabase.from('achievements').select('id').eq('name', '🌟 Первый шаг').maybeSingle();
                if (welcome) await window.supabase.from('user_achievements').insert({ user_id: window.userId, achievement_id: welcome.id, earned_at: new Date().toISOString() });
                window.currentUser = newUser;
            } else {
                if (!data.selected_achievements) data.selected_achievements = [];
                if (!data.avatar_url) data.avatar_url = '👤';
                if (!data.avatar_bg) data.avatar_bg = 'gradient1';
                if (!data.registered_at) {
                    await window.supabase.from('users').update({ registered_at: new Date().toISOString() }).eq('id', window.userId);
                    data.registered_at = new Date().toISOString();
                }
                window.currentUser = data;
            }
        }
        await loadUser();

        // Функция загрузки вкладки
        async function loadTab(tabName) {
            const container = document.getElementById('app');
            try {
                const response = await fetch(`templates/${tabName}.html`);
                if (!response.ok) throw new Error(`Шаблон ${tabName}.html не найден`);
                const html = await response.text();
                container.innerHTML = html;
                // Вызов функции инициализации для вкладки, если она существует
                if (window[`init${tabName.charAt(0).toUpperCase() + tabName.slice(1)}`]) {
                    await window[`init${tabName.charAt(0).toUpperCase() + tabName.slice(1)}`]();
                }
            } catch(e) {
                container.innerHTML = `<div class="card error">Ошибка загрузки вкладки: ${e.message}</div>`;
            }
        }

        // Обработка переключения табов
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const tabName = tab.dataset.tab;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                loadTab(tabName);
            });
        });

        // Загружаем активную вкладку (stocks)
        loadTab('stocks');
    })();
</script>
</body>
</html>
